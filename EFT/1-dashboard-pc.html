<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rizvi Family · Dashboard (Desktop)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Include 13-family-data.js for auto-loading on PC -->
    <script src="13-family-data.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --bronze: #bc8c4f;
            --dashboard-green: #1b5e20;
            --admin-purple: #6b21a8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .status-badge {
            background: var(--gold);
            color: var(--dark-blue);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fffcf8;
        }

        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
        }

        .top-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .bottom-row {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 10px;
        }

        .dashboard-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .dashboard-card:hover {
            transform: translateY(-3px);
            border-color: var(--bronze);
        }

        .dashboard-card.admin-card {
            border-color: var(--admin-purple);
            background: linear-gradient(145deg, #fff, #f8f4ff);
        }

        .dashboard-card.admin-card:hover {
            border-color: #8b5cf6;
            box-shadow: 0 5px 15px rgba(107, 33, 168, 0.2);
        }

        .card-icon {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 8px;
        }

        .card-desc {
            color: #666;
            font-size: 13px;
        }

        .admin-badge {
            background: var(--admin-purple);
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            margin-top: 10px;
            display: inline-block;
        }

        .exit-btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #5a0000;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid var(--gold);
            min-width: 240px;
            justify-content: center;
            font-size: 15px;
            transition: all 0.2s;
        }

        .exit-btn-container:hover {
            background: #7a1f1f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(90, 0, 0, 0.3);
        }
        
        .exit-btn-container:active {
            transform: translateY(0);
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 11px;
            border-top: 2px solid var(--gold);
        }

        /* Admin Page Styles */
        .admin-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .admin-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--admin-purple);
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .admin-card-large {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .admin-card-large:hover {
            transform: translateY(-5px);
            border-color: var(--admin-purple);
            box-shadow: 0 10px 25px rgba(107, 33, 168, 0.15);
        }

        .admin-card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .admin-card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 10px;
        }

        .admin-card-desc {
            color: #666;
            font-size: 14px;
        }

        .data-status {
            margin-top: 15px;
            color: #2e7d32;
            font-size: 13px;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--dark-blue);
            color: var(--gold);
            text-decoration: none;
            border-radius: 40px;
            border: 2px solid var(--gold);
            font-weight: 600;
            cursor: pointer;
        }

        .home-link:hover {
            background: var(--gold);
            color: var(--dark-blue);
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="app-header" id="appHeader">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span id="headerTitle">Rizvi Family Dashboard (PC)</span>
            </div>
            <div class="header-actions" id="headerActions">
                <span class="status-badge" id="headerStatus">📊 Total member records: 0</span>
            </div>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="main-content" id="mainContent">
            <!-- Dynamic content will be inserted here -->
        </div>

        <div class="app-footer" id="appFooter">
            Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010
        </div>
    </div>

<script>

// Check URL parameters on page load
function checkURLParams() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('view') && urlParams.get('view') === 'admin') {
        // Automatically prompt for admin password
        setTimeout(() => {
            const pwd = prompt('Enter Admin Password:');
            if (pwd === '6010') {
                currentView = 'admin';
                isAdminAuthenticated = true;
                renderAdminView();
            } else if (pwd !== null) {
                alert('❌ Invalid Admin Password');
                renderDashboardView();
            } else {
                renderDashboardView();
            }
        }, 100);
    }
}

let db = [];
let currentView = 'dashboard';
let isAdminAuthenticated = false;

// UPDATED logout function - redirects to main index.html
function logout() {
    if (confirm('Are you sure you want to exit and return to the login page?')) {
        localStorage.removeItem('familyDB');
        localStorage.removeItem('fileInfo');
        localStorage.removeItem('tableViewMember');
        localStorage.removeItem('tableViewFilters');
        db = [];
        isAdminAuthenticated = false;
        
        console.log('Redirecting to main login page...');
        window.location.href = '../index.html';
    }
}

function hardReset() {
    const confirmation = confirm("🚨 WARNING: This will permanently delete ALL family data from this browser. Are you sure?");
    
    if (confirmation) {
        localStorage.removeItem('familyDB');
        localStorage.removeItem('fileInfo');
        localStorage.removeItem('tableViewMember');
        localStorage.removeItem('tableViewFilters');
        
        db = [];
        isAdminAuthenticated = false;
        
        updateHeaderStatus();
        
        if (currentView === 'admin') {
            renderAdminView();
        } else {
            renderDashboardView();
        }
        
        alert("✅ All data has been cleared from browser storage.");
        
        autoLoadFromJS();
    }
}

function goToAdminWithPassword() {
    const pwd = prompt('Enter Admin Password:');
    if (pwd === '6010') {
        currentView = 'admin';
        isAdminAuthenticated = true;
        renderAdminView();
    } else if (pwd !== null) {
        alert('❌ Invalid Admin Password');
    }
}

function loadData() {
    document.getElementById('fileInput').click();
}

document.getElementById('fileInput').onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            db = rows.map(r => ({
                name: String(r.Name || r.name || '').trim(),
                father: String(r.Father || r.father || '').trim(),
                mother: String(r.Mother || r.mother || '').trim(),
                spouse: String(r.Spouse || r.spouse || '').trim(),
                gen: String(r.Gen || r.gen || '').trim(),
                gender: String(r.Gender || r.gender || 'Male').trim().toUpperCase(),
                maritalStatus: String(r.MaritalStatus || r.maritalStatus || r.Maritalstatus || r.maritalstatus || '').trim(),
                alive: String(r.Alive || r.alive || '').trim()
            })).filter(p => p.name);

            try {
                const firstSheet = wb.Sheets[wb.SheetNames[0]];
                const j1Cell = firstSheet['J1'];
                const j2Cell = firstSheet['J2'];
                
                const fileInfo = {
                    saved_time_header: j1Cell ? String(j1Cell.v || j1Cell.w || '') : 'Date & time file saved',
                    saved_time: j2Cell ? (typeof j2Cell.v === 'number' ? 
                        new Date((j2Cell.v - 25569) * 86400 * 1000).toLocaleString() : 
                        String(j2Cell.v).trim()) : new Date().toLocaleString(),
                    exported_time: new Date().toLocaleString(),
                    total_members: db.length,
                    source_file: file.name
                };
                
                localStorage.setItem('fileInfo', JSON.stringify(fileInfo));
                console.log('✅ Timestamp extracted from Excel:', fileInfo.saved_time);
            } catch (tsErr) {
                console.warn('Could not extract timestamp:', tsErr);
            }

            localStorage.setItem('familyDB', JSON.stringify(db));
            
            updateHeaderStatus();
            
            if (currentView === 'admin') {
                renderAdminView();
            } else {
                renderDashboardView();
            }
            
            console.log(`✅ Successfully loaded ${db.length} members from Excel file.`);
            
        } catch (err) {
            alert('❌ Error: ' + err.message);
        }
    };
    reader.readAsArrayBuffer(file);
};

function updateHeaderStatus() {
    const count = db.length || (localStorage.getItem('familyDB') ? JSON.parse(localStorage.getItem('familyDB')).length : 0);
    document.getElementById('headerStatus').innerHTML = `📊 Total member records: ${count}`;
}

function goToIndividual() {
    if (db.length === 0) {
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
        } else {
            alert('Please load data first (Use Admin panel)');
            return;
        }
    }
    window.location.href = '2-individual-tree-pc.html';
}

function goToRoot() {
    if (db.length === 0) {
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
        } else {
            alert('Please load data first (Use Admin panel)');
            return;
        }
    }
    window.location.href = '4-root-tree-pc.html';
}

function goToDashboard() {
    currentView = 'dashboard';
    renderDashboardView();
}

function renderDashboardView() {
    document.getElementById('headerTitle').innerText = 'Rizvi Family Dashboard (PC)';
    document.getElementById('headerActions').innerHTML = `
        <span class="status-badge" id="headerStatus">📊 Total member records: ${db.length || (localStorage.getItem('familyDB') ? JSON.parse(localStorage.getItem('familyDB')).length : 0)}</span>
    `;
    
    const mainContent = document.getElementById('mainContent');
    mainContent.innerHTML = `
        <div class="dashboard-grid">
            <div class="top-row">
                <div class="dashboard-card" onclick="goToIndividual()">
                    <div class="card-icon">👤</div>
                    <div class="card-title">Individual</div>
                    <div class="card-desc">Single member search</div>
                </div>
                <div class="dashboard-card" onclick="goToRoot()">
                    <div class="card-icon">👥</div>
                    <div class="card-title">Root Relative</div>
                    <div class="card-desc">Two member search</div>
                </div>
                <div class="dashboard-card admin-card" onclick="goToAdminWithPassword()">
                    <div class="card-icon">⚙️</div>
                    <div class="card-title">Admin Use Only</div>
                    <div class="card-desc">Data management</div>
                    <span class="admin-badge">Restricted - Password Protected</span>
                </div>
            </div>
           
            <div class="bottom-row">
                <div class="exit-btn-container" onclick="logout()">
                    <span class="exit-btn-icon">🚪</span>
                    <span class="exit-btn-text">Exit to Login</span>
                    <span class="exit-btn-subtext">- (Back to main page)</span>
                </div>
                
                <div class="exit-btn-container" onclick="hardReset()" style="background: #4169E1;">
                    <span class="exit-btn-icon">⚠️</span>
                    <span class="exit-btn-text">Hard Reset</span>
                    <span class="exit-btn-subtext">- (Delete all data)</span>
                </div>
            </div>
        </div>
    `;
}

function renderAdminView() {
    document.getElementById('headerTitle').innerText = 'Admin Control Panel';
    document.getElementById('headerActions').innerHTML = `
        <span class="status-badge" id="headerStatus">📊 Total member records: ${db.length || (localStorage.getItem('familyDB') ? JSON.parse(localStorage.getItem('familyDB')).length : 0)}</span>
    `;
    
    const dbCount = db.length || (localStorage.getItem('familyDB') ? JSON.parse(localStorage.getItem('familyDB')).length : 0);
    
    const mainContent = document.getElementById('mainContent');
    mainContent.innerHTML = `
        <div class="admin-container">
            <div class="admin-title">⚙️ Admin Use Only</div>
            
            <div class="admin-grid">
                <div class="admin-card-large" onclick="loadData()">
                    <div class="admin-card-icon">📂</div>
                    <div class="admin-card-title">Load Data</div>
                    <div class="admin-card-desc">Upload Excel file to database</div>
                    <div class="data-status" style="color: #2e7d32;">
                        ${dbCount > 0 ? `✅ ${dbCount} members loaded` : '⏳ No data loaded'}
                    </div>
                </div>
                
                <div class="admin-card-large" onclick="window.location.href='11-add-data.html'">
                    <div class="admin-card-icon">✏️</div>
                    <div class="admin-card-title">Add / Edit Member</div>
                    <div class="admin-card-desc">Add new members or edit existing records</div>
                    <div class="data-status">→ Open Editor</div>
                </div>

                <div class="admin-card-large" onclick="window.location.href='12-excel-to-js-converter.html'">
                    <div class="admin-card-icon">🔄</div>
                    <div class="admin-card-title">Data Converter</div>
                    <div class="admin-card-desc">Excel to JS / JSON converter</div>
                    <div class="data-status">→ Open Converter</div>
                </div>
            </div>
            
            <div style="display: flex; gap: 25px; justify-content: center; margin-top: 30px;">
                <div class="exit-btn-container" onclick="goToDashboard()" style="background: var(--dark-blue); min-width: 200px; white-space: nowrap;">
                    <span class="exit-btn-icon">⬅️</span>
                    <span class="exit-btn-text">Back to Dashboard</span>
                </div>
                
                <div class="exit-btn-container" onclick="logout()" style="background: #5a0000; min-width: 200px; white-space: nowrap;">
                    <span class="exit-btn-icon">🚪</span>
                    <span class="exit-btn-text">Exit to Login</span>
                </div>
            </div>
        </div>
    `;
}

function autoLoadFromJS() {
    if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length > 0) {
        try {
            db = FAMILY_DATA;
            localStorage.setItem('familyDB', JSON.stringify(db));
            
            if (typeof FILE_INFO !== 'undefined') {
                localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
                console.log('✅ Timestamp saved:', FILE_INFO.saved_time);
                console.log('✅ Total members:', FILE_INFO.total_members);
            }
            
            updateHeaderStatus();
            console.log(`✅ Auto-loaded ${db.length} members`);
            
        } catch (err) {
            console.error('Error:', err);
        }
    }
}

function initializeData() {
    const saved = localStorage.getItem('familyDB');
    if (saved) {
        try {
            db = JSON.parse(saved);
            updateHeaderStatus();
            
            const savedInfo = localStorage.getItem('fileInfo');
            if (savedInfo) {
                console.log('📅 Cached timestamp:', JSON.parse(savedInfo).saved_time);
            }
            return;
        } catch (e) {
            console.error('Error parsing saved data:', e);
        }
    }

    autoLoadFromJS();
}

function checkHash() {
    const urlParams = new URLSearchParams(window.location.search);
    const isPreAuth = urlParams.get('auth') === 'true';

    if (window.location.hash === '#admin') {
        setTimeout(() => {
            if (isPreAuth || isAdminAuthenticated) {
                currentView = 'admin';
                isAdminAuthenticated = true;
                renderAdminView();
                window.history.replaceState({}, document.title, "1-dashboard-pc.html#admin");
            } else {
                const pwd = prompt('Enter Admin Password:');
                if (pwd === '6010') {
                    currentView = 'admin';
                    isAdminAuthenticated = true;
                    renderAdminView();
                } else {
                    renderDashboardView();
                }
            }
        }, 100);
    }
}

// Initialize everything
initializeData();
renderDashboardView();
checkURLParams();
checkHash();

</script>

</body>
</html>
