<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rizvi Family · Full Tree</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="13-family-data.js"></script>
    
 
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --light-pink: #ffe4e9;
            --pink-border: #fb7185;
            --connector: #b8860b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }

        .zoom-controls {
            position: absolute;
            top: 30px;
            right: 0px;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 8px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border: 2px solid var(--gold);
            background: white;
            color: var(--dark-blue);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: var(--gold);
            color: white;
        }

        .zoom-level {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 0;
        }

    .app-container {
    position: relative;
    max-width: 1400px;  /* Add this */
    width: 90%;         /* Add this */
    margin: 0 auto;     /* Keep this */
    background: white;
    height: calc(100vh - 20px);
    display: flex;
    flex-direction: column;
    border-radius: 20px;
    border: 2px solid var(--gold);
    overflow: hidden;
}

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-section {
            flex: 1;
            max-width: 450px;
            min-width: 300px;
            position: relative;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 8px 15px;
            border: 2px solid var(--gold);
            border-radius: 40px;
            font-size: 14px;
            outline: none;
            background: white;
        }

        .reset-btn-header {
            padding: 8px 18px;
            background: var(--gold);
            color: var(--dark-blue);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        .reset-btn-header:hover { background: var(--light-gold); }

        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 3000;
            margin-top: 5px;
        }

        .result-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; }
        .result-item:hover { background: #faebcd; }
        .result-name { font-weight: 700; color: var(--dark-blue); }
        .result-father { font-size: 11px; color: #666; }

        .header-actions { display: flex; gap: 10px; }

        .header-btn {
            padding: 8px 16px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        .header-btn:hover { background: var(--gold); color: var(--dark-blue); }
        .header-btn.dashboard { background: #2e7d32; border-color: transparent; color: white; }
        .header-btn.save { background: #5a0000; border-color: var(--gold); color: var(--gold); }

        .tree-wrapper {
            flex: 1;
            overflow: auto;
            background: #fffcf8;
        }

        .tree-wrapper::-webkit-scrollbar { width: 12px; height: 12px; }
        .tree-wrapper::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 6px; }
        .tree-wrapper::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 6px; }

        .tree-container {
            padding: 40px;
            min-width: max-content;
            min-height: 100%;
            display: flex;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        /* ========== TREE CONNECTION STYLES ========== */
        .tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .root-level {
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
            flex-wrap: wrap;
            gap: 30px;
        }

        .parent-down-line {
            width: 2px;
            height: 25px;
            background: #b8860b;
            margin: 0 auto;
        }

        .children-level {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 50px;
            position: relative;
            margin-top: 0;
            padding-top: 0;
        }

        .child-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .child-vertical-line {
            width: 2px;
            height: 20px;
            background: #b8860b;
            margin: 0 auto;
        }

        .sibling-bar {
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        .sibling-bar-line {
            height: 2px;
            background: #b8860b;
            width: 100%;
        }

        /* ========== BOX STYLES (COMPACT like file 2) ========== */
        .tree-box {
            border: 2px solid var(--gold);
            border-radius: 12px;
            background: white;
            width: 220px;
            min-width: 220px;
            max-width: 220px;
            text-align: left;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .tree-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .tree-box.female {
            background: var(--light-pink);
            border-color: var(--pink-border);
        }

        .tree-box.selected {
            animation: gentleBeat 2.2s infinite;
            border-width: 4px;
            z-index: 10;
        }

        @keyframes gentleBeat {
            0% { border-color: #2e7d32; background: #ffffff; transform: scale(1.02); box-shadow: 0 0 15px rgba(46,125,50,0.3); }
            50% { border-color: #4caf50; background: #c8e6c9; transform: scale(1.05); box-shadow: 0 0 25px rgba(76,175,80,0.6); }
            100% { border-color: #2e7d32; background: #ffffff; transform: scale(1.02); box-shadow: 0 0 15px rgba(46,125,50,0.3); }
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 8px;
            background: #f8fafc;
            border-bottom: 2px solid var(--gold);
            border-radius: 10px 10px 0 0;
        }

        .tree-box.female .box-header {
            background: #ffe0e6;
        }

        .tree-box.selected .box-header {
            background: white !important;
        }

        .box-body {
            padding: 6px 8px;
            min-height: 80px;
        }

        .member-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 12px;
            color: var(--dark-blue);
        }

        .info-text {
            font-size: 9px;
            margin-top: 3px;
            color: #333;
            line-height: 1.3;
        }

        .info-text .label {
            font-weight: 700;
            color: var(--maroon);
            display: inline-block;
            min-width: 45px;
            font-size: 9px;
        }

        .gen-badge {
            background: #e0e0e0;
            padding: 1px 5px;
            border-radius: 20px;
            font-size: 8px;
            font-weight: 600;
            color: var(--maroon);
        }

        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--gold);
            color: var(--dark-blue);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .info-icon:hover {
            background: var(--light-gold);
            transform: scale(1.1);
        }

        .footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 11px;
            border-top: 2px solid var(--gold);
            flex-shrink: 0;
        }

        .save-options-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 3px solid var(--gold);
            border-radius: 12px;
            padding: 25px;
            z-index: 4000;
            min-width: 350px;
            display: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3999;
            display: none;
        }

        .loading-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #5a0000;
            color: white;
            padding: 20px 40px;
            border-radius: 8px;
            z-index: 5000;
            font-weight: 600;
            display: none;
            white-space: nowrap;
        }

        .capture-clone {
            position: fixed;
            top: -9999px;
            left: 0;
            background: white;
            z-index: -1;
        }

        @media print {
            @page {
                size: auto;
                margin: 5mm;
            }
            
            .zoom-controls, .app-header, .footer, .save-options-modal, .modal-overlay, .loading-msg, .header-actions, .reset-btn-header {
                display: none !important;
            }
            body {
                height: auto !important;
                overflow: visible !important;
                background: white;
                padding: 0;
                margin: 0;
                width: 100%;
            }
            .app-container {
                height: auto !important;
                overflow: visible !important;
                border: none;
                display: block;
                max-width: 100%;
            }
            .tree-wrapper {
                overflow: visible !important;
                height: auto !important;
                display: block;
                max-width: 100%;
            }
            .tree-container {
                transform: scale(1) !important;
                padding: 10px !important;
                margin: 0 !important;
                display: block;
                width: 100%;
                min-width: auto;
                max-width: none;
            }
            .tree {
                width: 100%;
                max-width: none;
            }
            .root-level {
                flex-wrap: nowrap !important;
                justify-content: flex-start !important;
                gap: 20px !important;
            }
            .children-level {
                flex-wrap: nowrap !important;
                gap: 20px !important;
            }
            .tree-box {
                break-inside: avoid;
                page-break-inside: avoid;
                width: 250px !important;
                min-width: 200px !important;
            }
            body, .app-container, .tree-wrapper, .tree-container, .tree {
                width: auto !important;
                min-width: 100% !important;
                max-width: none !important;
                overflow-x: visible !important;
            }
            .root-level, .children-level {
                flex-wrap: nowrap !important;
                display: flex !important;
                flex-direction: row !important;
                width: max-content !important;
                min-width: 100% !important;
            }
        }
    </style>



</head>
<body>

    <div class="zoom-controls">
        <div class="zoom-btn" onclick="zoomIn()">+</div>
        <div class="zoom-level" id="zoomLevel">100%</div>
        <div class="zoom-btn" onclick="zoomOut()">-</div>
        <div class="zoom-btn" onclick="resetZoom()">↺</div>
    </div>

    <div class="app-container">
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌳</span>
                <span>Rizvi Family · Full Tree</span>
            </div>
            <div class="search-section">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search any member..." autocomplete="off">
                <button class="reset-btn-header" id="resetRootBtn">🔄 Reset</button>
                <div id="searchDropdown" class="search-dropdown"></div>
            </div>
            <div class="header-actions">
                <div class="header-btn dashboard" onclick="goToDashboard()">🏠 Dashboard</div>
                <div class="header-btn save" onclick="showSaveModal()">💾 Save Tree</div>
            </div>
        </div>

        <div class="tree-wrapper" id="treeWrapper">
            <div class="tree-container" id="treeContainer">
                <div id="treeRoot">Loading family tree...</div>
            </div>
        </div>

        <div class="footer">
            Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010
        </div>
    </div>

    <div class="save-options-modal" id="saveModal">
        <h3 style="color:var(--maroon); margin-bottom:20px; text-align:center;">💾 Save Family Tree</h3>
        <div style="margin-bottom:20px;">
            <label style="display:block; margin-bottom:15px; padding:10px; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer;">
                <input type="radio" name="saveFormat" value="pdf-high" checked> 📑 PDF - High Resolution
            </label>
            <label style="display:block; margin-bottom:15px; padding:10px; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer;">
                <input type="radio" name="saveFormat" value="pdf-low"> 📑 PDF - Low Resolution
            </label>
            <label style="display:block; margin-bottom:15px; padding:10px; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer;">
                <input type="radio" name="saveFormat" value="jpeg"> 📸 JPEG Image
            </label>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="processSave()" style="flex:2; padding:12px; background:#2e7d32; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600;">Save</button>
            <button onclick="closeSaveModal()" style="flex:1; padding:12px; background:#f0f0f0; border:1px solid #ccc; border-radius:6px; cursor:pointer;">Cancel</button>
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay" onclick="closeSaveModal()"></div>
    <div class="loading-msg" id="loadingMsg">📄 Generating file, please wait...</div>

    <script>
        let familyDB = [];
        let zoomLevel = 1;
        let currentSelectedBox = null;
        let memberElements = new Map();

        function displayName(str) {
            if (!str) return '';
            return str.replace(/[\s-\.۔]*\d+$/, '').trim();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }

        function showInfoModal(memberName) {
            const member = familyDB.find(m => m.name === memberName);
            if (!member) return;
            const detailsText = member.details && member.details.trim() !== '' && member.details !== '—' 
                ? member.details : 'No additional information available.';
            
            let overlay = document.getElementById('infoModalOverlay');
            let modal = document.getElementById('infoModal');
            
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'infoModalOverlay';
                overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:none';
                document.body.appendChild(overlay);
                
                modal = document.createElement('div');
                modal.id = 'infoModal';
                modal.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border:3px solid #d4af37;border-radius:12px;padding:20px;min-width:300px;max-width:450px;z-index:10000;display:none;font-family:Inter,sans-serif';
                document.body.appendChild(modal);
            }
            
            modal.innerHTML = `
                <h3 style="color:#5a0000;font-family:Playfair Display;font-size:20px;margin:0 0 8px 0;padding:0 0 8px 0;border-bottom:2px solid #d4af37;">ℹ️ Other Informations</h3>
                <p style="font-size:14px;line-height:1.5;margin:12px 0 0 0;white-space:pre-wrap;word-break:break-word;color:#333;max-height:300px;overflow-y:auto;">${escapeHtml(detailsText)}</p>
                <button onclick="closeInfoModal()" style="margin-top:20px;padding:8px 20px;background:#d4af37;color:#0f172a;border:none;border-radius:6px;cursor:pointer;font-weight:600;width:100%;">Close</button>
            `;
            modal.style.display = 'block';
            overlay.style.display = 'block';
            
            window.closeInfoModal = function() {
                modal.style.display = 'none';
                overlay.style.display = 'none';
            };
        }

        function extractGenNumber(genStr) {
            if (!genStr) return 999;
            const match = genStr.match(/\d+/);
            return match ? parseInt(match[0]) : 999;
        }

                function buildTreeStructure() {
            const childrenMap = new Map();
            const allNames = new Set();
            familyDB.forEach(m => allNames.add(m.name));
            
            familyDB.forEach(m => {
                if (m.father && m.father !== '---' && m.father !== '' && m.father !== '—') {
                    if (allNames.has(m.father)) {
                        if (!childrenMap.has(m.father)) childrenMap.set(m.father, []);
                        childrenMap.get(m.father).push(m);
                    }
                }
            });
            
            // Sort children: S1, S2, S3... then D1, D2, D3...
            for (let [father, children] of childrenMap) {
                children.sort((a, b) => {
                    const genA = a.gen || '';
                    const genB = b.gen || '';
                    
                    // Extract type (S or D) and number
                    const matchA = genA.match(/([SD])(\d+)/);
                    const matchB = genB.match(/([SD])(\d+)/);
                    
                    if (matchA && matchB) {
                        const typeA = matchA[1];
                        const typeB = matchB[1];
                        const numA = parseInt(matchA[2], 10);
                        const numB = parseInt(matchB[2], 10);
                        
                        // S comes before D
                        if (typeA !== typeB) {
                            return typeA === 'S' ? -1 : 1;
                        }
                        // Same type, sort by number
                        return numA - numB;
                    }
                    
                    // Fallback to original sorting
                    const genNumA = extractGenNumber(a.gen);
                    const genNumB = extractGenNumber(b.gen);
                    if (genNumA !== genNumB) return genNumA - genNumB;
                    return a.name.localeCompare(b.name);
                });
            }
            
            const roots = familyDB.filter(m => {
                if (!m.father || m.father === '---' || m.father === '' || m.father === '—') return true;
                return !allNames.has(m.father);
            });
            
            return { roots, childrenMap };
        }

        function renderTreeNode(parent, childrenMap, isRoot = false) {
            const children = childrenMap.get(parent.name) || [];
            if (children.length === 0) {
                return `<div class="child-node">${!isRoot ? '<div class="child-vertical-line"></div>' : ''}${renderBox(parent)}</div>`;
            }
            let childrenHtml = '';
            for (const child of children) childrenHtml += renderTreeNode(child, childrenMap, false);
            return `<div class="child-node">${!isRoot ? '<div class="child-vertical-line"></div>' : ''}${renderBox(parent)}<div class="parent-down-line"></div><div class="sibling-bar"><div class="sibling-bar-line"></div></div><div class="children-level">${childrenHtml}</div></div>`;
        }

        function renderBox(member) {
            const isFemale = member.gender && (member.gender.startsWith('F') || member.gender === 'FEMALE');
            const father = member.father && member.father !== '---' && member.father !== '—' ? member.father : '—';
            const mother = member.mother && member.mother !== '---' && member.mother !== '—' ? member.mother : '—';
            const spouse = member.spouse && member.spouse !== '---' && member.spouse !== '—' ? member.spouse : '—';
            const hasDetails = member.details && member.details.trim() !== '' && member.details !== '—';
            const safeName = member.name.replace(/'/g, "\\'");
            const femaleClass = isFemale ? 'female' : '';
            
            return `
                <div class="tree-box ${femaleClass}" data-name="${member.name}">
                    <div class="box-header">
                        <span class="member-name">${isFemale ? '👩' : '👨'} ${displayName(member.name)}</span>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="gen-badge">${member.gen || '—'}</span>
                            ${hasDetails ? `<div class="info-icon" onclick="event.stopPropagation(); showInfoModal('${safeName}')">ℹ️</div>` : ''}
                        </div>
                    </div>
                    <div class="box-body">
                        <div class="info-text"><span class="label">📌 Father:</span> ${displayName(father)}</div>
                        <div class="info-text"><span class="label">👩 Mother:</span> ${displayName(mother)}</div>
                        <div class="info-text"><span class="label">💍 Spouse:</span> ${displayName(spouse)}</div>
                    </div>
                </div>
            `;
        }

        function renderFullTree() {
            if (!familyDB.length) {
                document.getElementById('treeRoot').innerHTML = '<div style="text-align:center; padding:60px;">❌ No family data loaded.</div>';
                return;
            }
            const { roots, childrenMap } = buildTreeStructure();
            if (roots.length === 0) {
                document.getElementById('treeRoot').innerHTML = '<div style="text-align:center; padding:60px;">❌ No root ancestors found.</div>';
                return;
            }
            let html = `<div class="tree"><div class="root-level" id="rootLevelContainer">`;
            for (const root of roots) {
                const children = childrenMap.get(root.name) || [];
                if (children.length === 0) {
                    html += `<div class="child-node root-node">${renderBox(root)}</div>`;
                } else {
                    html += `<div class="child-node root-node">${renderBox(root)}<div class="parent-down-line"></div><div class="sibling-bar"><div class="sibling-bar-line"></div></div><div class="children-level">`;
                    for (const child of children) html += renderTreeNode(child, childrenMap, false);
                    html += `</div></div>`;
                }
            }
            html += `</div></div>`;
            document.getElementById('treeRoot').innerHTML = html;
            
            memberElements.clear();
            document.querySelectorAll('.tree-box').forEach(box => {
                const name = box.getAttribute('data-name');
                if (name) {
                    memberElements.set(name, box);
                    box.addEventListener('click', (e) => {
                        if (e.target.classList.contains('info-icon')) return;
                        e.stopPropagation();
                        selectBox(box);
                    });
                }
            });
        }
        
        function selectBox(box) {
            if (currentSelectedBox) {
                currentSelectedBox.classList.remove('selected');
            }
            box.classList.add('selected');
            currentSelectedBox = box;
        }
        
              function handleOutsideClick(e) {
            // Do nothing - keep selection blinking
        }

        function scrollRootIntoView() {
            setTimeout(() => {
                const rootNodes = document.querySelectorAll('.root-node');
                if (rootNodes.length > 0) {
                    rootNodes[0].scrollIntoView({ behavior: 'smooth', block: 'start', inline: 'center' });
                }
            }, 100);
        }

        function resetToRoot() {
            if (currentSelectedBox) {
                currentSelectedBox.classList.remove('selected');
                currentSelectedBox = null;
            }
            document.getElementById('searchInput').value = '';
            renderFullTree();
            scrollRootIntoView();
        }

        function setupSearch() {
            const input = document.getElementById('searchInput');
            const dropdown = document.getElementById('searchDropdown');
            input.addEventListener('input', function() {
                const query = this.value.trim().toLowerCase();
                if (query.length < 2) { dropdown.style.display = 'none'; return; }
                const results = familyDB.filter(m => m.name.toLowerCase().includes(query) || (m.father && m.father.toLowerCase().includes(query))).slice(0, 15);
                if (results.length === 0) { dropdown.style.display = 'none'; return; }
                dropdown.innerHTML = '';
                results.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `<div class="result-name">${displayName(m.name)} <span style="font-size:10px; color:#5a0000;">${m.gen || ''}</span></div><div class="result-father">👨 Father: ${displayName(m.father) || 'Unknown'}</div>`;
                    div.onclick = () => { 
                        jumpToMember(m.name); 
                        dropdown.style.display = 'none'; 
                        input.value = displayName(m.name); 
                        input.blur(); 
                    };
                    dropdown.appendChild(div);
                });
                dropdown.style.display = 'block';
            });
            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
            });
        }
        
        function jumpToMember(name) {
            const element = memberElements.get(name);
            if (!element) { alert(`⚠️ Member "${displayName(name)}" not visible.`); return; }
            if (currentSelectedBox) {
                currentSelectedBox.classList.remove('selected');
            }
            element.classList.add('selected');
            currentSelectedBox = element;
            element.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
        }

        function zoomIn() { zoomLevel = Math.min(zoomLevel + 0.1, 2.5); document.getElementById('treeContainer').style.transform = `scale(${zoomLevel})`; document.getElementById('treeContainer').style.transformOrigin = 'top left'; document.getElementById('zoomLevel').textContent = Math.round(zoomLevel * 100) + '%'; }
        function zoomOut() { zoomLevel = Math.max(zoomLevel - 0.1, 0.5); document.getElementById('treeContainer').style.transform = `scale(${zoomLevel})`; document.getElementById('treeContainer').style.transformOrigin = 'top left'; document.getElementById('zoomLevel').textContent = Math.round(zoomLevel * 100) + '%'; }
        function resetZoom() { zoomLevel = 1; document.getElementById('treeContainer').style.transform = 'scale(1)'; document.getElementById('zoomLevel').textContent = '100%'; }

        function showSaveModal() { document.getElementById('saveModal').style.display = 'block'; document.getElementById('modalOverlay').style.display = 'block'; }
        function closeSaveModal() { document.getElementById('saveModal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }
        function showLoading(text) { const msg = document.getElementById('loadingMsg'); msg.textContent = text; msg.style.display = 'block'; }
        function hideLoading() { document.getElementById('loadingMsg').style.display = 'none'; }
        
async function processSave() {
    const selectedFormat = document.querySelector('input[name="saveFormat"]:checked').value;
    closeSaveModal();
    showLoading('Optimizing tree for export...');

    const treeContainer = document.getElementById('treeContainer');
    const originalTransform = treeContainer.style.transform;

    // 1. Reduce the internal rendering size to avoid memory crashes
    // We set scale to 1 (or 0.75 for very large trees) to keep the "pixel count" low
    const exportScale = 1; 

    try {
        // Temporarily flatten the tree for the capture engine
        treeContainer.style.transform = 'none';
        await new Promise(r => setTimeout(r, 500));

        const canvas = await html2canvas(treeContainer, {
            useCORS: true,
            scale: exportScale, 
            backgroundColor: '#fffcf8',
            width: treeContainer.scrollWidth,
            height: treeContainer.scrollHeight,
            logging: false
        });

        // Use a balanced compression to keep file size small but text readable
        const imgData = canvas.toDataURL('image/jpeg', 0.7);

        if (selectedFormat === 'jpeg') {
            const link = document.createElement('a');
            link.download = `Rizvi-Family-Tree.jpg`;
            link.href = imgData;
            link.click();
        } else {
            const { jsPDF } = window.jspdf;
            const orientation = canvas.width > canvas.height ? 'l' : 'p';
            
            // 2. Create a PDF with a large physical size
            // This ensures that when you open it, you can zoom in 400% or 800% 
            // and the text remains sharp.
            const pdf = new jsPDF(orientation, 'px', [canvas.width, canvas.height]);
            
            pdf.addImage(imgData, 'JPEG', 0, 0, canvas.width, canvas.height, undefined, 'FAST');
            pdf.save(`Rizvi-Family-Tree-Zoomable.pdf`);
        }
    } catch (error) {
        console.error("Export Error:", error);
        alert("The tree is too massive for a single capture. Please use 'Ctrl+P' and select 'Save as PDF'.");
    } finally {
        treeContainer.style.transform = originalTransform;
        hideLoading();
    }
}

        function goToDashboard() { window.location.href = '1-dashboard-pc.html'; }
        
        function init() {
            if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length) { familyDB = FAMILY_DATA; }
            else { const saved = localStorage.getItem('familyDB'); if (saved) familyDB = JSON.parse(saved); }
            if (!familyDB.length) { document.getElementById('treeRoot').innerHTML = '<div style="text-align:center; padding:60px;">❌ No family data found.</div>'; return; }
            renderFullTree();
            setupSearch();
            resetZoom();
            document.getElementById('resetRootBtn').onclick = resetToRoot;
            scrollRootIntoView();
            document.addEventListener('click', handleOutsideClick);
        }
        
        document.addEventListener('DOMContentLoaded', init);
        window.zoomIn = zoomIn;
        window.zoomOut = zoomOut;
        window.resetZoom = resetZoom;
        window.goToDashboard = goToDashboard;
        window.showSaveModal = showSaveModal;
        window.closeSaveModal = closeSaveModal;
        window.processSave = processSave;
        window.showInfoModal = showInfoModal;
    </script>

</body>
