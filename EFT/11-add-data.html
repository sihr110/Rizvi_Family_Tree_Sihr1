<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Rizvi Family Tree · Import & Edit</title>
  <style>

.rtl-mode {
  direction: rtl;
  text-align: right;
  font-family: 'Segoe UI', Tahoma, sans-serif;
}

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #e9eef3 0%, #dce3ec 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1rem;
      color: #1a2c3e;
    }

    .family-card {
      max-width: 1400px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 1.5rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .tree-header {
      background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%);
      padding: 1rem 1.5rem;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .header-title h1 {
      font-weight: 600;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title h1::before {
      content: "🌳";
      font-size: 1.4rem;
    }

    .lang-switch {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.15);
      padding: 6px 16px;
      border-radius: 50px;
    }

    .lang-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 40px;
      color: white;
      opacity: 0.7;
    }

    .lang-btn.active {
      background: white;
      color: #1e3c2c;
      opacity: 1;
    }

    .online-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #2ecc71;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    .status-text {
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 30px;
    }

    .form-container {
      padding: 1.2rem 1rem 1.5rem 1rem;
    }

    .toolbar {
      display: flex;
      gap: 0.8rem;
      margin: 0.5rem 0 1rem 0;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-size: 0.85rem;
      transition: 0.1s ease;
    }

    .btn-primary {
      background: #2a7f49;
      color: white;
    }

    .btn-excel {
      background: #1f5e3a;
      color: white;
    }

    .btn-edit {
      background: #d4891a;
      color: white;
    }

    .btn-edit.edit-mode-active {
      background: #f5c542 !important;
      color: #1e3c2c !important;
    }

    .btn-copy {
      background: #1e3c2c;
      color: white;
    }

    .stats {
      background: #ddeeff;
      padding: 5px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 1rem;
      border: 1px solid #e2edf2;
      background: white;
      margin-top: 0.8rem;
      max-height: 65vh;
      overflow-y: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      table-layout: fixed;
    }

    .data-table th {
      background: #f0f6f0;
      padding: 12px 8px;
      text-align: center;
      font-weight: 700;
      color: #1a4b2a;
      border: 1px solid #cbe0ce;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .data-table td {
      padding: 8px 6px;
      border: 1px solid #cbe0ce;
      vertical-align: top;
      white-space: normal;
      word-wrap: break-word;
      word-break: break-word;
    }

    .data-table th:nth-child(1), .data-table td:nth-child(1) { width: 18%; }
    .data-table th:nth-child(2), .data-table td:nth-child(2) { width: 15%; }
    .data-table th:nth-child(3), .data-table td:nth-child(3) { width: 15%; }
    .data-table th:nth-child(4), .data-table td:nth-child(4) { width: 14%; }
    .data-table th:nth-child(5), .data-table td:nth-child(5) { width: 8%; }
    .data-table th:nth-child(6), .data-table td:nth-child(6) { width: 8%; }
    .data-table th:nth-child(7), .data-table td:nth-child(7) { width: 14%; }
    .data-table th:nth-child(8), .data-table td:nth-child(8) { width: 8%; }

    @media (max-width: 768px) {
      .data-table td, .data-table th {
        font-size: 0.7rem;
        padding: 6px 4px;
      }
    }

    .data-table textarea,
    .data-table input,
    .data-table select {
      width: 100%;
      padding: 8px 4px;
      border: none;
      font-size: 0.8rem;
      font-family: inherit;
      background: transparent;
      resize: vertical;
    }

    .data-table textarea {
      min-height: 40px;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      border-radius: 20px;
      color: #c0392b;
    }

    .dropdown-button {
      width: 100%;
      padding: 6px 4px;
      background: transparent;
      border: none;
      font-size: 0.8rem;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: inherit;
    }

    .mobile-dropdown-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 20000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .mobile-dropdown-panel {
      background: white;
      width: 100%;
      max-width: 600px;
      border-radius: 28px 28px 0 0;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
    }

    .dropdown-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid #e2edf2;
      display: flex;
      justify-content: space-between;
      font-weight: 700;
    }

    .close-dropdown {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: #2a7f49;
    }

    .dropdown-search-mobile {
      padding: 12px 16px;
      border-bottom: 1px solid #eef2f5;
    }

    .dropdown-search-mobile input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cfdfe8;
      border-radius: 40px;
    }

    .dropdown-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0 20px;
    }

    .mobile-option {
      padding: 14px 18px;
      border-bottom: 1px solid #f0f4f8;
      cursor: pointer;
    }

    .mobile-option:active {
      background: #eef6ef;
    }

    .option-name {
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .option-parent {
      font-size: 0.75rem;
      color: #5f7a6e;
      margin-left: 28px;
      margin-top: 4px;
    }

    .paste-dialog {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 2px solid #1e3a4d;
      border-radius: 20px;
      padding: 20px;
      z-index: 30000;
      width: 90%;
      max-width: 650px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.3);
    }

    .paste-dialog textarea {
      width: 100%;
      padding: 12px;
      font-family: monospace;
      font-size: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
<div class="family-card">
  <div class="tree-header">
    <div class="header-title"><h1>Rizvi Family Tree</h1><p style="font-size: 0.7rem; opacity: 0.8;">Designed by Imran Haider</p></div>
    <div class="lang-switch">
      <button id="btnEnglish" class="lang-btn active">E</button>
      <button id="btnUrdu" class="lang-btn">U</button>
      <div class="status-text"><span class="online-dot"></span><span id="onlineStatus">Online</span></div>
    </div>
  </div>
  <div class="form-container">
    <div class="toolbar">
      <div class="btn-group">
        <button id="addRowBtn" class="btn btn-primary">➕ Add New Member</button>
        <button id="pasteExcelBtn" class="btn btn-excel">📋 Paste from Excel</button>
        <button id="editDataBtn" class="btn btn-edit">✏️ Edit Data</button>
      </div>
      <div>
        <button id="copyBtn" class="btn btn-copy">📋 Copy for WhatsApp</button>
        <span id="rowCount" class="stats">0 members</span>
      </div>
    </div>
    <div class="table-wrapper">
      <table class="data-table" id="familyTable">
        <thead><tr><th>Name</th><th>Father</th><th>Mother</th><th>Spouse</th><th>Gen</th><th>Gender</th><th>Details</th><th></th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>





<script>
  // ======================== GLOBAL STATE ========================
  let mainData = [];           // master reference from 13-family-data.js (optional fallback)
  let rows = [];              // editable rows array
  let currentLang = 'en';
  let editMode = false;
  let activeMobilePanel = null;

  // Helper functions
  function generateId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 10); }
  function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'); }); }

  // load external family data if exists (13-family-data.js)
  function loadExternalFamilyData() {
    if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA && FAMILY_DATA.length) {
      mainData = FAMILY_DATA.map(p => ({
        name: p.name, father: p.father || "", mother: p.mother || "", spouse: p.spouse || "",
        gen: p.gen || "", gender: p.gender === "MALE" ? "Male" : "Female", detail: p.details || ""
      }));
      return true;
    } else {
      console.warn("13-family-data.js not loaded, using empty default");
      mainData = [];
      return false;
    }
  }

  // find person from master reference
  function findPerson(name) { if (!name) return null; return mainData.find(p => p.name.toLowerCase() === name.toLowerCase()); }
  function getSpouse(name) { let p = findPerson(name); return p ? (p.spouse || "") : ""; }
  function getParentLine(person) { if (!person) return ""; if (person.father) return "S/o " + person.father; return ""; }
  function getAllMaleMembers() { return mainData.filter(p => p.gender === "Male"); }
  function getAllMembers() { return mainData; }
  function extractGenNumber(gen) { if (!gen) return 0; const match = gen.match(/[SD](\d+)$/); return match ? parseInt(match[1]) : 0; }

  function generateGenWithSequence(fatherName, childGender, sequenceNumber) {
    if (!fatherName) return "";
    let father = findPerson(fatherName);
    if (!father || !father.gen) return "";
    let match = father.gen.match(/(G-\d+)/);
    if (!match) return "";
    let nextGenNumber = parseInt(match[1].split('-')[1]) + 1;
    let nextGenPrefix = "G-" + String(nextGenNumber).padStart(3, '0');
    let suffix = childGender === 'Male' ? 'S' : 'D';
    return nextGenPrefix + "-" + suffix + sequenceNumber;
  }

  function getMaxChildNumber(fatherName, gender, excludeRow = null) {
    let maxNum = 0;
    for (let p of mainData) {
      if (p.father === fatherName && p.gender === gender && p.gen) {
        let num = extractGenNumber(p.gen);
        if (num > maxNum) maxNum = num;
      }
    }
    for (let r of rows) {
      if (r !== excludeRow && r.father === fatherName && r.gender === gender && r.gen) {
        let num = extractGenNumber(r.gen);
        if (num > maxNum) maxNum = num;
      }
    }
    return maxNum;
  }

  function createEmptyRow(inheritFromFirst = false) {
    let base = {
      id: generateId(), name: "", father: "", mother: "", spouse: "",
      gen: "", gender: "Male", detail: "",
      _nameEn: "", _fatherEn: "", _motherEn: "", _spouseEn: "", _detailEn: ""
    };
    if (inheritFromFirst && rows.length > 0 && rows[0].father) {
      base.father = rows[0].father;
      base.mother = rows[0].mother;
      base._fatherEn = rows[0].father;
      base._motherEn = rows[0].mother;
      if (base.father) {
        let maxNum = getMaxChildNumber(base.father, base.gender);
        base.gen = generateGenWithSequence(base.father, base.gender, maxNum + 1);
      }
    }
    return base;
  }

  function closeMobileDropdown() {
    if (activeMobilePanel && activeMobilePanel.parentNode) activeMobilePanel.parentNode.removeChild(activeMobilePanel);
    activeMobilePanel = null;
  }

  // update row after father selection
  function updateRowFromFather(selected, targetRow) {
    if (!targetRow) return;
    targetRow.father = selected.name;
    targetRow.mother = getSpouse(selected.name);
    targetRow._fatherEn = targetRow.father;
    targetRow._motherEn = targetRow.mother;
    if (targetRow.father) {
      let maxNum = getMaxChildNumber(targetRow.father, targetRow.gender, targetRow);
      targetRow.gen = generateGenWithSequence(targetRow.father, targetRow.gender, maxNum + 1);
    }
    // propagate if first row changed (optional but for consistency)
    if (rows.indexOf(targetRow) === 0) {
      for (let i = 1; i < rows.length; i++) {
        rows[i].father = targetRow.father;
        rows[i].mother = targetRow.mother;
        rows[i]._fatherEn = targetRow.father;
        rows[i]._motherEn = targetRow.mother;
        if (rows[i].father) {
          let childMax = getMaxChildNumber(rows[i].father, rows[i].gender, rows[i]);
          rows[i].gen = generateGenWithSequence(rows[i].father, rows[i].gender, childMax + 1);
        }
      }
    }
    renderTable();
  }

  function openFatherDropdownForRow(targetRow) {
    if (activeMobilePanel) closeMobileDropdown();
    const overlay = document.createElement('div');
    overlay.className = 'mobile-dropdown-overlay';
    const panelDiv = document.createElement('div');
    panelDiv.className = 'mobile-dropdown-panel';
    const header = document.createElement('div');
    header.className = 'dropdown-header';
    header.innerHTML = `<span>👨 Select Father (Male only)</span><button class="close-dropdown">✕</button>`;
    panelDiv.appendChild(header);
    const searchDiv = document.createElement('div');
    searchDiv.className = 'dropdown-search-mobile';
    const searchInput = document.createElement('input');
    searchInput.type = 'search';
    searchInput.placeholder = '🔍 Search father name...';
    searchDiv.appendChild(searchInput);
    panelDiv.appendChild(searchDiv);
    const listContainer = document.createElement('div');
    listContainer.className = 'dropdown-list';
    panelDiv.appendChild(listContainer);
    overlay.appendChild(panelDiv);
    document.body.appendChild(overlay);
    activeMobilePanel = overlay;

    const maleMembers = getAllMaleMembers();
    function renderOptions(filterText = '') {
      listContainer.innerHTML = '';
      let filtered = maleMembers.filter(p => p.name.toLowerCase().includes(filterText.toLowerCase()));
      if (filtered.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'mobile-option';
        emptyMsg.innerHTML = '<div class="option-name">❌ No male members found</div>';
        listContainer.appendChild(emptyMsg);
        return;
      }
      for (let person of filtered) {
        const optionDiv = document.createElement('div');
        optionDiv.className = 'mobile-option';
        const parentLine = getParentLine(person);
        optionDiv.innerHTML = `<div class="option-name">👨 <strong>${escapeHtml(person.name)}</strong> ${person.gen ? '(' + person.gen + ')' : ''}</div>${parentLine ? `<div class="option-parent">${escapeHtml(parentLine)}</div>` : ''}`;
        optionDiv.onclick = () => { updateRowFromFather(person, targetRow); closeMobileDropdown(); };
        listContainer.appendChild(optionDiv);
      }
    }
    renderOptions('');
    searchInput.oninput = (e) => renderOptions(e.target.value);
    header.querySelector('.close-dropdown').onclick = () => closeMobileDropdown();
    overlay.onclick = (e) => { if (e.target === overlay) closeMobileDropdown(); };
  }

  function attachFatherDropdownToCell(cellElement, currentVal, rowObject) {
    cellElement.innerHTML = '';
    const wrapper = document.createElement('div');
    wrapper.style.width = '100%';
    const triggerBtn = document.createElement('button');
    triggerBtn.className = 'dropdown-button';
    let displayText = currentVal || '▼ Select Father';
    triggerBtn.innerHTML = `<span>${escapeHtml(displayText)}</span> <span style="color:#2a7f49;">▼</span>`;
    wrapper.appendChild(triggerBtn);
    cellElement.appendChild(wrapper);
    triggerBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); openFatherDropdownForRow(rowObject); };
  }

  // Name search dropdown for edit mode (select preset person)
  function openNameSearchDropdown(currentRow, buttonElement) {
    if (!editMode) return;
    if (activeMobilePanel) closeMobileDropdown();
    const overlay = document.createElement('div');
    overlay.className = 'mobile-dropdown-overlay';
    const panelDiv = document.createElement('div');
    panelDiv.className = 'mobile-dropdown-panel';
    const header = document.createElement('div');
    header.className = 'dropdown-header';
    header.innerHTML = `<span>🔍 Select member to load data</span><button class="close-dropdown">✕</button>`;
    panelDiv.appendChild(header);
    const searchDiv = document.createElement('div');
    searchDiv.className = 'dropdown-search-mobile';
    const searchInput = document.createElement('input');
    searchInput.placeholder = '🔍 Search name...';
    searchDiv.appendChild(searchInput);
    panelDiv.appendChild(searchDiv);
    const listContainer = document.createElement('div');
    listContainer.className = 'dropdown-list';
    panelDiv.appendChild(listContainer);
    overlay.appendChild(panelDiv);
    document.body.appendChild(overlay);
    activeMobilePanel = overlay;

    const allMembers = getAllMembers();
    function renderOptions(filterText = '') {
      listContainer.innerHTML = '';
      let filtered = allMembers.filter(p => p.name.toLowerCase().includes(filterText.toLowerCase()));
      if (filtered.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'mobile-option';
        emptyMsg.innerHTML = '<div class="option-name">❌ No members found</div>';
        listContainer.appendChild(emptyMsg);
        return;
      }
      for (let person of filtered) {
        const optionDiv = document.createElement('div');
        optionDiv.className = 'mobile-option';
        const icon = person.gender === 'Male' ? '👨' : '👩';
        const parentLine = getParentLine(person);
        optionDiv.innerHTML = `<div class="option-name">${icon} <strong>${escapeHtml(person.name)}</strong> ${person.gen ? '(' + person.gen + ')' : ''}</div>${parentLine ? `<div class="option-parent">${escapeHtml(parentLine)}</div>` : ''}`;
        optionDiv.onclick = () => {
          currentRow.name = person.name;
          currentRow.father = person.father || "";
          currentRow.mother = person.mother || "";
          currentRow.spouse = person.spouse || "";
          currentRow.gen = person.gen || "";
          currentRow.gender = person.gender;
          currentRow.detail = person.detail || "";
          currentRow._nameEn = person.name;
          currentRow._fatherEn = person.father || "";
          currentRow._motherEn = person.mother || "";
          currentRow._spouseEn = person.spouse || "";
          currentRow._detailEn = person.detail || "";
          if (buttonElement) buttonElement.innerHTML = `<span>${escapeHtml(person.name)}</span> <span style="color:#2a7f49;">▼</span>`;
          closeMobileDropdown();
          renderTable();
        };
        listContainer.appendChild(optionDiv);
      }
    }
    renderOptions('');
    searchInput.oninput = (e) => renderOptions(e.target.value);
    header.querySelector('.close-dropdown').onclick = () => closeMobileDropdown();
    overlay.onclick = (e) => { if (e.target === overlay) closeMobileDropdown(); };
  }

  function attachNameEditDropdown(cellElement, currentRow) {
    cellElement.innerHTML = '';
    const wrapper = document.createElement('div');
    const triggerBtn = document.createElement('button');
    triggerBtn.className = 'dropdown-button';
    let displayText = currentRow.name || '▼ Select Member to Edit';
    triggerBtn.innerHTML = `<span>${escapeHtml(displayText)}</span> <span style="color:#2a7f49;">▼</span>`;
    wrapper.appendChild(triggerBtn);
    cellElement.appendChild(wrapper);
    triggerBtn.onclick = (e) => { e.preventDefault(); openNameSearchDropdown(currentRow, triggerBtn); };
  }

function onEdit(row, field, val) {
    // Update the display field
    row[field] = val;
    
    // Automatically update the hidden English source for all text fields
    if (['name', 'father', 'mother', 'spouse', 'detail'].includes(field)) {
      row['_' + field + 'En'] = val;
    }
    
    // Keep Gen uppercase if that's your preference
    if (field === 'gen') {
      row.gen = val.toUpperCase();
    }
    
    renderTable();
  }

  function changeGender(row, newGender) {
    if (row.gender === newGender) return;
    row.gender = newGender;
    if (row.father) {
      let maxNum = getMaxChildNumber(row.father, newGender, row);
      row.gen = generateGenWithSequence(row.father, newGender, maxNum + 1);
    }
    renderTable();
  }

  function addMember() {
    let newRow = createEmptyRow(true);
    rows.push(newRow);
    renderTable();
    setTimeout(() => { const wrapper = document.querySelector('.table-wrapper'); if (wrapper) wrapper.scrollTop = wrapper.scrollHeight; }, 50);
  }

  function deleteRow(idx) {
    if (rows.length === 1) { alert("Cannot delete last member."); return; }
    if (confirm("Delete this member?")) { rows.splice(idx, 1); renderTable(); }
  }

  // ======================= EXCEL PASTE INTEGRATION (from file 2) =======================
  function parseExcelPaste(fullText) {
    const rowsArr = [];
    let currentRow = [];
    let currentField = '';
    let inQuotes = false;
    let i = 0;
    const text = fullText;
    while (i < text.length) {
      const ch = text[i];
      const nextCh = text[i + 1];
      if (ch === '"') {
        if (inQuotes && nextCh === '"') {
          currentField += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === '\t' && !inQuotes) {
        currentRow.push(currentField);
        currentField = '';
      } else if (ch === '\n' && !inQuotes) {
        currentRow.push(currentField);
        rowsArr.push(currentRow);
        currentRow = [];
        currentField = '';
      } else if (ch === '\r' && !inQuotes) {
        // ignore
      } else {
        currentField += ch;
      }
      i++;
    }
    if (currentField !== '' || currentRow.length > 0) {
      currentRow.push(currentField);
      rowsArr.push(currentRow);
    }
    return rowsArr;
  }

  function loadFromPastedData(rawText) {
    const parsed = parseExcelPaste(rawText);
    if (!parsed.length) return false;
    const newRows = [];
    for (let rowData of parsed) {
      if (rowData.length === 0 || (rowData.length === 1 && rowData[0].trim() === "")) continue;
      // map columns: name, father, mother, spouse, gen, gender, detail
      const newRow = createEmptyRow(false);
      newRow.name = rowData[0] || "";
      newRow.father = rowData[1] || "";
      newRow.mother = rowData[2] || "";
      newRow.spouse = rowData[3] || "";
      newRow.gen = rowData[4] || "";
      newRow.gender = (rowData[5] && (rowData[5].toLowerCase().includes('female') || rowData[5].toLowerCase() === 'female')) ? "Female" : "Male";
      newRow.detail = rowData[6] || "";
      newRow._nameEn = newRow.name;
      newRow._fatherEn = newRow.father;
      newRow._motherEn = newRow.mother;
      newRow._spouseEn = newRow.spouse;
      newRow._detailEn = newRow.detail;
      newRows.push(newRow);
    }
    if (newRows.length) {
      rows = newRows;
      renderTable();
      document.getElementById('statusMsg')?.remove();
      const statusDiv = document.createElement('div');
      statusDiv.id = 'statusMsg';
      statusDiv.className = 'stats';
      statusDiv.style.marginTop = '8px';
      statusDiv.innerText = `✅ Pasted ${newRows.length} rows from Excel (multi-line preserved).`;
      document.querySelector('.toolbar').after(statusDiv);
      setTimeout(() => { if(statusDiv) statusDiv.remove(); }, 3000);
      return true;
    }
    return false;
  }

  function showExcelPasteDialog() {
    const existing = document.getElementById('excelPasteDialog');
    if (existing) existing.remove();
    const dialog = document.createElement('div');
    dialog.id = 'excelPasteDialog';
    dialog.className = 'paste-dialog';
    dialog.innerHTML = `
      <h3 style="margin:0 0 12px 0;">📋 Paste from Excel</h3>
      <textarea id="pasteExcelArea" rows="8" placeholder="Press Ctrl+V to paste your Excel table (columns: Name, Father, Mother, Spouse, Gen, Gender, Detail)"></textarea>
      <div style="margin-top:16px; text-align:right">
        <button id="confirmExcelPaste" style="background:#2a7f49; color:white; border:none; padding:8px 16px; border-radius:30px;">Load Data</button>
        <button id="cancelExcelPaste" style="background:#aaa; margin-left:12px; border:none; padding:8px 16px; border-radius:30px;">Cancel</button>
      </div>
    `;
    document.body.appendChild(dialog);
    const textarea = dialog.querySelector('#pasteExcelArea');
    textarea.focus();
    dialog.querySelector('#confirmExcelPaste').onclick = () => {
      const raw = textarea.value;
      if (raw.trim()) {
        const success = loadFromPastedData(raw);
        if (!success) alert('No valid data rows found.');
      } else {
        alert('Paste some Excel data first.');
      }
      dialog.remove();
    };
    dialog.querySelector('#cancelExcelPaste').onclick = () => dialog.remove();
  }

  
// ======================= TRANSLATION (Google Translate) =======================

 

async function translateText(text, target) {
    if (!text) return text;
    try {
      const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${target}&dt=t&q=${encodeURIComponent(text)}`);
      const data = await res.json();
      if (data && data[0]) return data[0].map(item => item[0]).join('');
      return text;
    } catch(e) { 
      return text; 
    }
  }


async function translateAll(target) {
    for (let row of rows) {
      // Sync English data
      if (!row._nameEn) row._nameEn = row.name || "";
      if (!row._fatherEn) row._fatherEn = row.father || "";
      if (!row._motherEn) row._motherEn = row.mother || "";
      if (!row._spouseEn) row._spouseEn = row.spouse || "";
      if (!row._detailEn) row._detailEn = row.detail || "";

      if (target === 'ur') {
        row.name = await translateText(row._nameEn, 'ur');
        row.father = await translateText(row._fatherEn, 'ur');
        row.mother = await translateText(row._motherEn, 'ur');
        row.spouse = await translateText(row._spouseEn, 'ur');

    
if (row._detailEn) {
  const lines = row._detailEn.split('\n');
  let translatedLines = [];
  
  for (let line of lines) {
    let trimmedLine = line.trim();
    if (!trimmedLine) { translatedLines.push(""); continue; }

    // 1. Header Logic (ends with colon): : [Translated Text]
    if (trimmedLine.endsWith(':')) {
      let textPart = trimmedLine.substring(0, trimmedLine.length - 1).trim();
      let translated = await translateText(textPart, 'ur');
      translatedLines.push(`: ${translated}`);
    } 
    // 2. Member Logic (colon in middle): [Translated Name] :[Label]
    else if (trimmedLine.includes(':')) {
      let parts = trimmedLine.split(':');
      let leftPart = parts[0].trim();
      let rightPart = parts[1].trim();
      let translatedLeft = await translateText(leftPart, 'ur');
      translatedLines.push(`${translatedLeft} :${rightPart}`);
    } 
    else {
      translatedLines.push(await translateText(trimmedLine, 'ur'));
    }
  }
  row.detail = translatedLines.join('\n');
}
      } else {
        // Switch back to English
        row.name = row._nameEn;
        row.father = row._fatherEn;
        row.mother = row._motherEn;
        row.spouse = row._spouseEn;
        row.detail = row._detailEn;
      }
    }
    currentLang = target;
    renderTable();
  }

  // ======================= RENDER TABLE =======================
  function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    for (let i = 0; i < rows.length; i++) {
      const m = rows[i];
      const tr = tbody.insertRow();
      if (editMode) tr.style.background = '#fff8e7';

      // Name
      const tdName = tr.insertCell(0);
      if (editMode) attachNameEditDropdown(tdName, m);
      else {
        const ta = document.createElement('textarea');
        ta.value = m.name || '';
        ta.placeholder = 'Name';
        ta.rows = 2;
        ta.onchange = ((r) => (e) => onEdit(r, 'name', e.target.value))(m);
        tdName.appendChild(ta);
      }

      // Father
      const tdFather = tr.insertCell(1);
      if (editMode) {
        const inp = document.createElement('input');
        inp.value = m.father || '';
        inp.onchange = ((r) => (e) => onEdit(r, 'father', e.target.value))(m);
        tdFather.appendChild(inp);
      } else attachFatherDropdownToCell(tdFather, m.father, m);

      // Mother
      const tdMother = tr.insertCell(2);
      const motherTa = document.createElement('textarea');
      motherTa.value = m.mother || '';
      motherTa.rows = 2;
      motherTa.onchange = ((r) => (e) => onEdit(r, 'mother', e.target.value))(m);
      tdMother.appendChild(motherTa);

      // Spouse
      const tdSpouse = tr.insertCell(3);
      const spouseTa = document.createElement('textarea');
      spouseTa.value = m.spouse || '';
      spouseTa.rows = 2;
      spouseTa.onchange = ((r) => (e) => onEdit(r, 'spouse', e.target.value))(m);
      tdSpouse.appendChild(spouseTa);

      // Gen
      const tdGen = tr.insertCell(4);
      const genInp = document.createElement('input');
      genInp.value = m.gen || '';
      genInp.style.fontWeight = 'bold';
      genInp.onchange = ((r) => (e) => onEdit(r, 'gen', e.target.value))(m);
      tdGen.appendChild(genInp);

      // Gender
      const tdGender = tr.insertCell(5);
      const sel = document.createElement('select');
      sel.options.add(new Option('👨 Male', 'Male'));
      sel.options.add(new Option('👩 Female', 'Female'));
      sel.value = m.gender;
      sel.onchange = ((r) => (e) => changeGender(r, e.target.value))(m);
      tdGender.appendChild(sel);

// Detail
const tdDetail = tr.insertCell(6);
const detailTa = document.createElement('textarea');
let raw = m.detail || '';
raw = raw.replace(/\\n/g, '\n');
detailTa.value = raw;
detailTa.rows = 3;

// Add this block for RTL support
if (currentLang === 'ur') {
  detailTa.classList.add('rtl-mode');
}

detailTa.onchange = ((r) => (e) => onEdit(r, 'detail', e.target.value))(m);
tdDetail.appendChild(detailTa);
      // Delete
      const tdDel = tr.insertCell(7);
      const delBtn = document.createElement('button');
      delBtn.innerHTML = '🗑️';
      delBtn.className = 'delete-btn';
      delBtn.onclick = ((idx) => () => deleteRow(idx))(i);
      tdDel.appendChild(delBtn);
    }
    document.getElementById('rowCount').innerHTML = rows.length + ' members';
  }

function copyTable() {
    if (!rows.length) return alert('No data');
    let txt = "Name\tFather\tMother\tSpouse\tGen\tGender\tDetail\n";
    
    for (let r of rows) {
      let detailContent = r.detail || '—';
      
      // Use \u202A (Left-to-Right Embedding) to force Excel's cell rendering
      // This is stronger than \u200E for many Excel versions
      let formattedDetail = '"' + '\u202A' + detailContent + '"';
      
      txt += (r.name || '—') + '\t' + 
             (r.father || '—') + '\t' + 
             (r.mother || '—') + '\t' + 
             (r.spouse || '—') + '\t' + 
             (r.gen || '—') + '\t' + 
             (r.gender || '—') + '\t' + 
             formattedDetail + '\n';
    }
    navigator.clipboard.writeText(txt).then(() => alert('Copied to clipboard!'));
}

  function toggleEditMode() {
    editMode = !editMode;
    const btn = document.getElementById('editDataBtn');
    if (editMode) {
      btn.textContent = '🟡 Edit Mode ON';
      btn.classList.add('edit-mode-active');
    } else {
      btn.textContent = '✏️ Edit Data';
      btn.classList.remove('edit-mode-active');
    }
    renderTable();
  }

  function init() {
    loadExternalFamilyData();
    rows = [createEmptyRow(false)];
    renderTable();
    document.getElementById('onlineStatus').innerText = 'Online';
  }

  // event listeners
  document.getElementById('addRowBtn').onclick = addMember;
  document.getElementById('copyBtn').onclick = copyTable;
  document.getElementById('editDataBtn').onclick = toggleEditMode;
  document.getElementById('pasteExcelBtn').onclick = showExcelPasteDialog;
  document.getElementById('btnEnglish').onclick = () => { translateAll('en'); document.getElementById('btnEnglish').classList.add('active'); document.getElementById('btnUrdu').classList.remove('active'); };
  document.getElementById('btnUrdu').onclick = () => { translateAll('ur'); document.getElementById('btnUrdu').classList.add('active'); document.getElementById('btnEnglish').classList.remove('active'); };
  init();
</script>
