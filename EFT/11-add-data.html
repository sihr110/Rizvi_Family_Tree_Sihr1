<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Rizvi Family Tree - Single Family Entry</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #e9eef3 0%, #dce3ec 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
      padding: 1rem;
      color: #1a2c3e;
    }

    .family-card {
      max-width: 1400px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 1.5rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .tree-header {
      background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%);
      padding: 1rem 1.5rem;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .header-title h1 {
      font-weight: 600;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title h1::before {
      content: "🌳";
      font-size: 1.4rem;
    }

    .header-title p {
      opacity: 0.8;
      font-size: 0.7rem;
      margin-top: 2px;
    }

    .lang-switch {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.15);
      padding: 6px 16px;
      border-radius: 50px;
    }

    .lang-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 40px;
      transition: 0.2s;
      font-family: inherit;
      color: white;
      opacity: 0.7;
    }

    .lang-btn.active {
      background: white;
      color: #1e3c2c;
      opacity: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .online-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #2ecc71;
      box-shadow: 0 0 5px #2ecc71;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    .status-text {
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 30px;
    }

    .form-container {
      padding: 1.2rem 1rem 1.5rem 1rem;
    }

    .toolbar {
      display: flex;
      gap: 0.8rem;
      margin: 0.5rem 0 1rem 0;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: 0.2s;
      font-size: 0.85rem;
      touch-action: manipulation;
    }

    .btn-primary {
      background: #2a7f49;
      color: white;
    }

    .btn-primary:active {
      background: #1e643a;
      transform: scale(0.97);
    }

    .btn-copy {
      background: #1e3c2c;
      color: white;
    }

    .stats {
      background: #ddeeff;
      padding: 5px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 1rem;
      border: 1px solid #e2edf2;
      background: white;
      margin-top: 0.8rem;
      -webkit-overflow-scrolling: touch;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      min-width: 900px;
    }

    .data-table th {
      background: #f0f6f0;
      padding: 12px 8px;
      text-align: center;
      font-weight: 700;
      color: #1a4b2a;
      border-bottom: 2px solid #cbe0ce;
      font-size: 0.8rem;
    }

    .data-table td {
      padding: 8px 6px;
      border-bottom: 1px solid #e9ede8;
      vertical-align: middle;
    }

    .data-table input,
    .data-table select {
      width: 100%;
      padding: 10px 10px;
      border: 1px solid #cfdfe8;
      border-radius: 12px;
      font-size: 0.85rem;
      font-family: inherit;
      background: white;
      touch-action: manipulation;
    }

    .data-table input:focus,
    .data-table select:focus {
      outline: none;
      border-color: #2a7f49;
      box-shadow: 0 0 0 2px rgba(42, 127, 73, 0.2);
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      padding: 6px 10px;
      border-radius: 30px;
      color: #c0392b;
      touch-action: manipulation;
    }

    .delete-btn:active {
      background: #fee2e2;
    }

    .mobile-dropdown-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 20000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(3px);
    }

    .mobile-dropdown-panel {
      background: white;
      width: 100%;
      max-width: 600px;
      border-radius: 28px 28px 0 0;
      max-height: 75vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .dropdown-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid #e2edf2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 1.1rem;
      background: white;
      border-radius: 28px 28px 0 0;
    }

    .close-dropdown {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 0 8px;
      color: #2a7f49;
    }

    .dropdown-search-mobile {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #eef2f5;
    }

    .dropdown-search-mobile input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cfdfe8;
      border-radius: 40px;
      font-size: 1rem;
      background: #fafcfd;
    }

    .dropdown-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0 20px;
      -webkit-overflow-scrolling: touch;
    }

    .mobile-option {
      padding: 14px 18px;
      border-bottom: 1px solid #f0f4f8;
      cursor: pointer;
      touch-action: manipulation;
    }

    .mobile-option:active {
      background: #eef6ef;
    }

    .option-name {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .option-parent {
      font-size: 0.75rem;
      color: #5f7a6e;
      margin-left: 28px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="family-card">
  <div class="tree-header">
    <div class="header-title">
      <h1>Rizvi Family Tree Manager</h1>
      <p style="font-size: 0.85rem; margin-top: 4px; opacity: 0.9; padding-left: 6ch;">Designed by Imran Haider</p>
    </div>
    <div class="lang-switch">
      <button id="btnEnglish" class="lang-btn active">E</button>
      <button id="btnUrdu" class="lang-btn">U</button>
      <div class="status-text">
        <span class="online-dot"></span>
        <span id="onlineStatus">Online</span>
      </div>
    </div>
  </div>
  <div class="form-container">
    <div class="toolbar">
      <button id="addRowBtn" class="btn btn-primary">➕ Add New Member</button>
      <div>
        <button id="copyBtn" class="btn btn-copy">📋 Copy for Whatsapp</button>
        <span id="rowCount" class="stats">0 members</span>
      </div>
    </div>
    <div class="table-wrapper">
      <table class="data-table" id="familyTable">
        <thead id="tableHeader">
          <tr>
            <th id="thName">Name</th>
            <th id="thFather">Father</th>
            <th id="thMother">Mother</th>
            <th id="thSpouse">Spouse</th>
            <th id="thGen">Gen</th>
            <th id="thGender">Gender</th>
            <th id="thDetail">Details</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="13-family-data.js"></script>

<script>
  let mainData = [];
  let rows = [];
  let currentLang = 'en';
  let familyFather = "";
  let familyMother = "";

  const headerTranslations = {
    en: { name: 'Name', father: 'Father', mother: 'Mother', spouse: 'Spouse', gen: 'Gen', gender: 'Gender', detail: 'Details' },
    ur: { name: 'نام', father: 'والد', mother: 'والدہ', spouse: 'شریک حیات', gen: 'نسل', gender: 'جنس', detail: 'تفصیلات' }
  };

  function generateId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 10); }
  function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'); }); }

  function loadMainData() {
    if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA && FAMILY_DATA.length) {
      mainData = FAMILY_DATA.map(p => ({
        name: p.name, father: p.father || "", mother: p.mother || "", spouse: p.spouse || "",
        gen: p.gen || "", gender: p.gender === "MALE" ? "Male" : "Female", detail: p.details || ""
      }));
    } else {
      mainData = [
        { name: "Syed Rizvi", father: "", mother: "", spouse: "Mrs. Rizvi", gen: "G-001", gender: "Male", detail: "Founder" },
        { name: "Ahmed Rizvi", father: "Syed Rizvi", mother: "Mrs. Rizvi", spouse: "Fatima", gen: "G-002-S1", gender: "Male", detail: "" },
        { name: "Zara Rizvi", father: "Syed Rizvi", mother: "Mrs. Rizvi", spouse: "", gen: "G-002-D1", gender: "Female", detail: "" }
      ];
    }
  }

  function findPerson(name) { if (!name) return null; return mainData.find(p => p.name.toLowerCase() === name.toLowerCase()); }
  function getSpouse(name) { let p = findPerson(name); return p ? (p.spouse || "") : ""; }
  function getParentDisplay(p) { if (!p) return ""; if (p.father) return "S/o " + p.father; if (p.mother) return "D/o " + p.mother; return ""; }
  function getAllNames() { return mainData.map(p => p.name); }

  function extractGenNumber(gen) {
    if (!gen) return 0;
    const match = gen.match(/[SD](\d+)$/);
    return match ? parseInt(match[1]) : 0;
  }

  function generateGenWithSequence(fatherName, childGender, sequenceNumber) {
    if (!fatherName) return "";
    let father = findPerson(fatherName);
    if (!father || !father.gen) return "";
    
    let match = father.gen.match(/(G-\d+)/);
    if (!match) return "";
    
    let nextGenNumber = parseInt(match[1].split('-')[1]) + 1;
    let nextGenPrefix = "G-" + String(nextGenNumber).padStart(3, '0');
    let suffix = childGender === 'Male' ? 'S' : 'D';
    
    return nextGenPrefix + "-" + suffix + sequenceNumber;
  }

  function getMaxChildNumber(fatherName, gender, excludeRow = null) {
    let maxNum = 0;
    for (let p of mainData) {
      if (p.father === fatherName && p.gender === gender && p.gen) {
        let num = extractGenNumber(p.gen);
        if (num > maxNum) maxNum = num;
      }
    }
    for (let r of rows) {
      if (r !== excludeRow && r.father === fatherName && r.gender === gender && r.gen) {
        let num = extractGenNumber(r.gen);
        if (num > maxNum) maxNum = num;
      }
    }
    return maxNum;
  }

  function createEmptyRow(inherit) {
    return {
      id: generateId(), name: "", father: inherit ? familyFather : "", mother: inherit ? familyMother : "",
      spouse: "", gen: "", gender: "Male", detail: "",
      _nameEn: "", _fatherEn: inherit ? familyFather : "", _motherEn: inherit ? familyMother : "", _spouseEn: "", _detailEn: ""
    };
  }

  let activeMobilePanel = null;
  
  function closeMobileDropdown() {
    if (activeMobilePanel && activeMobilePanel.parentNode) {
      activeMobilePanel.parentNode.removeChild(activeMobilePanel);
    }
    activeMobilePanel = null;
  }

  function updateFamily(selected, isFatherField) {
    let firstRow = rows[0];
    if (isFatherField) {
      firstRow.father = selected.name;
      firstRow.mother = getSpouse(selected.name);
      firstRow.spouse = "";
    } else {
      firstRow.mother = selected.name;
      firstRow.father = getSpouse(selected.name);
      firstRow.spouse = "";
    }
    firstRow._fatherEn = firstRow.father;
    firstRow._motherEn = firstRow.mother;
    firstRow._spouseEn = firstRow.spouse;
    
    familyFather = firstRow.father;
    familyMother = firstRow.mother;
    
    for (let i = 0; i < rows.length; i++) {
      rows[i].father = familyFather;
      rows[i].mother = familyMother;
      rows[i]._fatherEn = familyFather;
      rows[i]._motherEn = familyMother;
      
      if (familyFather) {
        let maxNum = getMaxChildNumber(familyFather, rows[i].gender, rows[i]);
        rows[i].gen = generateGenWithSequence(familyFather, rows[i].gender, maxNum + 1);
      }
    }
    
    renderTable();
  }

  function openMobileDropdown(isFatherField) {
    if (activeMobilePanel) closeMobileDropdown();
    const overlay = document.createElement('div');
    overlay.className = 'mobile-dropdown-overlay';
    const panelDiv = document.createElement('div');
    panelDiv.className = 'mobile-dropdown-panel';
    const header = document.createElement('div');
    header.className = 'dropdown-header';
    header.innerHTML = `<span>${isFatherField ? (currentLang === 'en' ? '👨 Select Father' : '👨 انتخاب والد') : (currentLang === 'en' ? '👩 Select Mother' : '👩 انتخاب والدہ')}</span>
                        <button class="close-dropdown">✕</button>`;
    panelDiv.appendChild(header);
    const searchDiv = document.createElement('div');
    searchDiv.className = 'dropdown-search-mobile';
    const searchInput = document.createElement('input');
    searchInput.type = 'search';
    searchInput.placeholder = currentLang === 'en' ? '🔍 Search name...' : '🔍 نام تلاش کریں...';
    searchDiv.appendChild(searchInput);
    panelDiv.appendChild(searchDiv);
    const listContainer = document.createElement('div');
    listContainer.className = 'dropdown-list';
    panelDiv.appendChild(listContainer);
    overlay.appendChild(panelDiv);
    document.body.appendChild(overlay);
    activeMobilePanel = overlay;

    function renderOptions(filterText = '') {
      listContainer.innerHTML = '';
      let filtered = getAllNames();
      if (filterText.trim()) filtered = filtered.filter(n => n.toLowerCase().includes(filterText.toLowerCase()));
      if (filtered.length === 0) {
        const emptyMsg = document.createElement('div');
        emptyMsg.className = 'mobile-option';
        emptyMsg.style.color = 'gray';
        emptyMsg.innerHTML = '<div class="option-name">❌ کوئی نتیجہ نہیں</div>';
        listContainer.appendChild(emptyMsg);
        return;
      }
      for (let name of filtered) {
        const person = findPerson(name);
        if (!person) continue;
        const optionDiv = document.createElement('div');
        optionDiv.className = 'mobile-option';
        const icon = person.gender === 'Male' ? '👨' : '👩';
        const parentLine = getParentDisplay(person);
        optionDiv.innerHTML = `
          <div class="option-name">${icon} <strong>${escapeHtml(person.name)}</strong> ${person.gen ? '(' + person.gen + ')' : ''}</div>
          ${parentLine ? `<div class="option-parent">${escapeHtml(parentLine)}</div>` : ''}
        `;
        optionDiv.onclick = () => { updateFamily(person, isFatherField); closeMobileDropdown(); };
        listContainer.appendChild(optionDiv);
      }
    }
    renderOptions('');
    searchInput.oninput = (e) => renderOptions(e.target.value);
    header.querySelector('.close-dropdown').onclick = () => closeMobileDropdown();
    overlay.onclick = (e) => { if (e.target === overlay) closeMobileDropdown(); };
  }

  function attachMobileDropdown(cellElement, currentVal, isFatherField) {
    cellElement.innerHTML = '';
    const wrapper = document.createElement('div');
    wrapper.style.position = 'relative';
    wrapper.style.width = '100%';
    const triggerBtn = document.createElement('button');
    triggerBtn.style.width = '100%';
    triggerBtn.style.padding = '10px 12px';
    triggerBtn.style.background = 'white';
    triggerBtn.style.border = '1px solid #cfdfe8';
    triggerBtn.style.borderRadius = '12px';
    triggerBtn.style.fontSize = '0.85rem';
    triggerBtn.style.textAlign = 'left';
    triggerBtn.style.cursor = 'pointer';
    triggerBtn.style.fontFamily = 'inherit';
    triggerBtn.style.display = 'flex';
    triggerBtn.style.justifyContent = 'space-between';
    triggerBtn.style.alignItems = 'center';
    
    let displayText = currentVal;
    if (!displayText) {
      if (currentLang === 'en') {
        displayText = isFatherField ? '▼ Select Father' : '▼ Select Mother';
      } else {
        displayText = isFatherField ? '▼ منتخب کریں' : '▼ منتخب کریں';
      }
    }
    
    triggerBtn.innerHTML = `<span>${escapeHtml(displayText)}</span> <span style="color:#2a7f49;">▼</span>`;
    wrapper.appendChild(triggerBtn);
    cellElement.appendChild(wrapper);
    triggerBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); openMobileDropdown(isFatherField); };
  }

  function onEdit(row, field, val) {
    if (field === 'name') row.name = val;
    if (field === 'spouse') row.spouse = val;
    if (field === 'detail') row.detail = val;
    if (field === 'gen') {
      row.gen = val.toUpperCase();
      return;
    }
    if (currentLang === 'en') {
      if (field === 'name') row._nameEn = val;
      if (field === 'spouse') row._spouseEn = val;
      if (field === 'detail') row._detailEn = val;
    }
    renderTable();
  }

  function addMember() {
    if (!familyFather && !familyMother && (!rows[0].father && !rows[0].mother)) {
      alert("First select Father or Mother from dropdown");
      return;
    }
    let newRow = createEmptyRow(true);
    
    if (familyFather) {
      let maxNum = getMaxChildNumber(familyFather, newRow.gender);
      newRow.gen = generateGenWithSequence(familyFather, newRow.gender, maxNum + 1);
    }
    
    rows.push(newRow);
    renderTable();
    setTimeout(() => { const wrapper = document.querySelector('.table-wrapper'); if (wrapper) wrapper.scrollTop = wrapper.scrollHeight; }, 50);
  }

  function deleteRow(idx) {
    if (rows.length === 1) { alert("Cannot delete last member. Refresh to reset."); return; }
    if (confirm("Delete this member?")) { 
      rows.splice(idx, 1);
      renderTable(); 
    }
  }

  function changeGender(row, newGender) {
    if (row.gender === newGender) return;
    
    let oldGender = row.gender;
    row.gender = newGender;
    
    if (row.father) {
      let maxNum = getMaxChildNumber(row.father, newGender, row);
      row.gen = generateGenWithSequence(row.father, newGender, maxNum + 1);
    }
    
    renderTable();
  }

  async function translateText(text, target) {
    if (!text) return text;
    try {
      const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${target}&dt=t&q=${encodeURIComponent(text)}`);
      const data = await res.json();
      if (data && data[0]) return data[0].map(item => item[0]).join('');
      return text;
    } catch(e) { return text; }
  }

  async function translateAll(target) {
    const statusSpan = document.getElementById('onlineStatus');
    const originalText = statusSpan.innerText;
    statusSpan.innerText = 'Translating...';
    for (let row of rows) {
      if (row._nameEn === undefined) row._nameEn = row.name || "";
      if (row._fatherEn === undefined) row._fatherEn = row.father || "";
      if (row._motherEn === undefined) row._motherEn = row.mother || "";
      if (row._spouseEn === undefined) row._spouseEn = row.spouse || "";
      if (row._detailEn === undefined) row._detailEn = row.detail || "";
      if (target === 'ur') {
        row.name = await translateText(row._nameEn, 'ur');
        row.father = await translateText(row._fatherEn, 'ur');
        row.mother = await translateText(row._motherEn, 'ur');
        row.spouse = await translateText(row._spouseEn, 'ur');
        row.detail = await translateText(row._detailEn, 'ur');
      } else {
        row.name = row._nameEn;
        row.father = row._fatherEn;
        row.mother = row._motherEn;
        row.spouse = row._spouseEn;
        row.detail = row._detailEn;
      }
    }
    currentLang = target;
    document.getElementById('thName').innerText = headerTranslations[target].name;
    document.getElementById('thFather').innerText = headerTranslations[target].father;
    document.getElementById('thMother').innerText = headerTranslations[target].mother;
    document.getElementById('thSpouse').innerText = headerTranslations[target].spouse;
    document.getElementById('thGen').innerText = headerTranslations[target].gen;
    document.getElementById('thGender').innerText = headerTranslations[target].gender;
    document.getElementById('thDetail').innerText = headerTranslations[target].detail;
    renderTable();
    statusSpan.innerText = originalText;
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    for (let i = 0; i < rows.length; i++) {
      const m = rows[i];
      const isFirst = (i === 0);
      const tr = tbody.insertRow();
      
      const tdName = tr.insertCell(0);
      const nameInp = document.createElement('input');
      nameInp.value = m.name || '';
      nameInp.placeholder = currentLang === 'en' ? 'Name' : 'نام';
      nameInp.onchange = ((r) => (e) => onEdit(r, 'name', e.target.value))(m);
      tdName.appendChild(nameInp);
      
      const tdFather = tr.insertCell(1);
      if (isFirst) attachMobileDropdown(tdFather, m.father, true);
      else { const inp = document.createElement('input'); inp.value = m.father || ''; inp.readOnly = true; inp.style.background = '#f5f7fa'; tdFather.appendChild(inp); }
      
      const tdMother = tr.insertCell(2);
      if (isFirst) attachMobileDropdown(tdMother, m.mother, false);
      else { const inp = document.createElement('input'); inp.value = m.mother || ''; inp.readOnly = true; inp.style.background = '#f5f7fa'; tdMother.appendChild(inp); }
      
      const tdSpouse = tr.insertCell(3);
      const spouseInp = document.createElement('input');
      spouseInp.value = m.spouse || '';
      spouseInp.placeholder = currentLang === 'en' ? 'Spouse' : 'شریک حیات';
      spouseInp.onchange = ((r) => (e) => onEdit(r, 'spouse', e.target.value))(m);
      tdSpouse.appendChild(spouseInp);
      
      const tdGen = tr.insertCell(4);
      const genInp = document.createElement('input');
      genInp.value = m.gen || '';
      genInp.placeholder = currentLang === 'en' ? 'G-XXX-S/D#' : 'نسل نمبر';
      genInp.style.background = '#fffef0';
      genInp.style.fontWeight = 'bold';
      genInp.style.fontFamily = 'monospace';
      genInp.removeAttribute('readonly');
      genInp.onchange = ((r) => (e) => onEdit(r, 'gen', e.target.value))(m);
      tdGen.appendChild(genInp);
      
      const tdGender = tr.insertCell(5);
      const sel = document.createElement('select');
      const optM = document.createElement('option'); optM.value = 'Male'; optM.text = currentLang === 'en' ? '👨 Male' : '👨 مرد';
      const optF = document.createElement('option'); optF.value = 'Female'; optF.text = currentLang === 'en' ? '👩 Female' : '👩 عورت';
      sel.appendChild(optM); sel.appendChild(optF);
      sel.value = m.gender;
      sel.onchange = ((r) => (e) => changeGender(r, e.target.value))(m);
      tdGender.appendChild(sel);
      
      const tdDetail = tr.insertCell(6);
      const detailInp = document.createElement('input');
      detailInp.value = m.detail || '';
      detailInp.placeholder = currentLang === 'en' ? 'Details' : 'تفصیلات';
      detailInp.onchange = ((r) => (e) => onEdit(r, 'detail', e.target.value))(m);
      tdDetail.appendChild(detailInp);
      
      const tdAction = tr.insertCell(7);
      const delBtn = document.createElement('button');
      delBtn.innerHTML = '🗑️';
      delBtn.className = 'delete-btn';
      delBtn.onclick = ((idx) => () => deleteRow(idx))(i);
      tdAction.appendChild(delBtn);
    }
    document.getElementById('rowCount').innerHTML = rows.length + ' members';
  }

  function copyTable() {
    if (!rows.length) return alert('No data');
    let txt = "🌳 RIZVI FAMILY TREE 🌳\n\nName\tFather\tMother\tSpouse\tGen\tGender\tDetail\n";
    for (let r of rows) txt += (r.name || '—') + '\t' + (r.father || '—') + '\t' + (r.mother || '—') + '\t' + (r.spouse || '—') + '\t' + (r.gen || '—') + '\t' + (r.gender || '—') + '\t' + (r.detail || '—') + '\n';
    navigator.clipboard.writeText(txt).then(() => alert('Copied!')).catch(() => alert('Press Ctrl+C'));
  }

  function init() {
    loadMainData();
    rows = [createEmptyRow(false)];
    familyFather = "";
    familyMother = "";
    currentLang = 'en';
    document.getElementById('thName').innerText = 'Name';
    document.getElementById('thFather').innerText = 'Father';
    document.getElementById('thMother').innerText = 'Mother';
    document.getElementById('thSpouse').innerText = 'Spouse';
    document.getElementById('thGen').innerText = 'Gen';
    document.getElementById('thGender').innerText = 'Gender';
    document.getElementById('thDetail').innerText = 'Details';
    renderTable();
    const dot = document.querySelector('.online-dot');
    if (dot) dot.style.backgroundColor = '#2ecc71';
    document.getElementById('onlineStatus').innerText = 'Online';
  }

  document.getElementById('addRowBtn').onclick = addMember;
  document.getElementById('copyBtn').onclick = copyTable;
  document.getElementById('btnEnglish').onclick = () => { translateAll('en'); document.getElementById('btnEnglish').classList.add('active'); document.getElementById('btnUrdu').classList.remove('active'); };
  document.getElementById('btnUrdu').onclick = () => { translateAll('ur'); document.getElementById('btnUrdu').classList.add('active'); document.getElementById('btnEnglish').classList.remove('active'); };
  init();
</script>
</body>
</html>
