<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Rizvi Family Tree - Single Family Entry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #e9eef3 0%, #dce3ec 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 2rem 1.5rem;
      color: #1a2c3e;
    }
    .family-card {
      max-width: 1400px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .tree-header {
      background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%);
      padding: 1rem 2rem;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .header-title h1 {
      font-weight: 600;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-title h1::before { content: "🌳"; font-size: 1.6rem; }
    .header-title p { opacity: 0.8; font-size: 0.75rem; margin-top: 4px; }
    .translation-control {
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lang-dropdown {
      background: white;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
      color: #1e3c2c;
    }
    .form-container { padding: 1.8rem 2rem 2rem 2rem; }
    .info-banner {
      background: #eef2fa;
      border-radius: 12px;
      padding: 10px 16px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #2c5a6e;
      border-left: 4px solid #2a7f49;
    }
    .toolbar {
      display: flex;
      gap: 1rem;
      margin: 1rem 0 1.5rem 0;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    .btn {
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }
    .btn-primary { background: #2a7f49; color: white; }
    .btn-primary:hover { background: #1e643a; }
    .btn-copy { background: #1e3c2c; color: white; }
    .stats { background: #ddeeff; padding: 4px 12px; border-radius: 40px; font-size: 0.8rem; }
    .table-wrapper { overflow-x: auto; border-radius: 1rem; border: 1px solid #e2edf2; background: white; margin-top: 1rem; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 1000px; }
    .data-table th { background: #f0f6f0; padding: 12px 10px; text-align: left; font-weight: 700; color: #1a4b2a; border-bottom: 2px solid #cbe0ce; }
    .data-table td { padding: 8px 10px; border-bottom: 1px solid #e9ede8; vertical-align: middle; }
    .data-table input, .data-table select { width: 100%; padding: 8px 10px; border: 1px solid #cfdfe8; border-radius: 8px; font-size: 0.85rem; font-family: inherit; }
    .data-table input:focus, .data-table select:focus { outline: none; border-color: #2a7f49; }
    .data-table input[readonly] { background: #f5f7fa; color: #4a627a; cursor: default; }
    .delete-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 4px 8px; border-radius: 6px; color: #c0392b; }
    .delete-btn:hover { background: #fee2e2; }
    .dropdown-wrapper { position: relative; width: 100%; }
    .dropdown-trigger {
      width: 100%; padding: 8px 28px 8px 10px; border: 1px solid #cfdfe8; border-radius: 8px;
      font-size: 0.85rem; background: white; cursor: pointer; text-align: left;
    }
    .dropdown-arrow { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #2a7f49; }
    .dropdown-panel {
      position: fixed; background: white; border-radius: 0.75rem; box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      max-height: 350px; overflow-y: auto; z-index: 10000; border: 1px solid #cbdde6; display: none; min-width: 350px; width: 400px;
    }
    .dropdown-panel.open { display: block; }
    .dropdown-search-box { padding: 8px; border-bottom: 1px solid #e2edf2; position: sticky; top: 0; background: white; }
    .dropdown-search-box input { width: 100%; padding: 10px 12px; border: 1px solid #cfdfe8; border-radius: 30px; font-size: 0.9rem; }
    .dropdown-option { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #eff3f8; }
    .dropdown-option:hover { background: #eef6ef; }
    .dropdown-option-name { font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
    .dropdown-option-parent { font-size: 0.75rem; color: #5f7a6e; margin-top: 2px; margin-left: 24px; }
    .translation-status { background: #f0f0f0; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
  </style>
</head>
<body>
<div class="family-card">
  <div class="tree-header">
    <div class="header-title">
      <h1>Rizvi Family Tree Manager</h1>
      <p style="font-size: 0.85rem; margin-top: 4px; opacity: 0.9; padding-left: 6ch;">Designed by Imran Haider</p>
    </div>
    <div class="translation-control">
      <span>🌐 Translate:</span>
      <select id="langSelect" class="lang-dropdown">
        <option value="en">English</option>
        <option value="ur">اردو</option>
      </select>
      <span id="translationStatus" class="translation-status">● Online</span>
    </div>
  </div>
  <div class="form-container">
    <div class="info-banner">
      <span>🏠</span>
      <span><strong>Single Family Mode:</strong> First row only has dropdowns. Select Mother → fills Father (her father) + Spouse (her spouse). Select Father → fills Mother (his wife).</span>
    </div>
    <div class="toolbar">
      <button id="addRowBtn" class="btn btn-primary">➕ Add New Member</button>
      <div>
        <button id="copyBtn" class="btn btn-copy">📋 Copy for Whatsapp</button>
        <span id="rowCount" class="stats">0 members</span>
      </div>
    </div>
    <div class="table-wrapper">
      <table class="data-table" id="familyTable">
        <thead><tr><th>Name</th><th>Father</th><th>Mother</th><th>Spouse</th><th>Gen</th><th>Gender</th><th>Details</th><th></th></tr></thead>
        <tbody id="tableBody"></tbody>
    
    </div>
  </div>
</div>

<script src="13-family-data.js"></script>
<script>
  let mainData = [];
  let rows = [];
  let currentLang = 'en';
  let familyFather = "";
  let familyMother = "";

  function generateId() { return Date.now() + '-' + Math.random().toString(36).substring(2, 10); }
  function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'); }); }

  function loadMainData() {
    if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length) {
      mainData = FAMILY_DATA.map(p => ({
        name: p.name, father: p.father || "", mother: p.mother || "", spouse: p.spouse || "",
        gen: p.gen || "", gender: p.gender === "MALE" ? "Male" : "Female", detail: p.details || ""
      }));
    }
  }

  function findPerson(name) { if (!name) return null; return mainData.find(p => p.name.toLowerCase() === name.toLowerCase()); }
  function getSpouse(name) { let p = findPerson(name); return p ? (p.spouse || "") : ""; }
  function getFather(name) { let p = findPerson(name); return p ? (p.father || "") : ""; }
  function getParentDisplay(p) { if (!p) return ""; if (p.father) return "S/o " + p.father; if (p.mother) return "D/o " + p.mother; return ""; }
  function getAllNames() { return mainData.map(p => p.name); }

  function getMaxChildNumber(fatherName, gender) {
    let max = 0, suffix = gender === 'Male' ? 'S' : 'D';
    let father = findPerson(fatherName);
    if (!father || !father.gen) return 0;
    let match = father.gen.match(/G-(\d+)/);
    if (!match) return 0;
    let childNum = parseInt(match[1]) + 1;
    let prefix = "G-" + String(childNum).padStart(3, '0') + "-";
    for (let p of mainData) {
      if (p.father === fatherName && p.gen && p.gen.startsWith(prefix) && p.gen.includes(suffix)) {
        let numMatch = p.gen.match(/\d+$/);
        if (numMatch) max = Math.max(max, parseInt(numMatch[0]));
      }
    }
    for (let r of rows) {
      if (r.father === fatherName && r.gen && r.gen.startsWith(prefix) && r.gen.includes(suffix)) {
        let numMatch = r.gen.match(/\d+$/);
        if (numMatch) max = Math.max(max, parseInt(numMatch[0]));
      }
    }
    return max;
  }

  function generateGen(fatherName, childGender) {
    if (!fatherName) return "";
    let father = findPerson(fatherName);
    if (!father || !father.gen) return "";
    let match = father.gen.match(/G-(\d+)/);
    if (!match) return "";
    let childNum = parseInt(match[1]) + 1;
    let prefix = "G-" + String(childNum).padStart(3, '0') + "-";
    let suffix = childGender === 'Male' ? 'S' : 'D';
    let maxNum = getMaxChildNumber(fatherName, childGender);
    return prefix + suffix + (maxNum + 1);
  }

  function createEmptyRow(inherit) {
    return {
      id: generateId(), name: "", father: inherit ? familyFather : "", mother: inherit ? familyMother : "",
      spouse: "", gen: "", gender: "Male", detail: "",
      _nameEn: "", _fatherEn: inherit ? familyFather : "", _motherEn: inherit ? familyMother : "", _spouseEn: "", _detailEn: ""
    };
  }

  let activePanel = null;
  function closePanel() { if (activePanel && activePanel.parentNode) { activePanel.parentNode.removeChild(activePanel); } activePanel = null; }

  function updateFamily(selected, isFatherField) {
    let firstRow = rows[0];
    if (isFatherField) {
      firstRow.father = selected.name;
      firstRow.mother = getSpouse(selected.name);
      firstRow.spouse = "";
    } else {
      firstRow.mother = selected.name;
      firstRow.father = getFather(selected.name);
      firstRow.spouse = getSpouse(selected.name);
    }
    firstRow._fatherEn = firstRow.father;
    firstRow._motherEn = firstRow.mother;
    firstRow._spouseEn = firstRow.spouse;
    if (firstRow.father) firstRow.gen = generateGen(firstRow.father, firstRow.gender);
    familyFather = firstRow.father;
    familyMother = firstRow.mother;
    for (let i = 1; i < rows.length; i++) {
      rows[i].father = familyFather;
      rows[i].mother = familyMother;
      rows[i]._fatherEn = familyFather;
      rows[i]._motherEn = familyMother;
      if (familyFather) rows[i].gen = generateGen(familyFather, rows[i].gender);
    }
    renderTable();
  }

  function createDropdown(cell, currentVal, isFatherField) {
    cell.innerHTML = '';
    let wrapper = document.createElement('div');
    wrapper.className = 'dropdown-wrapper';
    let btn = document.createElement('button');
    btn.className = 'dropdown-trigger';
    btn.textContent = currentVal || '▼ Select';
    let arrow = document.createElement('span');
    arrow.className = 'dropdown-arrow';
    arrow.textContent = '▼';
    wrapper.appendChild(btn);
    wrapper.appendChild(arrow);
    
    btn.onclick = function(e) {
      e.stopPropagation();
      if (activePanel) { closePanel(); return; }
      
      let panel = document.createElement('div');
      panel.className = 'dropdown-panel';
      activePanel = panel;
      
      let searchDiv = document.createElement('div');
      searchDiv.className = 'dropdown-search-box';
      let searchInput = document.createElement('input');
      searchInput.placeholder = '🔍 Search name...';
      searchDiv.appendChild(searchInput);
      panel.appendChild(searchDiv);
      
      function renderList(filter) {
        let old = panel.querySelectorAll('.dropdown-option');
        old.forEach(el => el.remove());
        let filtered = getAllNames();
        if (filter && filter.trim()) filtered = filtered.filter(n => n.toLowerCase().includes(filter.toLowerCase()));
        if (!filtered.length) {
          let empty = document.createElement('div');
          empty.className = 'dropdown-option';
          empty.textContent = 'No matches';
          empty.style.color = 'gray';
          panel.appendChild(empty);
          return;
        }
        for (let name of filtered) {
          let person = findPerson(name);
          if (!person) continue;
          let opt = document.createElement('div');
          opt.className = 'dropdown-option';
          let icon = person.gender === 'Male' ? '👨' : '👩';
          let parentLine = getParentDisplay(person);
          opt.innerHTML = '<div class="dropdown-option-name">' + icon + ' <strong>' + escapeHtml(person.name) + '</strong> ' + (person.gen ? '(' + person.gen + ')' : '') + '</div>' +
            (parentLine ? '<div class="dropdown-option-parent">' + escapeHtml(parentLine) + '</div>' : '');
          opt.onclick = function() { updateFamily(person, isFatherField); closePanel(); };
          panel.appendChild(opt);
        }
      }
      
      renderList('');
      
      searchInput.onclick = function(e) { e.stopPropagation(); };
      searchInput.oninput = function() { renderList(this.value); };
      
      document.body.appendChild(panel);
      let rect = btn.getBoundingClientRect();
      panel.style.position = 'fixed';
      panel.style.top = (rect.bottom + window.scrollY) + 'px';
      panel.style.left = rect.left + 'px';
      panel.style.width = '400px';
      panel.classList.add('open');
      
      function outsideClick(ev) {
        if (!wrapper.contains(ev.target) && activePanel && !activePanel.contains(ev.target)) {
          closePanel();
          document.removeEventListener('click', outsideClick);
        }
      }
      setTimeout(() => document.addEventListener('click', outsideClick), 100);
    };
    
    cell.appendChild(wrapper);
  }

  function onEdit(row, field, val) {
    if (field === 'name') row.name = val;
    if (field === 'spouse') row.spouse = val;
    if (field === 'detail') row.detail = val;
    if (currentLang === 'en') {
      if (field === 'name') row._nameEn = val;
      if (field === 'spouse') row._spouseEn = val;
      if (field === 'detail') row._detailEn = val;
    }
    renderTable();
  }

  function addMember() {
    if (!familyFather && !familyMother && (!rows[0].father && !rows[0].mother)) {
      alert("First select Father or Mother from dropdown");
      return;
    }
    let newRow = createEmptyRow(true);
    if (familyFather) newRow.gen = generateGen(familyFather, newRow.gender);
    rows.push(newRow);
    renderTable();
    document.querySelector('.table-wrapper').scrollTop = 1e9;
  }

  function deleteRow(idx) {
    if (rows.length === 1) { alert("Cannot delete last member. Refresh to reset."); return; }
    if (confirm("Delete this member?")) { rows.splice(idx, 1); renderTable(); }
  }

  function changeGender(row, newGender) {
    row.gender = newGender;
    if (row.father) row.gen = generateGen(row.father, newGender);
    renderTable();
  }





async function translateText(text, target) {
  if (!text) return text;
  try {
    // Using Google Translate's free endpoint
    let res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${target}&dt=t&q=${encodeURIComponent(text)}`);
    let data = await res.json();
    if (data && data[0]) {
      // Extract translated text from Google's response format
      let translated = data[0].map(item => item[0]).join('');
      return translated;
    }
    return text;
  } catch(e) {
    console.error("Translation error:", e);
    return text;
  }
}




  async function translateAll(target) {
    let status = document.getElementById('translationStatus');
    status.innerHTML = '⏳ Translating...';
    for (let row of rows) {
      if (row._nameEn === undefined) row._nameEn = row.name || "";
      if (row._fatherEn === undefined) row._fatherEn = row.father || "";
      if (row._motherEn === undefined) row._motherEn = row.mother || "";
      if (row._spouseEn === undefined) row._spouseEn = row.spouse || "";
      if (row._detailEn === undefined) row._detailEn = row.detail || "";
      if (target === 'ur') {
        row.name = await translateText(row._nameEn, 'ur');
        row.father = await translateText(row._fatherEn, 'ur');
        row.mother = await translateText(row._motherEn, 'ur');
        row.spouse = await translateText(row._spouseEn, 'ur');
        row.detail = await translateText(row._detailEn, 'ur');
      } else {
        row.name = row._nameEn;
        row.father = row._fatherEn;
        row.mother = row._motherEn;
        row.spouse = row._spouseEn;
        row.detail = row._detailEn;
      }
    }
    currentLang = target;
    renderTable();
    status.innerHTML = target === 'en' ? '● English' : '● اردو';
  }

  function renderTable() {
    let tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    for (let i = 0; i < rows.length; i++) {
      let m = rows[i];
      let isFirst = (i === 0);
      let tr = tbody.insertRow();
      let tdName = tr.insertCell(0);
      let nameInp = document.createElement('input');
      nameInp.value = m.name || '';
      nameInp.placeholder = currentLang === 'en' ? 'Name' : 'نام';
      nameInp.onchange = (function(r) { return function(e) { onEdit(r, 'name', e.target.value); }; })(m);
      tdName.appendChild(nameInp);
      let tdFather = tr.insertCell(1);
      if (isFirst) { createDropdown(tdFather, m.father, true); }
      else { let inp = document.createElement('input'); inp.value = m.father || ''; inp.readOnly = true; inp.style.background = '#f5f7fa'; tdFather.appendChild(inp); }
      let tdMother = tr.insertCell(2);
      if (isFirst) { createDropdown(tdMother, m.mother, false); }
      else { let inp = document.createElement('input'); inp.value = m.mother || ''; inp.readOnly = true; inp.style.background = '#f5f7fa'; tdMother.appendChild(inp); }
      let tdSpouse = tr.insertCell(3);
      let spouseInp = document.createElement('input');
      spouseInp.value = m.spouse || '';
      spouseInp.placeholder = currentLang === 'en' ? 'Spouse' : 'شریک حیات';
      spouseInp.onchange = (function(r) { return function(e) { onEdit(r, 'spouse', e.target.value); }; })(m);
      tdSpouse.appendChild(spouseInp);
      let tdGen = tr.insertCell(4);
      let genInp = document.createElement('input');
      genInp.value = m.gen || '';
      genInp.readOnly = true;
      genInp.style.background = '#f5f7fa';
      genInp.style.fontWeight = 'bold';
      tdGen.appendChild(genInp);
      let tdGender = tr.insertCell(5);
      let sel = document.createElement('select');
      let optM = document.createElement('option'); optM.value = 'Male'; optM.text = '👨 Male';
      let optF = document.createElement('option'); optF.value = 'Female'; optF.text = '👩 Female';
      sel.appendChild(optM); sel.appendChild(optF);
      sel.value = m.gender;
      sel.onchange = (function(r) { return function(e) { changeGender(r, e.target.value); }; })(m);
      tdGender.appendChild(sel);
      let tdDetail = tr.insertCell(6);
      let detailInp = document.createElement('input');
      detailInp.value = m.detail || '';
      detailInp.placeholder = currentLang === 'en' ? 'Details' : 'تفصیلات';
      detailInp.onchange = (function(r) { return function(e) { onEdit(r, 'detail', e.target.value); }; })(m);
      tdDetail.appendChild(detailInp);
      let tdAction = tr.insertCell(7);
      let delBtn = document.createElement('button');
      delBtn.innerHTML = '🗑️';
      delBtn.className = 'delete-btn';
      delBtn.onclick = (function(idx) { return function() { deleteRow(idx); }; })(i);
      tdAction.appendChild(delBtn);
    }
    document.getElementById('rowCount').innerHTML = rows.length + ' members';
  }

  function copyTable() {
    if (!rows.length) return alert('No data');
    let txt = "🌳 RIZVI FAMILY TREE 🌳\n\nName\tFather\tMother\tSpouse\tGen\tGender\tDetail\n";
    for (let r of rows) txt += (r.name || '—') + '\t' + (r.father || '—') + '\t' + (r.mother || '—') + '\t' + (r.spouse || '—') + '\t' + (r.gen || '—') + '\t' + (r.gender || '—') + '\t' + (r.detail || '—') + '\n';
    navigator.clipboard.writeText(txt).then(() => alert('Copied!')).catch(() => alert('Press Ctrl+C'));
  }

  document.getElementById('addRowBtn').onclick = addMember;
  document.getElementById('copyBtn').onclick = copyTable;
  document.getElementById('langSelect').onchange = function(e) { translateAll(e.target.value); };

  function init() {
    loadMainData();
    rows = [createEmptyRow(false)];
    familyFather = "";
    familyMother = "";
    currentLang = 'en';
    document.getElementById('langSelect').value = 'en';
    renderTable();
  }
  init();
</script>
</body>
</html>
