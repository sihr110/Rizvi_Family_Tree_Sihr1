<!-- ======================================== -->
<!-- FILE NAME: 6-dashboard-mobile.html       -->
<!-- Dashboard for Mobile                     -->
<!-- ======================================== -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Important: mobile viewport with zoom allowed, but fits any screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Rizvi Family · Mobile dashboard</title>
    
    <!-- Same fonts, minimal, fast -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <!-- xlsx for possible future extension -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Auto‑load data from 13-family-data.js -->
    <script src="13-family-data.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --bronze: #bc8c4f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 8px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 24px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.25);
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
        }

        .status-badge {
            background: var(--gold);
            color: var(--dark-blue);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .main-content {
            background: #fffcf8;
            padding: 16px 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .mobile-dashboard {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }


.dashboard-card {
    background: white;
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}



        .dashboard-card:active {
            transform: scale(0.98);
            border-color: var(--bronze);
        }

        .card-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 4px;
        }

        .card-desc {
            color: #666;
            font-size: 12px;
        }

        .action-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .exit-btn-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #5a0000;
            color: white;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid var(--gold);
            width: 100%;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.15s;
        }

        .exit-btn-container:active {
            background: #7a1f1f;
            transform: scale(0.98);
        }

        .exit-btn-container.hardreset {
            background: #1e4b8b;
        }

        .exit-btn-container.hardreset:active {
            background: #2569b3;
        }

        .exit-btn-icon {
            font-size: 18px;
        }

        .exit-btn-subtext {
            font-size: 11px;
            opacity: 0.9;
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 10px;
            border-top: 2px solid var(--gold);
            line-height: 1.2;
        }

        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span id="headerTitle">Rizvi Family (Mobile)</span>
            </div>
            <div class="header-actions">
                <span class="status-badge" id="headerStatus">📊 members: 0</span>
            </div>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="main-content" id="mainContent"></div>

        <div class="app-footer">
            Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010
        </div>
    </div>

    <script>
        (function() {
            let db = [];

        function loadFromStorageOrFallback() {
    if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length > 0) {
        db = FAMILY_DATA;
        localStorage.setItem('familyDB', JSON.stringify(db));
        if (typeof FILE_INFO !== 'undefined') {
            localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
        }
        console.log(`✅ Auto-loaded ${db.length} members from 13-family-data.js`);
    } else {
        db = [];
    }
    updateHeaderCounter();
}   
            function updateHeaderCounter() {
                const count = db.length;
                const statusEl = document.getElementById('headerStatus');
                if (statusEl) {
                    statusEl.innerHTML = `📊 members: ${count}`;
                }
            }

function hardResetMobile() {
    const confirmation = confirm("🚨 WARNING: This will permanently delete ALL family data from this browser. Are you sure?");
    if (confirmation) {
        localStorage.removeItem('familyDB');
        localStorage.removeItem('fileInfo');
        localStorage.removeItem('tableViewMember');
        localStorage.removeItem('tableViewFilters');
        db = [];
        loadFromStorageOrFallback();
        updateHeaderCounter();
        alert("✅ All data cleared and reloaded from 13-family-data.js.");
    }
}

            function logoutMobile() {
                if (confirm('Are you sure you want to exit and return to the login page?')) {
                    localStorage.removeItem('familyDB');
                    localStorage.removeItem('fileInfo');
                    localStorage.removeItem('tableViewMember');
                    localStorage.removeItem('tableViewFilters');
                    db = [];
                    window.location.href = '../index.html';
                }
            }

            function goToIndividualMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('No family data found. Please load data via admin on desktop.');
                        return;
                    }
                }
                window.location.href = '7-individual-tree-mobile.html';
            }

            function goToRootMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('No family data found. Please load data via admin on desktop.');
                        return;
                    }
                }
                window.location.href = '9-root-tree-mobile.html';
            }

            function goToFullTreeMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('No family data found. Please load data via admin on desktop.');
                        return;
                    }
                }
                window.location.href = '200-full-tree-mobile.html';
            }

            function renderMobileDashboard() {
                const mainContent = document.getElementById('mainContent');
                if (!mainContent) return;

                document.getElementById('headerTitle').innerText = 'Rizvi Family (Mobile)';

                mainContent.innerHTML = `
                    <div class="mobile-dashboard">
                        <div class="dashboard-card" id="cardIndividual">
                            <div class="card-icon">👤</div>
                            <div class="card-title">Individual</div>
                            <div class="card-desc">Single member search</div>
                        </div>

                        <div class="dashboard-card" id="cardRoot">
                            <div class="card-icon">👥</div>
                            <div class="card-title">Root Relative</div>
                            <div class="card-desc">Two member connection</div>
                        </div>

                        <div class="dashboard-card" id="cardFullTree">
                            <div class="card-icon">🌳</div>
                            <div class="card-title">Full Family Tree</div>
                            <div class="card-desc">Complete family tree view</div>
                        </div>

                        <div class="action-row">
                            <div class="exit-btn-container" id="exitBtn">
                                <span class="exit-btn-icon">🚪</span>
                                <span class="exit-btn-text">Exit to Login</span>
                                <span class="exit-btn-subtext">(back to main)</span>
                            </div>
                            <div class="exit-btn-container hardreset" id="resetBtn">
                                <span class="exit-btn-icon">⚠️</span>
                                <span class="exit-btn-text">Hard Reset</span>
                                <span class="exit-btn-subtext">(delete all)</span>
                            </div>
                        </div>
                    </div>
                `;



const individualCard = document.getElementById('cardIndividual');
individualCard.addEventListener('click', goToIndividualMobile);
individualCard.addEventListener('touchstart', function(e) {
    e.preventDefault();
    goToIndividualMobile();
});



                document.getElementById('cardRoot').addEventListener('click', goToRootMobile);
                document.getElementById('cardFullTree').addEventListener('click', goToFullTreeMobile);
                document.getElementById('exitBtn').addEventListener('click', logoutMobile);
                document.getElementById('resetBtn').addEventListener('click', hardResetMobile);
            }

            document.addEventListener('DOMContentLoaded', function() {
                const fileInput = document.getElementById('fileInput');
                if (fileInput) {
                    fileInput.onchange = function(e) {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            try {
                                const data = new Uint8Array(ev.target.result);
                                const wb = XLSX.read(data, { type: 'array' });
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                                db = rows.map(r => ({
                                    name: String(r.Name || r.name || '').trim(),
                                    father: String(r.Father || r.father || '').trim(),
                                    mother: String(r.Mother || r.mother || '').trim(),
                                    spouse: String(r.Spouse || r.spouse || '').trim(),
                                    gen: String(r.Gen || r.gen || '').trim(),
                                    gender: String(r.Gender || r.gender || 'Male').trim().toUpperCase(),
                                    maritalStatus: String(r.MaritalStatus || r.maritalStatus || r.Maritalstatus || r.maritalstatus || '').trim(),
                                    alive: String(r.Alive || r.alive || '').trim()
                                })).filter(p => p.name);
                                localStorage.setItem('familyDB', JSON.stringify(db));
                                updateHeaderCounter();
                            } catch (err) {
                                alert('❌ Error: ' + err.message);
                            }
                        };
                        reader.readAsArrayBuffer(file);
                    };
                }
            });

            loadFromStorageOrFallback();
            renderMobileDashboard();

            window.addEventListener('storage', function(e) {
                if (e.key === 'familyDB') {
                    if (e.newValue) {
                        try {
                            db = JSON.parse(e.newValue);
                        } catch (err) {
                            db = [];
                        }
                    } else {
                        db = [];
                    }
                    updateHeaderCounter();
                }
            });
        })();
    </script>
</body>
</html>
