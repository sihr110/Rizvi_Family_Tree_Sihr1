<!-- ======================================== -->
<!-- FILE NAME: 6-dashboard-mobile.html       -->
<!-- Dashboard for Mobile                     -->
<!-- ======================================== -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Important: mobile viewport with zoom allowed, but fits any screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Rizvi Family · Mobile dashboard</title>
    
    <!-- Same fonts, minimal, fast -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <!-- xlsx for possible future extension, but we keep it because original uses it (even if not strictly needed for mobile, keeping consistency) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Auto‑load data from 13-family-data.js exactly like PC version -->
    <script src="13-family-data.js"></script>
    
    <style>
        /* RESET / GLOBAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --bronze: #bc8c4f;
            --dashboard-green: #1b5e20;
            /* no admin purple needed, but kept unused */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;   /* same dark outer background */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 8px;          /* smaller outer padding for mobile */
        }

        /* main card – fits nearly full screen, gold border */
        .app-container {
            width: 100%;
            max-width: 480px;        /* comfortable mobile width, but fluid */
            background: white;
            border-radius: 24px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.25);
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        /* header exactly like PC but slightly compact */
        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .header-actions {
            display: flex;
        }

        .status-badge {
            background: var(--gold);
            color: var(--dark-blue);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* main content area: use vertical column for cards (no grid complexity) */
        .main-content {
            background: #fffcf8;
            padding: 24px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* mobile dashboard – simple stack, no admin card */
        .mobile-dashboard {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
        }

        /* two main cards: individual & root relative – exactly like PC style but full width */
        .dashboard-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }

        .dashboard-card:active {
            transform: scale(0.98);
            border-color: var(--bronze);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 8px;
        }

        .card-desc {
            color: #666;
            font-size: 15px;
        }

        /* Two bottom buttons: EXIT and HARD RESET – same style as PC container but stacked on mobile */
        .action-row {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }

        .exit-btn-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #5a0000;
            color: white;
            padding: 14px 16px;
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid var(--gold);
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.15s;
        }

        .exit-btn-container:active {
            background: #7a1f1f;
            transform: scale(0.98);
        }

        .exit-btn-container.hardreset {
            background: #1e4b8b;    /* blue for hard reset */
            border-color: var(--gold);
        }

        .exit-btn-container.hardreset:active {
            background: #2569b3;
        }

        .exit-btn-icon {
            font-size: 20px;
        }

        .exit-btn-subtext {
            font-size: 13px;
            opacity: 0.9;
        }

        /* footer exactly same */
        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 10px;
            font-size: 11px;
            border-top: 2px solid var(--gold);
            line-height: 1.3;
        }

        /* hidden file input (kept for load consistency but not directly used, because mobile user has no admin. However we may still need it if some future logic uses load, but we keep it hidden) */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- header same structure, dynamic -->
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span id="headerTitle">Rizvi Family (Mobile)</span>
            </div>
            <div class="header-actions">
                <span class="status-badge" id="headerStatus">📊 members: 0</span>
            </div>
        </div>

        <!-- Hidden file input (copied from PC version) -->
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <!-- Main content area will be filled by JS -->
        <div class="main-content" id="mainContent">
            <!-- JS will render mobile dashboard -->
        </div>

        <!-- footer exactly as original -->
        <div class="app-footer">
            Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010
        </div>
    </div>

    <script>
        (function() {
            // ---------- GLOBAL VARIABLES (same as PC version but no admin state needed) ----------
            let db = [];
            // currentView will always be 'dashboard' – we removed admin entirely, so no toggling.
            // But we keep isAdminAuthenticated = false and never used.

            // Helper: load data from localStorage or from 13-family-data.js
            function loadFromStorageOrFallback() {
                const saved = localStorage.getItem('familyDB');
                if (saved) {
                    try {
                        db = JSON.parse(saved);
                    } catch (e) {
                        db = [];
                    }
                } else {
                    // auto-load from global FAMILY_DATA (from 13-family-data.js)
                    if (typeof FAMILY_DATA !== 'undefined' && Array.isArray(FAMILY_DATA) && FAMILY_DATA.length > 0) {
                        db = FAMILY_DATA;
                        // also store to localStorage (like PC does)
                        localStorage.setItem('familyDB', JSON.stringify(db));
                        // optional fileInfo
                        if (typeof FILE_INFO !== 'undefined') {
                            localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
                        }
                    } else {
                        db = [];
                    }
                }
                updateHeaderCounter();
            }

            // update the header badge with member count
            function updateHeaderCounter() {
                const count = db.length;
                const statusEl = document.getElementById('headerStatus');
                if (statusEl) {
                    statusEl.innerHTML = `📊 members: ${count}`;
                }
                // Also optionally set in headerTitle? not needed.
            }

            // Hard reset (identical to PC version but without admin re-render)
            function hardResetMobile() {
                const confirmation = confirm("🚨 WARNING: This will permanently delete ALL family data from this browser. Are you sure?");
                if (confirmation) {
                    localStorage.removeItem('familyDB');
                    localStorage.removeItem('fileInfo');
                    localStorage.removeItem('tableViewMember');
                    localStorage.removeItem('tableViewFilters');
                    db = [];
                    updateHeaderCounter();
                    // try to auto-load again from 13-family-data.js (like PC autoLoadFromJS)
                    if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length > 0) {
                        db = FAMILY_DATA;
                        localStorage.setItem('familyDB', JSON.stringify(db));
                        if (typeof FILE_INFO !== 'undefined') {
                            localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
                        }
                    }
                    updateHeaderCounter();
                    alert("✅ All data cleared and reloaded from built‑in source (if available).");
                }
            }

            // UPDATED logout / exit: go back to password screen (index.html in root folder)
            function logoutMobile() {
                // Ask for confirmation before exiting
                if (confirm('Are you sure you want to exit and return to the login page?')) {
                    localStorage.removeItem('familyDB');
                    localStorage.removeItem('fileInfo');
                    localStorage.removeItem('tableViewMember');
                    localStorage.removeItem('tableViewFilters');
                    db = [];
                    
                    // Redirect to main index.html in the root folder (one level up)
                    console.log('Redirecting to main login page...');
                    window.location.href = '../index.html';
                }
            }

            // ==================== UPDATED NAVIGATION LINKS ====================
            // Navigate to individual tree (NOW uses file 2 - universal)
            function goToIndividualMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('No family data found. Please load data via admin on desktop.');
                        return;
                    }
                }
                window.location.href = '2-individual-tree-pc.html';
            }

            // Navigate to individual table view (file 3)
            function goToIndividualTableMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('No family data found. Please load data via admin on desktop.');
                        return;
                    }
                }
                window.location.href = '3-individual-table-pc.html';
            }

            // Navigate to root tree (NOW uses file 4 - universal)
            function goToRootMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('No family data found. Please load data via admin on desktop.');
                        return;
                    }
                }
                window.location.href = '4-root-tree-pc.html';
            }

            // Navigate to root table view (file 5)
            function goToRootTableMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('No family data found. Please load data via admin on desktop.');
                        return;
                    }
                }
                window.location.href = '5-root-table-pc.html';
            }

            // Render the mobile dashboard (now with 4 cards: Individual Tree, Individual Table, Root Tree, Root Table)
            function renderMobileDashboard() {
                const mainContent = document.getElementById('mainContent');
                if (!mainContent) return;

                // header title might be updated, but we set it static
                document.getElementById('headerTitle').innerText = 'Rizvi Family (Mobile)';

                mainContent.innerHTML = `
                    <div class="mobile-dashboard">
                        <!-- INDIVIDUAL TREE CARD -->
                        <div class="dashboard-card" id="cardIndividualTree">
                            <div class="card-icon">🌳</div>
                            <div class="card-title">Individual Tree</div>
                            <div class="card-desc">Single member tree view</div>
                        </div>

                        <!-- INDIVIDUAL TABLE CARD -->
                        <div class="dashboard-card" id="cardIndividualTable">
                            <div class="card-icon">📊</div>
                            <div class="card-title">Individual Table</div>
                            <div class="card-desc">Single member table view</div>
                        </div>

                        <!-- ROOT TREE CARD -->
                        <div class="dashboard-card" id="cardRootTree">
                            <div class="card-icon">👥</div>
                            <div class="card-title">Root Tree</div>
                            <div class="card-desc">Two member tree view</div>
                        </div>

                        <!-- ROOT TABLE CARD -->
                        <div class="dashboard-card" id="cardRootTable">
                            <div class="card-icon">📋</div>
                            <div class="card-title">Root Table</div>
                            <div class="card-desc">Two member table view</div>
                        </div>

                        <!-- Action buttons: exit and hard reset -->
                        <div class="action-row">
                            <div class="exit-btn-container" id="exitBtn">
                                <span class="exit-btn-icon">🚪</span>
                                <span class="exit-btn-text">Exit to Login</span>
                                <span class="exit-btn-subtext">(back to main)</span>
                            </div>
                            <div class="exit-btn-container hardreset" id="resetBtn">
                                <span class="exit-btn-icon">⚠️</span>
                                <span class="exit-btn-text">Hard Reset</span>
                                <span class="exit-btn-subtext">(delete all)</span>
                            </div>
                        </div>
                    </div>
                `;

                // attach listeners
                document.getElementById('cardIndividualTree').addEventListener('click', goToIndividualMobile);
                document.getElementById('cardIndividualTable').addEventListener('click', goToIndividualTableMobile);
                document.getElementById('cardRootTree').addEventListener('click', goToRootMobile);
                document.getElementById('cardRootTable').addEventListener('click', goToRootTableMobile);
                document.getElementById('exitBtn').addEventListener('click', logoutMobile);
                document.getElementById('resetBtn').addEventListener('click', hardResetMobile);
            }

            // File input change handler (copied from PC version but simplified, only to update db if user somehow loads via file)
            // Actually mobile doesn't have admin/load, but we keep same logic to allow manual load if triggered via some dev.
            document.addEventListener('DOMContentLoaded', function() {
                const fileInput = document.getElementById('fileInput');
                if (fileInput) {
                    fileInput.onchange = function(e) {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            try {
                                const data = new Uint8Array(ev.target.result);
                                const wb = XLSX.read(data, { type: 'array' });
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                                db = rows.map(r => ({
                                    name: String(r.Name || r.name || '').trim(),
                                    father: String(r.Father || r.father || '').trim(),
                                    mother: String(r.Mother || r.mother || '').trim(),
                                    spouse: String(r.Spouse || r.spouse || '').trim(),
                                    gen: String(r.Gen || r.gen || '').trim(),
                                    gender: String(r.Gender || r.gender || 'Male').trim().toUpperCase(),
                                    maritalStatus: String(r.MaritalStatus || r.maritalStatus || r.Maritalstatus || r.maritalstatus || '').trim(),
                                    alive: String(r.Alive || r.alive || '').trim()
                                })).filter(p => p.name);
                                localStorage.setItem('familyDB', JSON.stringify(db));
                                updateHeaderCounter();
                                // No admin view, just update dashboard (stay on same view)
                            } catch (err) {
                                alert('❌ Error: ' + err.message);
                            }
                        };
                        reader.readAsArrayBuffer(file);
                    };
                }
            });

            // initialization: load data from localStorage or 13-family-data.js, then render
            loadFromStorageOrFallback();
            renderMobileDashboard();

            // Check for ?view=admin? no – but we ignore completely (no admin)
            // already done in loadFromStorageOrFallback.

            // Ensure that if new data arrives via localStorage event (if multiple tabs), we could update, but not needed.
            // just keep header updated.
            window.addEventListener('storage', function(e) {
                if (e.key === 'familyDB') {
                    if (e.newValue) {
                        try {
                            db = JSON.parse(e.newValue);
                        } catch (err) {
                            db = [];
                        }
                    } else {
                        db = [];
                    }
                    updateHeaderCounter();
                }
            });

            // optional: override any console noise, but fine.
        })();
    </script>
</body>
</html>
