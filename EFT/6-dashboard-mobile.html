<!-- ======================================== -->
<!-- FILE NAME: 6-dashboard-mobile.html       -->
<!-- Dashboard for Mobile - English           -->
<!-- FIXED: Added toast, loading overlay, viewport -->
<!-- ======================================== -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- FIXED: viewport matching Urdu version -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rizvi Family · Mobile dashboard</title>
    
    <!-- Same fonts, minimal, fast -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <!-- xlsx for possible future extension -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Auto‑load data from 13-family-data.js exactly like PC version -->
    <script src="13-family-data.js"></script>
    
    <style>
        /* RESET / GLOBAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --bronze: #bc8c4f;
            --dashboard-green: #1b5e20;
            /* no admin purple needed, but kept unused */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 8px;
        }

        /* main card – fits nearly full screen, gold border */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 24px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.25);
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        /* header exactly like PC but slightly compact */
        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .header-actions {
            display: flex;
        }

        .status-badge {
            background: var(--gold);
            color: var(--dark-blue);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* main content area: use vertical column for cards (no grid complexity) */
        .main-content {
            background: #fffcf8;
            padding: 24px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* mobile dashboard – simple stack, no admin card */
        .mobile-dashboard {
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
        }

        /* two main cards: individual & root relative */
        .dashboard-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }

        .dashboard-card:active {
            transform: scale(0.98);
            border-color: var(--bronze);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 8px;
        }

        .card-desc {
            color: #666;
            font-size: 15px;
        }

        /* Two bottom buttons: EXIT and HARD RESET */
        .action-row {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }

        .exit-btn-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #5a0000;
            color: white;
            padding: 14px 16px;
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid var(--gold);
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.15s;
        }

        .exit-btn-container:active {
            background: #7a1f1f;
            transform: scale(0.98);
        }

        .exit-btn-container.hardreset {
            background: #1e4b8b;
            border-color: var(--gold);
        }

        .exit-btn-container.hardreset:active {
            background: #2569b3;
        }

        .exit-btn-icon {
            font-size: 20px;
        }

        .exit-btn-subtext {
            font-size: 13px;
            opacity: 0.9;
        }

        /* footer exactly same */
        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 10px;
            font-size: 11px;
            border-top: 2px solid var(--gold);
            line-height: 1.3;
        }

        /* hidden file input (kept for consistency) */
        #fileInput {
            display: none;
        }

        /* ========== ADDED: TOAST NOTIFICATIONS ========== */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideDown {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }

        /* ========== ADDED: LOADING OVERLAY ========== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            display: none;
        }

        .loading-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid var(--gold);
            text-align: center;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--gold);
            border-top-color: var(--dark-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- header same structure, dynamic -->
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span id="headerTitle">Rizvi Family (Mobile)</span>
            </div>
            <div class="header-actions">
                <span class="status-badge" id="headerStatus">📊 members: 0</span>
            </div>
        </div>

        <!-- Hidden file input (kept for consistency) -->
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <!-- Main content area will be filled by JS -->
        <div class="main-content" id="mainContent">
            <!-- JS will render mobile dashboard -->
        </div>

        <!-- footer exactly as original -->
        <div class="app-footer">
            Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010
        </div>
    </div>

    <!-- ========== ADDED: LOADING OVERLAY ========== -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div id="loadingMessage">Loading...</div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- GLOBAL VARIABLES ----------
            let db = [];

            // ========== ADDED: TOAST FUNCTION ==========
            function showToast(message) {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    bottom: 20px;
                    left: 20px;
                    right: 20px;
                    background: var(--dark-blue);
                    color: var(--gold);
                    padding: 15px;
                    border-radius: 12px;
                    text-align: center;
                    border: 2px solid var(--gold);
                    z-index: 5000;
                    font-family: 'Inter', sans-serif;
                    animation: slideUp 0.3s ease;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                `;
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.animation = 'slideDown 0.3s ease';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }

            // ========== ADDED: LOADING FUNCTIONS ==========
            function showLoading(message = 'Loading...') {
                document.getElementById('loadingMessage').textContent = message;
                document.getElementById('loadingOverlay').style.display = 'flex';
            }

            function hideLoading() {
                document.getElementById('loadingOverlay').style.display = 'none';
            }

            // Helper: load data from localStorage or from 13-family-data.js
            function loadFromStorageOrFallback() {
                const saved = localStorage.getItem('familyDB');
                if (saved) {
                    try {
                        db = JSON.parse(saved);
                    } catch (e) {
                        db = [];
                    }
                } else {
                    // auto-load from global FAMILY_DATA (from 13-family-data.js)
                    if (typeof FAMILY_DATA !== 'undefined' && Array.isArray(FAMILY_DATA) && FAMILY_DATA.length > 0) {
                        db = FAMILY_DATA;
                        // also store to localStorage (like PC does)
                        localStorage.setItem('familyDB', JSON.stringify(db));
                        // optional fileInfo
                        if (typeof FILE_INFO !== 'undefined') {
                            localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
                        }
                    } else {
                        db = [];
                    }
                }
                updateHeaderCounter();
            }

            // update the header badge with member count
            function updateHeaderCounter() {
                const count = db.length;
                const statusEl = document.getElementById('headerStatus');
                if (statusEl) {
                    statusEl.innerHTML = `📊 members: ${count}`;
                }
            }

            // Hard reset (identical to PC version but without admin re-render)
            function hardResetMobile() {
                const confirmation = confirm("🚨 WARNING: This will permanently delete ALL family data from this browser. Are you sure?");
                if (confirmation) {
                    localStorage.removeItem('familyDB');
                    localStorage.removeItem('fileInfo');
                    localStorage.removeItem('tableViewMember');
                    localStorage.removeItem('tableViewFilters');
                    db = [];
                    updateHeaderCounter();
                    // try to auto-load again from 13-family-data.js
                    if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length > 0) {
                        db = FAMILY_DATA;
                        localStorage.setItem('familyDB', JSON.stringify(db));
                        if (typeof FILE_INFO !== 'undefined') {
                            localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
                        }
                    }
                    updateHeaderCounter();
                    showToast('✅ All data cleared and reloaded from built‑in source (if available).');
                }
            }

            // UPDATED logout / exit: go back to password screen (index.html in root folder)
            function logoutMobile() {
                // Ask for confirmation before exiting
                if (confirm('Are you sure you want to exit and return to the login page?')) {
                    localStorage.removeItem('familyDB');
                    localStorage.removeItem('fileInfo');
                    localStorage.removeItem('tableViewMember');
                    localStorage.removeItem('tableViewFilters');
                    db = [];
                    
                    // Redirect to main index.html in the root folder (one level up)
                    console.log('Redirecting to main login page...');
                    window.location.href = '../index.html';
                }
            }

            // Navigate to individual tree (7-individual-tree-mobile.html)
            function goToIndividualMobile() {
                // Ensure data is available
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        showToast('❌ No family data found. Please load data via admin on desktop.');
                        return;
                    }
                }
                window.location.href = '7-individual-tree-mobile.html';
            }

            // Navigate to root tree (9-root-tree-mobile.html)
            function goToRootMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        showToast('❌ No family data found. Please load data via admin on desktop.');
                        return;
                    }
                }
                window.location.href = '9-root-tree-mobile.html';
            }

            // Render the mobile dashboard (no admin card)
            function renderMobileDashboard() {
                const mainContent = document.getElementById('mainContent');
                if (!mainContent) return;

                document.getElementById('headerTitle').innerText = 'Rizvi Family (Mobile)';

                mainContent.innerHTML = `
                    <div class="mobile-dashboard">
                        <!-- INDIVIDUAL CARD -->
                        <div class="dashboard-card" id="cardIndividual">
                            <div class="card-icon">👤</div>
                            <div class="card-title">Individual</div>
                            <div class="card-desc">Single member search</div>
                        </div>

                        <!-- ROOT RELATIVE CARD -->
                        <div class="dashboard-card" id="cardRoot">
                            <div class="card-icon">👥</div>
                            <div class="card-title">Root Relative</div>
                            <div class="card-desc">Two member connection</div>
                        </div>

                        <!-- Action buttons: exit and hard reset -->
                        <div class="action-row">
                            <div class="exit-btn-container" id="exitBtn">
                                <span class="exit-btn-icon">🚪</span>
                                <span class="exit-btn-text">Exit to Login</span>
                                <span class="exit-btn-subtext">(back to main)</span>
                            </div>
                            <div class="exit-btn-container hardreset" id="resetBtn">
                                <span class="exit-btn-icon">⚠️</span>
                                <span class="exit-btn-text">Hard Reset</span>
                                <span class="exit-btn-subtext">(delete all)</span>
                            </div>
                        </div>
                    </div>
                `;

                // attach listeners
                document.getElementById('cardIndividual').addEventListener('click', goToIndividualMobile);
                document.getElementById('cardRoot').addEventListener('click', goToRootMobile);
                document.getElementById('exitBtn').addEventListener('click', logoutMobile);
                document.getElementById('resetBtn').addEventListener('click', hardResetMobile);
            }

            // File input change handler
            document.addEventListener('DOMContentLoaded', function() {
                const fileInput = document.getElementById('fileInput');
                if (fileInput) {
                    fileInput.onchange = function(e) {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            try {
                                const data = new Uint8Array(ev.target.result);
                                const wb = XLSX.read(data, { type: 'array' });
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                                db = rows.map(r => ({
                                    name: String(r.Name || r.name || '').trim(),
                                    father: String(r.Father || r.father || '').trim(),
                                    mother: String(r.Mother || r.mother || '').trim(),
                                    spouse: String(r.Spouse || r.spouse || '').trim(),
                                    gen: String(r.Gen || r.gen || '').trim(),
                                    gender: String(r.Gender || r.gender || 'Male').trim().toUpperCase(),
                                    maritalStatus: String(r.MaritalStatus || r.maritalStatus || '').trim(),
                                    alive: String(r.Alive || r.alive || '').trim()
                                })).filter(p => p.name);
                                localStorage.setItem('familyDB', JSON.stringify(db));
                                updateHeaderCounter();
                                showToast(`✅ ${db.length} members loaded`);
                            } catch (err) {
                                showToast('❌ Error: ' + err.message);
                            }
                        };
                        reader.readAsArrayBuffer(file);
                    };
                }
            });

            // initialization: load data from localStorage or 13-family-data.js, then render
            loadFromStorageOrFallback();
            renderMobileDashboard();

            // Ensure that if new data arrives via localStorage event, we update
            window.addEventListener('storage', function(e) {
                if (e.key === 'familyDB') {
                    if (e.newValue) {
                        try {
                            db = JSON.parse(e.newValue);
                        } catch (err) {
                            db = [];
                        }
                    } else {
                        db = [];
                    }
                    updateHeaderCounter();
                }
            });
        })();
    </script>
</body>
</html>
