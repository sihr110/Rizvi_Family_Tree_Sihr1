<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=0.5, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover" />
    <title>عالمی خاندان کی تلاش · موبائل</title>
    
    <!-- ===== LOCAL URDU FONTS ===== -->
    <style>
        /* Import Urdu-friendly fonts */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Inter:wght@400;600;700&display=swap');
        
        /* Fallback: Use system Urdu fonts if Google Fonts fail */
        @font-face {
            font-family: 'UrduFont';
            src: local('Jameel Noori Nastaleeq'), local('Noto Nastaliq Urdu'), local('Urdu Typesetting');
            font-weight: normal;
        }
        
        /* ----- بنیادی ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --light-pink: #ffe4e9;
            --bronze: #bc8c4f;
        }

        body {
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', 'Urdu Typesetting', 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            width: 100%;
        }

        /* ----- ہیڈر ----- */
        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            flex-shrink: 0;
        }

        .header-title {
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', serif;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-title span:last-child { font-size: 13px; }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .header-actions { display: flex; gap: 8px; }

        .home-btn {
            background: var(--gold);
            color: var(--dark-blue);
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            font-family: 'Inter', 'Noto Nastaliq Urdu', sans-serif;
            text-decoration: none;
        }
        .home-btn:hover { background: #e6c35c; transform: scale(1.02); }

        /* ----- مرکزی مواد ----- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fffcf8;
            padding: 12px 15px 15px 15px;
        }

        /* ----- تلاش کا پینل ----- */
        .search-panel {
            background: #fcf9f4;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e8dfd3;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 14px;
            position: relative;
            flex-shrink: 0;
        }

        .search-panel label {
            font-weight: 600;
            font-size: 12px;
            color: #2d241a;
            letter-spacing: 0.2px;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }

        .search-wrapper {
            flex: 2;
            min-width: 180px;
            position: relative;
        }

        .search-wrapper input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #d4c9bb;
            border-radius: 60px;
            font-size: 13px;
            background: white;
            transition: 0.2s;
            outline: none;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', 'Inter', sans-serif;
        }
        .search-wrapper input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
        }

        .search-panel .btn {
            background: var(--gold);
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            color: #0f172a;
            transition: 0.2s;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
            white-space: nowrap;
        }
        .search-panel .btn:hover { background: #e6c35c; transform: scale(1.01); }

        .search-panel .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            padding: 8px 18px;
        }
        .search-panel .btn-outline:hover { background: #fcf3e0; }

        /* ----- ڈراپ ڈاؤن ----- */
        .dropdown-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            max-height: 280px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            padding: 4px 0;
        }
        .dropdown-list.show { display: block !important; }

        .dropdown-item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f0ebe4;
            transition: 0.1s;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: #fcf3e0; }

        .dropdown-item .main-line {
            font-weight: 700;
            font-size: 13px;
            color: #0f172a;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }
        .dropdown-item .main-line .match-badge {
            font-weight: 400;
            font-size: 11px;
            color: #5a0000;
            background: #f2ece4;
            padding: 1px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-right: 4px;
            font-family: 'Inter', sans-serif;
        }
        .dropdown-item .father-line {
            font-size: 11px;
            color: #5a4a3a;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }
        .dropdown-item .father-line strong { color: #5a0000; font-weight: 600; }
        .dropdown-item .gen-tag {
            font-size: 10px;
            color: #7a6a58;
            background: #f2ece4;
            padding: 1px 8px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 2px;
            align-self: flex-start;
            font-family: 'Inter', sans-serif;
        }
        .no-match {
            padding: 14px 16px;
            color: #7a6a58;
            font-style: italic;
            text-align: center;
            font-size: 13px;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }
        .dropdown-list::-webkit-scrollbar { width: 6px; }
        .dropdown-list::-webkit-scrollbar-track { background: #f5f1eb; border-radius: 6px; }
        .dropdown-list::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 6px; }

        /* ----- اعداد و شمار ----- */
        .stats {
            font-size: 12px;
            color: #4a3f33;
            background: #f3ede6;
            padding: 5px 16px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 10px;
            flex-shrink: 0;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }

        /* ----- جدول ----- */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e4dbcf;
            background: white;
            flex: 1;
            min-height: 150px;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 600px;
        }

        th {
            background: #5a0000;
            color: #f5ede4;
            font-weight: 600;
            padding: 12px 10px;
            text-align: right;
            font-size: 11px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }
        td {
            padding: 10px 10px;
            border-bottom: 1px solid #ede7df;
            vertical-align: top;
            background-color: white;
            font-size: 12px;
            text-align: right;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #fcf8f0; }

        .match-tag {
            display: inline-block;
            background: var(--gold);
            color: #0f172a;
            font-size: 9px;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 30px;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }

        .details-preview {
            font-size: 11px;
            color: #555;
            max-width: 250px;
            max-height: 100px;
            overflow-y: auto;
            word-break: break-word;
            background: #f9f5ee;
            padding: 4px 8px;
            border-radius: 4px;
            display: block;
            white-space: pre-wrap;
            line-height: 1.4;
            border: 1px solid #e8dfd3;
            text-align: right;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }
        .details-preview .highlight-text {
            background: #fcf3d9;
            font-weight: 600;
        }

        .no-results {
            padding: 40px 16px;
            text-align: center;
            color: #7a6a58;
            font-size: 14px;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }
        .no-results span { font-size: 40px; display: block; margin-bottom: 12px; }

        /* ----- فوٹر نوٹ ----- */
        .footer-note {
            margin-top: 10px;
            font-size: 11px;
            color: #7a6a58;
            text-align: left;
            border-top: 1px solid #e8dfd3;
            padding-top: 10px;
            flex-shrink: 0;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 6px;
            font-size: 10px;
            border-top: 2px solid var(--gold);
            flex-shrink: 0;
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', sans-serif;
        }

        /* ----- موبائل ردعمل ----- */
        @media (max-width: 600px) {
            body { padding: 5px; }
            .container { border-radius: 12px; }
            .app-header { padding: 6px 12px; }
            .header-title { font-size: 13px; }
            .header-title span:last-child { font-size: 11px; }
            .home-btn { padding: 4px 10px; font-size: 10px; }
            .main-content { padding: 10px; }
            .search-panel { padding: 12px; gap: 8px; }
            .search-wrapper { min-width: 140px; }
            .search-wrapper input { padding: 8px 12px; font-size: 12px; }
            .search-panel .btn { padding: 8px 14px; font-size: 12px; }
            .search-panel .btn-outline { padding: 6px 14px; }
            .stats { font-size: 11px; padding: 4px 12px; }
            th { font-size: 10px; padding: 8px 6px; }
            td { font-size: 11px; padding: 8px 6px; }
            .details-preview { font-size: 10px; max-width: 150px; }
            table { min-width: 480px; }
            .footer-note { font-size: 10px; }
        }

        @media (max-width: 400px) {
            .header-title span:last-child { display: none; }
            .search-panel { flex-direction: column; align-items: stretch; }
            .search-wrapper { min-width: unset; }
            table { min-width: 400px; font-size: 10px; }
            th { font-size: 9px; padding: 6px 4px; }
            td { font-size: 10px; padding: 6px 4px; }
            .details-preview { max-width: 100px; font-size: 9px; padding: 3px 6px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ===== ہیڈر ===== -->
    <div class="app-header">
        <div class="header-title">
            <span class="header-icon">🔍</span>
            <span>عالمی تلاش</span>
            <span>· کوئی بھی نام</span>
        </div>
        <div class="header-actions">
            <a href="01-Dashboard-U.html" class="home-btn">🏠 ہوم</a>
        </div>
    </div>

    <!-- ===== مرکزی مواد ===== -->
    <div class="main-content">

        <div class="search-panel">
            <label for="searchInput">تلاش کریں</label>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="نام درج کریں..." autocomplete="off" />
                <div class="dropdown-list" id="dropdownList"></div>
            </div>
            <button class="btn" id="searchBtn">🔎 تلاش</button>
            <button class="btn btn-outline" id="clearBtn">✕ صاف کریں</button>
        </div>

        <div id="resultArea" style="flex:1; display:flex; flex-direction:column; min-height:0;">
            <div class="stats" id="statsDisplay">⚡ لوڈ ہو رہا ہے...</div>
            <div class="table-wrapper">
                <table id="resultTable">
                    <thead>
                        <tr>
                            <th>نام</th>
                            <th>والد</th>
                            <th>والدہ</th>
                            <th>شریک حیات</th>
                            <th>نسل</th>
                            <th>ملاپ</th>
                            <th>تفصیلات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="no-results"><span>📂</span> ڈیٹا لوڈ ہو رہا ہے...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="footer-note">
                <span id="resultCount">0</span> نتائج
            </div>
        </div>
    </div>

    <!-- ===== فوٹر ===== -->
    <div class="app-footer">
        ڈویلپر: عمران حیدر ص/ سید رسالت حسین رضوی | 0332-787-6010
    </div>
</div>

<!-- ===== ڈیٹا فائل ===== -->
<script src="33-family-data-urdu.js"></script>

<script>
    (function() {
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const tableBody = document.getElementById('tableBody');
        const statsDisplay = document.getElementById('statsDisplay');
        const resultCountSpan = document.getElementById('resultCount');
        const dropdownList = document.getElementById('dropdownList');

        let familyData = [];

        // ✅ FIXED: Using FAMILY_DATA_URDU instead of FAMILY_DATA
        if (typeof FAMILY_DATA_URDU !== 'undefined' && Array.isArray(FAMILY_DATA_URDU) && FAMILY_DATA_URDU.length > 0) {
            familyData = FAMILY_DATA_URDU;
            console.log(`✅ ${familyData.length} اراکین لوڈ ہو گئے`);
        } else {
            console.error('❌ FAMILY_DATA_URDU موجود نہیں یا خالی ہے');
            statsDisplay.textContent = '⚠️ ڈیٹا لوڈ نہیں ہو سکا';
            tableBody.innerHTML = `<tr><td colspan="7" class="no-results"><span>⚠️</span> ڈیٹا فائل موجود نہیں<br><small>33-family-data-urdu.js</small><br><br>➡️ چیک کریں: فائل اسی فولڈر میں ہے؟</td></tr>`;
            return;
        }

        const totalMembers = familyData.length;
        statsDisplay.textContent = `⚡ ${totalMembers} اراکین · ٹائپ کرنا شروع کریں`;

        function getMatchInfo(member, query) {
            const q = query.trim().toLowerCase();
            const fields = [
                { key: 'نام', value: member.name || '' },
                { key: 'والد', value: member.father || '' },
                { key: 'والدہ', value: member.mother || '' },
                { key: 'شریک حیات', value: member.spouse || '' },
                { key: 'نسل', value: member.gen || '' },
                { key: 'تفصیلات', value: member.details || '' }
            ];
            for (const f of fields) {
                if (f.value.toLowerCase().includes(q)) {
                    return { field: f.key, value: f.value };
                }
            }
            return null;
        }

        function escapeAttr(str) {
            if (!str) return '';
            return String(str).replace(/["']/g, '&quot;');
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        function highlightText(text, query) {
            if (!text) return '—';
            const q = query.trim().toLowerCase();
            if (!q) return escHtml(text).replace(/\\n/g, '<br>');
            const lowerText = text.toLowerCase();
            const idx = lowerText.indexOf(q);
            if (idx === -1) return escHtml(text).replace(/\\n/g, '<br>');
            const before = escHtml(text.substring(0, idx));
            const match = escHtml(text.substring(idx, idx + q.length));
            const after = escHtml(text.substring(idx + q.length));
            return (before + '<span class="highlight-text">' + match + '</span>' + after).replace(/\\n/g, '<br>');
        }

        function buildDropdown(query) {
            if (!query || query.trim() === '') {
                dropdownList.classList.remove('show');
                dropdownList.innerHTML = '';
                return;
            }
            const q = query.trim().toLowerCase();
            const matches = familyData.filter(m => {
                const allText = [
                    m.name || '', m.father || '', m.mother || '',
                    m.spouse || '', m.gen || '', m.details || ''
                ].join(' ').toLowerCase();
                return allText.includes(q);
            });
            const topMatches = matches.slice(0, 15);
            if (topMatches.length === 0) {
                dropdownList.innerHTML = `<div class="no-match">کوئی مماثل نام یا رشتہ نہیں ملا</div>`;
                dropdownList.classList.add('show');
                return;
            }
            let html = '';
            for (const m of topMatches) {
                const matchInfo = getMatchInfo(m, q);
                const fatherDisplay = m.father || '—';
                let mainLine = escHtml(m.name || '—');
                if (matchInfo) {
                    const displayValue = matchInfo.field === 'تفصیلات'
                        ? (matchInfo.value.length > 60 ? matchInfo.value.substring(0, 60) + '…' : matchInfo.value).replace(/\\n/g, ' ')
                        : matchInfo.value;
                    mainLine += ` <span class="match-badge">${matchInfo.field}: ${escHtml(displayValue)}</span>`;
                }
                const fatherLine = `والد : ${escHtml(fatherDisplay)}`;
                html += `
                    <div class="dropdown-item" data-name="${escapeAttr(m.name)}">
                        <div class="main-line">${mainLine}</div>
                        <div class="father-line"><strong>${fatherLine}</strong></div>
                        <div class="gen-tag">${escHtml(m.gen || '—')}</div>
                    </div>
                `;
            }
            dropdownList.innerHTML = html;
            dropdownList.classList.add('show');
            dropdownList.querySelectorAll('.dropdown-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    const name = this.dataset.name;
                    if (name) {
                        searchInput.value = name;
                        dropdownList.classList.remove('show');
                        performSearch();
                    }
                });
            });
        }

        function searchInAllFields(query) {
            if (!query || query.trim() === '') return [];
            const q = query.trim().toLowerCase();
            const results = [];
            for (const member of familyData) {
                let matchField = null;
                const fields = [
                    { key: 'نام', value: member.name || '' },
                    { key: 'والد', value: member.father || '' },
                    { key: 'والدہ', value: member.mother || '' },
                    { key: 'شریک حیات', value: member.spouse || '' },
                    { key: 'نسل', value: member.gen || '' },
                    { key: 'تفصیلات', value: member.details || '' }
                ];
                for (const f of fields) {
                    if (f.value.toLowerCase().includes(q)) {
                        matchField = f.key;
                        break;
                    }
                }
                if (matchField) {
                    results.push({ ...member, _matchField: matchField });
                }
            }
            return results;
        }

        function renderResults(results, query) {
            if (!results || results.length === 0) {
                tableBody.innerHTML =
                    `<tr><td colspan="7" class="no-results"><span>🔎</span> کوئی نتیجہ نہیں ملا</td></tr>`;
                statsDisplay.textContent = `⚡ 0 مماثل · ${totalMembers} اراکین`;
                resultCountSpan.textContent = '0';
                return;
            }
            let html = '';
            for (const m of results) {
                const matchField = m._matchField || '—';
                let detailsPreview = '—';
                if (m.details && m.details.trim() !== '') {
                    const q = query ? query.trim().toLowerCase() : '';
                    if (matchField === 'تفصیلات' && q) {
                        detailsPreview = highlightText(m.details, q);
                    } else {
                        detailsPreview = escHtml(m.details).replace(/\\n/g, '<br>');
                    }
                }
                html += `<tr>`;
                html += `<td><strong>${escHtml(m.name || '—')}</strong></td>`;
                html += `<td>${escHtml(m.father || '—')}</td>`;
                html += `<td>${escHtml(m.mother || '—')}</td>`;
                html += `<td>${escHtml(m.spouse || '—')}</td>`;
                html += `<td><code style="background:#f2ece4; padding:1px 6px; border-radius:20px; font-size:10px;">${escHtml(m.gen || '—')}</code></td>`;
                html += `<td><span class="match-tag">${escHtml(matchField)}</span></td>`;
                html += `<td><span class="details-preview">${detailsPreview}</span></td>`;
                html += `</tr>`;
            }
            tableBody.innerHTML = html;
            statsDisplay.textContent = `⚡ ${results.length} مماثل · ${totalMembers} اراکین`;
            resultCountSpan.textContent = results.length;
        }

        function performSearch() {
            const query = searchInput.value;
            if (!query || query.trim() === '') {
                tableBody.innerHTML =
                    `<tr><td colspan="7" class="no-results"><span>🔎</span> تمام فیلڈز میں تلاش کرنے کے لیے کلید الفاظ ٹائپ کریں</td></tr>`;
                statsDisplay.textContent = `⚡ ${totalMembers} اراکین · کلید الفاظ درج کریں`;
                resultCountSpan.textContent = '0';
                dropdownList.classList.remove('show');
                return;
            }
            const results = searchInAllFields(query);
            renderResults(results, query);
            dropdownList.classList.remove('show');
        }

        function clearSearch() {
            searchInput.value = '';
            tableBody.innerHTML =
                `<tr><td colspan="7" class="no-results"><span>🔎</span> تمام فیلڈز میں تلاش کرنے کے لیے کلید الفاظ ٹائپ کریں</td></tr>`;
            statsDisplay.textContent = `⚡ ${totalMembers} اراکین · کلید الفاظ درج کریں`;
            resultCountSpan.textContent = '0';
            dropdownList.classList.remove('show');
            searchInput.focus();
        }

        searchInput.addEventListener('input', function(e) {
            const val = this.value;
            buildDropdown(val);
            if (!val || val.trim() === '') {
                dropdownList.classList.remove('show');
            }
        });

        document.addEventListener('click', function(e) {
            const wrapper = document.querySelector('.search-wrapper');
            if (wrapper && !wrapper.contains(e.target)) {
                dropdownList.classList.remove('show');
            }
        });

        searchBtn.addEventListener('click', performSearch);
        clearBtn.addEventListener('click', clearSearch);

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                performSearch();
                dropdownList.classList.remove('show');
            }
            if (e.key === 'Escape') {
                clearSearch();
                dropdownList.classList.remove('show');
            }
        });

        clearSearch();
        console.log(`🌳 عالمی تلاش (موبائل) تیار · ${totalMembers} اراکین`);
    })();
</script>

</body>
</html>
