<head>

<meta name="google" content="notranslate">

    <meta charset="UTF-8">

    <title>خاندان رضوی · ڈیش بورڈ (پی سی)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --bronze: #bc8c4f;
            --dashboard-green: #1b5e20;
            --admin-purple: #6b21a8;
        }

        body {
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            direction: rtl;
        }

        .header-title {
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .status-badge {
            background: var(--gold);
            color: var(--dark-blue);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fffcf8;
            direction: rtl;
        }

        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
        }

        .top-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .bottom-row {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 10px;
        }

        .dashboard-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .dashboard-card:hover {
            transform: translateY(-3px);
            border-color: var(--bronze);
        }

        .dashboard-card.admin-card {
            border-color: var(--admin-purple);
            background: linear-gradient(145deg, #fff, #f8f4ff);
        }

        .dashboard-card.admin-card:hover {
            border-color: #8b5cf6;
            box-shadow: 0 5px 15px rgba(107, 33, 168, 0.2);
        }

        .card-icon {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 8px;
            font-family: 'Noto Nastaliq Urdu', sans-serif;
        }

        .card-desc {
            color: #666;
            font-size: 13px;
            font-family: 'Noto Nastaliq Urdu', sans-serif;
        }

        .admin-badge {
            background: var(--admin-purple);
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            margin-top: 10px;
            display: inline-block;
            font-family: 'Noto Nastaliq Urdu', sans-serif;
        }

        .exit-btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #5a0000;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid var(--gold);
            min-width: 240px;
            justify-content: center;
            font-size: 15px;
            font-family: 'Noto Nastaliq Urdu', sans-serif;
            transition: all 0.2s;
        }

        .exit-btn-container:hover {
            background: #7a1f1f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(90, 0, 0, 0.3);
        }
        
        .exit-btn-container:active {
            transform: translateY(0);
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 11px;
            border-top: 2px solid var(--gold);
            font-family: 'Noto Nastaliq Urdu', sans-serif;
            direction: rtl;
        }

        /* Admin Page Styles */
        .admin-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .admin-title {
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif;
            font-size: 24px;
            color: var(--admin-purple);
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .admin-card-large {

            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;

            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            transform: translateY(-5px);

            box-shadow: 0 10px 25px rgba(107, 33, 168, 0.15);
        }

        .admin-card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .admin-card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 10px;
            font-family: 'Noto Nastaliq Urdu', sans-serif;
        }

        .admin-card-desc {
            color: #666;
            font-size: 14px;
            font-family: 'Noto Nastaliq Urdu', sans-serif;
        }

        .data-status {
            font-family: 'Noto Nastaliq Urdu', sans-serif;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--dark-blue);

</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="app-header" id="appHeader">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span id="headerTitle">خاندان رضوی ڈیش بورڈ (پی سی)</span>
            </div>
            <div class="header-actions" id="headerActions">
                <span class="status-badge" id="headerStatus">📊 کل اراکین: 0</span>
            </div>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="main-content" id="mainContent">
            <!-- Dynamic content will be inserted here -->
        </div>

        <div class="app-footer" id="appFooter">
            ڈیولپر: عمران حیدر ولد سید رسالت حسین رضوی | 6010-787-0332
        </div>
    </div>

<script>
// Check URL parameters on page load
function checkURLParams() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('view') && urlParams.get('view') === 'admin') {
        // Automatically prompt for admin password
        setTimeout(() => {
            const pwd = prompt('ایڈمن پاس ورڈ درج کریں:');
            if (pwd === '6010') {
                currentView = 'admin';
                isAdminAuthenticated = true;
                renderAdminView();
            } else if (pwd !== null) {
                alert('❌ غلط ایڈمن پاس ورڈ');
                renderDashboardView();
            } else {
                renderDashboardView();
            }
        }, 100); // Small delay to ensure page is loaded
    }
}

let db = [];
let currentView = 'dashboard'; // 'dashboard' or 'admin'
let isAdminAuthenticated = false; // Track if admin is already logged in

// UPDATED logout function - now redirects to main index.html
// UPDATED logout function - now correctly redirects to the main index.html in the root
function logout() {
    // Ask for confirmation before exiting
    if (confirm('کیا آپ باہر جا کر لاگ ان صفحے پر واپس جانا چاہتے ہیں؟')) {
        // Clear all data when going back to password screen
        localStorage.removeItem('familyDB');
        localStorage.removeItem('fileInfo');
        localStorage.removeItem('tableViewMember');
        localStorage.removeItem('tableViewFilters');
        db = [];
        isAdminAuthenticated = false;

        // CORRECT PATH: Go up one level from the UFT folder to find index.html in the root
        console.log('Redirecting to main login page: ../index.html');
        window.location.href = '../index.html';
    }
}

function hardReset() {
    const confirmation = confirm("🚨 انتباہ: یہ عمل براؤزر سے تمام خاندانی ڈیٹا کو مستقل طور پر حذف کر دے گا۔ کیا آپ کو یقین ہے؟");
    
    if (confirmation) {
        localStorage.removeItem('familyDB');
        localStorage.removeItem('fileInfo');
        localStorage.removeItem('tableViewMember');
        localStorage.removeItem('tableViewFilters');
        db = [];
        initializeData();
        updateHeaderStatus();
        
        if (currentView === 'admin') {
            renderAdminView();
        } else {
            renderDashboardView();
        }
        
        alert("✅ تمام ڈیٹا براؤزر اسٹوریج سے صاف کر دیا گیا ہے۔");
    }
}

// Admin login with password
function goToAdminWithPassword() {
    const pwd = prompt('ایڈمن پاس ورڈ درج کریں:');
    if (pwd === '6010') {
        currentView = 'admin';
        isAdminAuthenticated = true;
        renderAdminView();
    } else if (pwd !== null) {
        alert('❌ غلط ایڈمن پاس ورڈ');
    }
}

// No password required for data load (protected by admin gateway)
function loadData() {
    document.getElementById('fileInput').click();
}

// UPDATED: File input handler to include all fields (mother, spouse, maritalStatus, alive)
document.getElementById('fileInput').onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            // UPDATED: Map all fields including mother, spouse, maritalStatus, alive
            db = rows.map(r => ({
                name: String(r.Name || r.name || '').trim(),
                father: String(r.Father || r.father || '').trim(),
                mother: String(r.Mother || r.mother || '').trim(),           // ADDED
                spouse: String(r.Spouse || r.spouse || '').trim(),           // ADDED
                gen: String(r.Gen || r.gen || '').trim(),
                gender: String(r.Gender || r.gender || 'Male').trim().toUpperCase(),
                maritalStatus: String(r.MaritalStatus || r.maritalStatus || r.Maritalstatus || r.maritalstatus || '').trim(), // ADDED
                alive: String(r.Alive || r.alive || '').trim()               // ADDED
            })).filter(p => p.name);

            // ADDED: Extract timestamp from J1/J2 if present
            try {
                const firstSheet = wb.Sheets[wb.SheetNames[0]];
                const j1Cell = firstSheet['J1'];
                const j2Cell = firstSheet['J2'];
                
                const fileInfo = {
                    saved_time_header: j1Cell ? String(j1Cell.v || j1Cell.w || '') : 'تاریخ اور وقت فائل محفوظ ہوئی',
                    saved_time: j2Cell ? (typeof j2Cell.v === 'number' ? 
                        new Date((j2Cell.v - 25569) * 86400 * 1000).toLocaleString('ur-PK') : 
                        String(j2Cell.v).trim()) : new Date().toLocaleString('ur-PK'),
                    exported_time: new Date().toLocaleString('ur-PK'),
                    total_members: db.length,
                    source_file: file.name
                };
                
                localStorage.setItem('fileInfo', JSON.stringify(fileInfo));
                console.log('✅ ٹائم سٹیمپ نکال لیا گیا:', fileInfo.saved_time);
            } catch (tsErr) {
                console.warn('ٹائم سٹیمپ نہیں نکالا جا سکا:', tsErr);
            }

            // Save to localStorage for other pages
            localStorage.setItem('familyDB', JSON.stringify(db));
            
            updateHeaderStatus();
            
            if (currentView === 'admin') {
                renderAdminView();
            } else {
                renderDashboardView();
            }
            
            // Optional success message
            console.log(`✅ ${db.length} اراکین کا ڈیٹا کامیابی سے لوڈ ہو گیا۔`);
            
        } catch (err) {
            alert('❌ خرابی: ' + err.message);
        }
    };
    reader.readAsArrayBuffer(file);
};

function updateHeaderStatus() {
    const count = db.length || (localStorage.getItem('familyDB') ? JSON.parse(localStorage.getItem('familyDB')).length : 0);
    document.getElementById('headerStatus').innerHTML = `📊 کل اراکین: ${count}`;
}

function goToIndividual() {
    // Check if data exists in memory OR in localStorage
    if (db.length === 0) {
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
        } else {
            alert('براہ کرم پہلے ڈیٹا لوڈ کریں (ایڈمن پینل استعمال کریں)');
            return;
        }
    }
    window.location.href = '22-individual-tree-pc.html';
}

function goToRoot() {
    // Check if data exists in memory OR in localStorage
    if (db.length === 0) {
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
        } else {
            alert('براہ کرم پہلے ڈیٹا لوڈ کریں (ایڈمن پینل استعمال کریں)');
            return;
        }
    }
    window.location.href = '24-root-tree-pc.html';
}

function goToDashboard() {
    currentView = 'dashboard';
    renderDashboardView();
}

function renderDashboardView() {
    document.getElementById('headerTitle').innerText = 'خاندان رضوی ڈیش بورڈ (پی سی)';
    document.getElementById('headerActions').innerHTML = `
        <span class="status-badge" id="headerStatus">📊 کل اراکین: ${db.length || (localStorage.getItem('familyDB') ? JSON.parse(localStorage.getItem('familyDB')).length : 0)}</span>
    `;
    
    const mainContent = document.getElementById('mainContent');
    mainContent.innerHTML = `
        <div class="dashboard-grid">
            <div class="top-row">
                <div class="dashboard-card" onclick="goToIndividual()">
                    <div class="card-icon">👤</div>
                    <div class="card-title">انفرادی تلاش</div>
                    <div class="card-desc">ایک فرد کی معلومات تلاش کریں</div>
                </div>
                <div class="dashboard-card" onclick="goToRoot()">
                    <div class="card-icon">👥</div>
                    <div class="card-title">جڑ رشتہ دار</div>
                    <div class="card-desc">دو افراد کے درمیان تعلق</div>
                </div>
                <div class="dashboard-card admin-card" onclick="goToAdminWithPassword()">
                    <div class="card-icon">⚙️</div>
                    <div class="card-title">صرف ایڈمن کے لیے</div>
                    <div class="card-desc">ڈیٹا کا انتظام</div>
                    <span class="admin-badge">محدود - پاس ورڈ محفوظ</span>
                </div>
            </div>
           
            <div class="bottom-row">
                <div class="exit-btn-container" onclick="logout()">
                    <span class="exit-btn-icon">🚪</span>
                    <span class="exit-btn-text">لاگ ان صفحہ</span>
                    <span class="exit-btn-subtext">- (باہر جائیں)</span>
                </div>
                
                <div class="exit-btn-container" onclick="hardReset()" style="background: #4169E1;">
                    <span class="exit-btn-icon">⚠️</span>
                    <span class="exit-btn-text">مکمل ری سیٹ</span>
                    <span class="exit-btn-subtext">- (تمام ڈیٹا حذف)</span>
                </div>
            </div>
        </div>
    `;
}

function renderAdminView() {
    document.getElementById('headerTitle').innerText = 'ایڈمن کنٹرول پینل';
    document.getElementById('headerActions').innerHTML = `
        <span class="status-badge" id="headerStatus">📊 کل اراکین: ${db.length || (localStorage.getItem('familyDB') ? JSON.parse(localStorage.getItem('familyDB')).length : 0)}</span>
    `;
    
    const dbCount = db.length || (localStorage.getItem('familyDB') ? JSON.parse(localStorage.getItem('familyDB')).length : 0);
    
    const mainContent = document.getElementById('mainContent');
    mainContent.innerHTML = `
        <div class="admin-container">
            <div class="admin-title">⚙️ صرف ایڈمن کے لیے</div>
            
            <div class="admin-grid">
                <div class="admin-card-large" onclick="loadData()">
                    <div class="admin-card-icon">📂</div>
                    <div class="admin-card-title">ڈیٹا لوڈ کریں</div>
                    <div class="admin-card-desc">ایکسل فائل اپ لوڈ کریں</div>
                    <div class="data-status" style="margin-top: 15px; color: #2e7d32;">
                        ${dbCount > 0 ? `✅ ${dbCount} اراکین لوڈ` : '⏳ کوئی ڈیٹا نہیں'}
                    </div>
                </div>
                
                <div class="admin-card-large" onclick="window.location.href='31-add-data.html'">
                    <div class="admin-card-icon">✏️</div>
                    <div class="admin-card-title">رکن شامل/ترمیم</div>
                    <div class="admin-card-desc">نئے اراکین شامل کریں</div>
                    <div class="data-status" style="margin-top: 15px;">→ ایڈٹ صفحہ</div>
                </div>

                <div class="admin-card-large" onclick="window.location.href='32-converter.html'">
                    <div class="admin-card-icon">🔄</div>
                    <div class="admin-card-title">ڈیٹا کنورٹر</div>
                    <div class="admin-card-desc">ایکسل سے جے ایس کنورٹر</div>
                    <div class="data-status" style="margin-top: 15px;">→ کنورٹر</div>
                </div>
            </div>
            
            <div style="display: flex; gap: 25px; justify-content: center; margin-top: 30px;">
                <div class="exit-btn-container" onclick="goToDashboard()" style="background: var(--dark-blue); min-width: 200px; white-space: nowrap;">
                    <span class="exit-btn-icon">⬅️</span>
                    <span class="exit-btn-text">واپس - (ڈیش بورڈ)</span>
                </div>
                
                <div class="exit-btn-container" onclick="logout()" style="background: #5a0000; min-width: 200px; white-space: nowrap;">
                    <span class="exit-btn-icon">🚪</span>
                    <span class="exit-btn-text">لاگ ان صفحہ</span>
                </div>
            </div>
        </div>
    `;
}

function initializeData() {
    localStorage.removeItem('familyDB');
    localStorage.removeItem('fileInfo');
    localStorage.removeItem('tableViewMember');
    localStorage.removeItem('tableViewFilters');
    db = [];
    
    if (typeof FAMILY_DATA_URDU !== 'undefined' && FAMILY_DATA_URDU.length > 0) {
        db = FAMILY_DATA_URDU;
        localStorage.setItem('familyDB', JSON.stringify(db));
        if (typeof FILE_INFO !== 'undefined') {
            localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
        }
        console.log(`✅ Auto-loaded ${db.length} members from 33-family-data-urdu.js`);
    }
    updateHeaderStatus();
}
    

// Check for hash on page load (FOR BACK TO ADMIN BUTTON)
function checkHash() {
    const urlParams = new URLSearchParams(window.location.search);
    const isPreAuth = urlParams.get('auth') === 'true';

    if (window.location.hash === '#admin') {
        setTimeout(() => {
            // If we have the auth flag OR are already authenticated in this session
            if (isPreAuth || isAdminAuthenticated) {
                currentView = 'admin';
                isAdminAuthenticated = true;
                renderAdminView();
                
                // Clean the URL so the 'auth' flag doesn't stay there forever
                window.history.replaceState({}, document.title, "21-dashboard-pc.html#admin");
            } else {
                // Otherwise, ask for the password as usual
                const pwd = prompt('ایڈمن پاس ورڈ درج کریں:');
                if (pwd === '6010') {
                    currentView = 'admin';
                    isAdminAuthenticated = true;
                    renderAdminView();
                } else {
                    renderDashboardView();
                }
            }
        }, 100);
    }
}

// Initialize everything
initializeData();
renderDashboardView();
checkURLParams();
checkHash();

// Expose for debugging
window.debug = function() {
    console.log('Current db:', db);
    console.log('FAMILY_DATA_URDU exists:', typeof FAMILY_DATA_URDU !== 'undefined');
    if (typeof FAMILY_DATA_URDU !== 'undefined') {
        console.log('FAMILY_DATA_URDU length:', FAMILY_DATA_URDU.length);
    }
};
</script>
