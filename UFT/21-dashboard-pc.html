<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>خاندان رضوی · ڈیش بورڈ (پی سی) · اردو</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="33-family-data-urdu.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --bronze: #bc8c4f;
            --dashboard-green: #1b5e20;
            --admin-purple: #6b21a8;
        }

        body {
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
        }

        .header-title {
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .status-badge {
            background: var(--gold);
            color: var(--dark-blue);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fffcf8;
        }

        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
        }

        .top-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .bottom-row {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .dashboard-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .dashboard-card:hover {
            transform: translateY(-3px);
            border-color: var(--bronze);
        }

        .dashboard-card.admin-card {
            border-color: var(--admin-purple);
            background: linear-gradient(145deg, #fff, #f8f4ff);
        }

        .dashboard-card.admin-card:hover {
            border-color: #8b5cf6;
            box-shadow: 0 5px 15px rgba(107, 33, 168, 0.2);
        }

        .card-icon {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 8px;
        }

        .card-desc {
            color: #666;
            font-size: 13px;
        }

        .admin-badge {
            background: var(--admin-purple);
            color: white;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            margin-top: 10px;
            display: inline-block;
        }

        .exit-btn-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #5a0000;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid var(--gold);
            min-width: 240px;
            justify-content: center;
            font-size: 15px;
            transition: all 0.2s;
        }

        .exit-btn-container:hover {
            background: #7a1f1f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(90, 0, 0, 0.3);
        }
        
        .exit-btn-container:active {
            transform: translateY(0);
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 11px;
            border-top: 2px solid var(--gold);
        }

        /* ایڈمن پیج */
        .admin-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .admin-title {
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif;
            font-size: 24px;
            color: var(--admin-purple);
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .admin-card-large {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .admin-card-large:hover {
            transform: translateY(-5px);
            border-color: var(--admin-purple);
            box-shadow: 0 10px 25px rgba(107, 33, 168, 0.15);
        }

        .admin-card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .admin-card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 10px;
        }

        .admin-card-desc {
            color: #666;
            font-size: 14px;
        }

        .data-status {
            margin-top: 15px;
            color: #2e7d32;
            font-size: 13px;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--dark-blue);
            color: var(--gold);
            text-decoration: none;
            border-radius: 40px;
            border: 2px solid var(--gold);
            font-weight: 600;
            cursor: pointer;
        }

        .home-link:hover {
            background: var(--gold);
            color: var(--dark-blue);
        }

        /* === شجرہ آپشن موڈل === */
        .tree-option-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .tree-option-overlay.show {
            display: flex;
        }

        .tree-option-modal {
            background: white;
            border-radius: 20px;
            border: 3px solid var(--gold);
            max-width: 400px;
            width: 100%;
            padding: 28px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .tree-option-modal h2 {
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif;
            font-size: 22px;
            color: var(--maroon);
            text-align: center;
            margin-bottom: 6px;
        }

        .tree-option-modal .subtitle {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .tree-option-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border: 2px solid var(--gold);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
            background: white;
        }

        .tree-option-btn:active {
            transform: scale(0.97);
        }

        .tree-option-btn .icon {
            font-size: 32px;
            flex-shrink: 0;
        }

        .tree-option-btn .info {
            flex: 1;
        }

        .tree-option-btn .info .title {
            font-weight: 700;
            color: var(--dark-blue);
            font-size: 15px;
        }

        .tree-option-btn .info .desc {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .tree-option-btn .arrow {
            color: var(--gold);
            font-size: 20px;
            flex-shrink: 0;
        }

        .tree-option-btn:hover {
            background: #faebcd;
        }

        .tree-option-close {
            display: block;
            width: 100%;
            padding: 12px;
            text-align: center;
            color: #999;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 14px;
            margin-top: 4px;
        }

        .tree-option-close:hover {
            color: #555;
        }

        @media (max-width: 700px) {
            .top-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .admin-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 500px) {
            .top-row {
                grid-template-columns: 1fr;
            }
            .admin-grid {
                grid-template-columns: 1fr;
            }
            .exit-btn-container {
                min-width: 160px;
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="app-header" id="appHeader">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span id="headerTitle">خاندان رضوی · ڈیش بورڈ (پی سی)</span>
            </div>
            <div class="header-actions" id="headerActions">
                <span class="status-badge" id="headerStatus">📊 کل اراکین: 0</span>
            </div>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="main-content" id="mainContent">
            <!-- ڈائنامک مواد -->
        </div>

        <div class="app-footer" id="appFooter">
            ڈویلپر: عمران حیدر ولد سید رسالت حسین رضوی | 6010-787-0332
        </div>
    </div>

    <!-- ===== شجرہ آپشن موڈل ===== -->
    <div class="tree-option-overlay" id="treeOptionOverlay">
        <div class="tree-option-modal">
            <h2>🌳 مکمل شجرہ</h2>
            <p class="subtitle">منتخب کریں کہ آپ شجرہ کیسے دیکھنا چاہتے ہیں</p>

            <div class="tree-option-btn" id="optionTextView">
                <span class="icon">📄</span>
                <div class="info">
                    <div class="title">تحریری شجرہ</div>
                    <div class="desc">صاف تحریری شکل، ورق بندی کے ساتھ</div>
                </div>
                <span class="arrow">←</span>
            </div>

            <div class="tree-option-btn" id="optionVisualTree">
                <span class="icon">🎨</span>
                <div class="info">
                    <div class="title">بصری شجرہ</div>
                    <div class="desc">تعامل پذیر گرافک شجرہ، پھیلانے والی شاخوں کے ساتھ</div>
                </div>
                <span class="arrow">←</span>
            </div>

            <button class="tree-option-close" id="treeOptionClose">منسوخ کریں</button>
        </div>
    </div>

    <script>
        // =============================================
        // مکمل اردو ڈیش بورڈ - 100% اردو
        // =============================================

        let db = [];
        let currentView = 'dashboard';
        let isAdminAuthenticated = false;

        // ---- ابتدائی ڈیٹا ----
        function initializeData() {
            // پہلے سے ذخیرہ شدہ ڈیٹا صاف
            localStorage.removeItem('familyDB');
            localStorage.removeItem('fileInfo');
            localStorage.removeItem('tableViewMember');
            localStorage.removeItem('tableViewFilters');
            db = [];

            if (typeof FAMILY_DATA_URDU !== 'undefined' && FAMILY_DATA_URDU.length > 0) {
                db = FAMILY_DATA_URDU;
                localStorage.setItem('familyDB', JSON.stringify(db));
                if (typeof FILE_INFO !== 'undefined') {
                    localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
                }
                console.log('✅ خودکار لوڈ: ' + db.length + ' اراکین از 33-family-data-urdu.js');
            } else {
                console.warn('⚠️ FAMILY_DATA_URDU دستیاب نہیں، براہ کرم 33-family-data-urdu.js شامل کریں۔');
            }
            updateHeaderStatus();
        }

        function updateHeaderStatus() {
            let count = db.length;
            if (count === 0) {
                const saved = localStorage.getItem('familyDB');
                if (saved) {
                    try { count = JSON.parse(saved).length; } catch(e) {}
                }
            }
            document.getElementById('headerStatus').innerHTML = `📊 کل اراکین: ${count}`;
        }

        // ---- راہ نما ----
        function goToIndividual() {
            if (db.length === 0) {
                const saved = localStorage.getItem('familyDB');
                if (saved) db = JSON.parse(saved);
                else { alert('براہ کرم پہلے ڈیٹا لوڈ کریں (ایڈمن پینل)'); return; }
            }
            window.location.href = '22-individual-tree-pc.html';
        }

        function goToRoot() {
            if (db.length === 0) {
                const saved = localStorage.getItem('familyDB');
                if (saved) db = JSON.parse(saved);
                else { alert('براہ کرم پہلے ڈیٹا لوڈ کریں (ایڈمن پینل)'); return; }
            }
            window.location.href = '24-root-tree-pc.html';
        }

        function goToDashboard() {
            currentView = 'dashboard';
            renderDashboardView();
        }

        // ---- ایڈمن ----
        function goToAdminWithPassword() {
            const pwd = prompt('ایڈمن پاس ورڈ درج کریں:');
            if (pwd === '6010') {
                currentView = 'admin';
                isAdminAuthenticated = true;
                renderAdminView();
            } else if (pwd !== null) {
                alert('❌ غلط پاس ورڈ');
            }
        }

        function loadData() {
            document.getElementById('fileInput').click();
        }

        // فائل اپ لوڈ
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    db = rows.map(r => ({
                        name: String(r.Name || r.name || '').trim(),
                        father: String(r.Father || r.father || '').trim(),
                        mother: String(r.Mother || r.mother || '').trim(),
                        spouse: String(r.Spouse || r.spouse || '').trim(),
                        gen: String(r.Gen || r.gen || '').trim(),
                        gender: String(r.Gender || r.gender || 'Male').trim().toUpperCase(),
                        maritalStatus: String(r.MaritalStatus || r.maritalStatus || r.Maritalstatus || r.maritalstatus || '').trim(),
                        alive: String(r.Alive || r.alive || '').trim()
                    })).filter(p => p.name);

                    try {
                        const firstSheet = wb.Sheets[wb.SheetNames[0]];
                        const j1 = firstSheet['J1'];
                        const j2 = firstSheet['J2'];
                        const fileInfo = {
                            saved_time_header: j1 ? String(j1.v || j1.w || '') : 'تاریخ اور وقت',
                            saved_time: j2 ? (typeof j2.v === 'number' ? new Date((j2.v - 25569)*86400*1000).toLocaleString('ur-PK') : String(j2.v).trim()) : new Date().toLocaleString('ur-PK'),
                            exported_time: new Date().toLocaleString('ur-PK'),
                            total_members: db.length,
                            source_file: file.name
                        };
                        localStorage.setItem('fileInfo', JSON.stringify(fileInfo));
                    } catch(tsErr) {}

                    localStorage.setItem('familyDB', JSON.stringify(db));
                    updateHeaderStatus();
                    if (currentView === 'admin') renderAdminView();
                    else renderDashboardView();
                    console.log('✅ ' + db.length + ' اراکین لوڈ ہوئے۔');
                } catch(err) {
                    alert('❌ خرابی: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        // ---- باہر جائیں (لاگ ان صفحہ) ----
        function logout() {
            if (confirm('کیا آپ لاگ ان صفحہ پر واپس جانا چاہتے ہیں؟')) {
                localStorage.removeItem('familyDB');
                localStorage.removeItem('fileInfo');
                localStorage.removeItem('tableViewMember');
                localStorage.removeItem('tableViewFilters');
                db = [];
                isAdminAuthenticated = false;
                window.location.href = '../index.html';
            }
        }

        function hardReset() {
            if (confirm('🚨 انتباہ: تمام ڈیٹا مستقل حذف ہو جائے گا۔ کیا آپ کو یقین ہے؟')) {
                localStorage.removeItem('familyDB');
                localStorage.removeItem('fileInfo');
                localStorage.removeItem('tableViewMember');
                localStorage.removeItem('tableViewFilters');
                db = [];
                updateHeaderStatus();
                if (currentView === 'admin') renderAdminView();
                else renderDashboardView();
                alert('✅ تمام ڈیٹا صاف کر دیا گیا۔');
            }
        }

        // ---- شجرہ آپشنز ----
        function openTreeOptions() {
            document.getElementById('treeOptionOverlay').classList.add('show');
        }
        function closeTreeOptions() {
            document.getElementById('treeOptionOverlay').classList.remove('show');
        }
        function goToVisualTree() {
            closeTreeOptions();
            if (db.length === 0) {
                const saved = localStorage.getItem('familyDB');
                if (saved) db = JSON.parse(saved);
                else { alert('کوئی ڈیٹا نہیں، براہ کرم پہلے لوڈ کریں۔'); return; }
            }
            window.location.href = 'FT-pc-2.html';
        }
        function goToTextView() {
            closeTreeOptions();
            if (db.length === 0) {
                const saved = localStorage.getItem('familyDB');
                if (saved) db = JSON.parse(saved);
                else { alert('کوئی ڈیٹا نہیں، براہ کرم پہلے لوڈ کریں۔'); return; }
            }
            window.location.href = 'FT-pc-1.html';
        }

        // ---- موڈل ایونٹس ----
        function setupModalEvents() {
            const overlay = document.getElementById('treeOptionOverlay');
            const closeBtn = document.getElementById('treeOptionClose');
            const visualBtn = document.getElementById('optionVisualTree');
            const textBtn = document.getElementById('optionTextView');

            if (closeBtn) closeBtn.addEventListener('click', closeTreeOptions);
            if (visualBtn) visualBtn.addEventListener('click', goToVisualTree);
            if (textBtn) textBtn.addEventListener('click', goToTextView);
            if (overlay) overlay.addEventListener('click', function(e) { if (e.target === overlay) closeTreeOptions(); });
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeTreeOptions(); });
        }

        // ---- مناظر ----
        function renderDashboardView() {
            // خودکار ری سیٹ اور لوڈ
            localStorage.removeItem('familyDB');
            localStorage.removeItem('fileInfo');
            localStorage.removeItem('tableViewMember');
            localStorage.removeItem('tableViewFilters');
            db = [];
            if (typeof FAMILY_DATA_URDU !== 'undefined' && FAMILY_DATA_URDU.length > 0) {
                db = FAMILY_DATA_URDU;
                localStorage.setItem('familyDB', JSON.stringify(db));
                if (typeof FILE_INFO !== 'undefined') localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
            }
            updateHeaderStatus();

            document.getElementById('headerTitle').innerText = 'خاندان رضوی · ڈیش بورڈ (پی سی)';
            document.getElementById('headerActions').innerHTML = `
                <span class="status-badge" id="headerStatus">📊 کل اراکین: ${db.length}</span>
            `;

            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="dashboard-grid">
                    <div class="top-row">
                        <!-- مکمل شجرہ -->
                        <div class="dashboard-card" onclick="openTreeOptions()">
                            <div class="card-icon">🌳</div>
                            <div class="card-title">مکمل شجرہ</div>
                            <div class="card-desc">پورا خاندانی شجرہ</div>
                        </div>
                        <!-- انفرادی -->
                        <div class="dashboard-card" onclick="goToIndividual()">
                            <div class="card-icon">👤</div>
                            <div class="card-title">انفرادی تلاش</div>
                            <div class="card-desc">ایک فرد کی معلومات</div>
                        </div>
                        <!-- جڑ رشتہ دار -->
                        <div class="dashboard-card" onclick="goToRoot()">
                            <div class="card-icon">👥</div>
                            <div class="card-title">جڑ رشتہ دار</div>
                            <div class="card-desc">دو افراد کا تعلق</div>
                        </div>
                        <!-- ایڈمن -->
                        <div class="dashboard-card admin-card" onclick="goToAdminWithPassword()">
                            <div class="card-icon">⚙️</div>
                            <div class="card-title">صرف ایڈمن</div>
                            <div class="card-desc">ڈیٹا کا نظم</div>
                            <span class="admin-badge">محدود · پاس ورڈ محفوظ</span>
                        </div>
                    </div>
                    <div class="bottom-row">
                        <div class="exit-btn-container" onclick="logout()">
                            <span>🚪</span>
                            <span>لاگ ان صفحہ</span>
                            <span>– (باہر جائیں)</span>
                        </div>
                        <div class="exit-btn-container" onclick="hardReset()" style="background: #4169E1;">
                            <span>⚠️</span>
                            <span>مکمل ری سیٹ</span>
                            <span>– (تمام ڈیٹا حذف)</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdminView() {
            document.getElementById('headerTitle').innerText = 'ایڈمن کنٹرول پینل';
            const count = db.length || (localStorage.getItem('familyDB') ? JSON.parse(localStorage.getItem('familyDB')).length : 0);
            document.getElementById('headerActions').innerHTML = `
                <span class="status-badge" id="headerStatus">📊 کل اراکین: ${count}</span>
            `;

            const main = document.getElementById('mainContent');
            main.innerHTML = `
                <div class="admin-container">
                    <div class="admin-title">⚙️ صرف ایڈمن کے لیے</div>
                    <div class="admin-grid">
                        <div class="admin-card-large" onclick="loadData()">
                            <div class="admin-card-icon">📂</div>
                            <div class="admin-card-title">ڈیٹا لوڈ کریں</div>
                            <div class="admin-card-desc">ایکسل فائل اپ لوڈ</div>
                            <div class="data-status">${count > 0 ? '✅ ' + count + ' اراکین' : '⏳ کوئی ڈیٹا نہیں'}</div>
                        </div>
                        <div class="admin-card-large" onclick="window.location.href='31-add-data.html'">
                            <div class="admin-card-icon">✏️</div>
                            <div class="admin-card-title">رکن شامل / ترمیم</div>
                            <div class="admin-card-desc">نیا رکن شامل کریں</div>
                            <div class="data-status">→ ایڈٹ صفحہ</div>
                        </div>
                        <div class="admin-card-large" onclick="window.location.href='32-converter.html'">
                            <div class="admin-card-icon">🔄</div>
                            <div class="admin-card-title">ڈیٹا کنورٹر</div>
                            <div class="admin-card-desc">ایکسل سے جے ایس</div>
                            <div class="data-status">→ کنورٹر</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 25px; justify-content: center; margin-top: 30px; flex-wrap: wrap;">
                        <div class="exit-btn-container" onclick="goToDashboard()" style="background: var(--dark-blue); min-width: 180px;">
                            <span>⬅️</span>
                            <span>واپس ڈیش بورڈ</span>
                        </div>
                        <div class="exit-btn-container" onclick="logout()" style="background: #5a0000; min-width: 180px;">
                            <span>🚪</span>
                            <span>لاگ ان صفحہ</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // ---- ہیش چیک (ایڈمن براہ راست) ----
        function checkHash() {
            if (window.location.hash === '#admin') {
                setTimeout(() => {
                    if (isAdminAuthenticated) {
                        currentView = 'admin';
                        renderAdminView();
                        window.history.replaceState({}, document.title, "1-dashboard-pc.html#admin");
                    } else {
                        const pwd = prompt('ایڈمن پاس ورڈ درج کریں:');
                        if (pwd === '6010') {
                            currentView = 'admin';
                            isAdminAuthenticated = true;
                            renderAdminView();
                        } else {
                            renderDashboardView();
                        }
                    }
                }, 100);
            }
        }

        // ---- آغاز ----
        initializeData();
        renderDashboardView();
        checkHash();
        setupModalEvents();

        // ڈیبگ کے لیے
        window.debug = function() {
            console.log('db length:', db.length);
            console.log('FAMILY_DATA_URDU موجود ہے:', typeof FAMILY_DATA_URDU !== 'undefined');
        };
    </script>

</body>
</html>
