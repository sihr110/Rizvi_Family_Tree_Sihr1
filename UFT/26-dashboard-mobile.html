<!-- Urdu Version - Rizvi Family Dashboard     -->
<!-- Mobile Only - Full Feature Version        -->
<!-- ======================================== -->

<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta name="google" content="notranslate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes, viewport-fit=cover">
    <title>خاندان رضوی · موبائل ڈیش بورڈ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="33-family-data-urdu.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --bronze: #bc8c4f;
        }

        body {
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 8px;
            direction: rtl;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 24px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.25);
            display: flex;
            flex-direction: column;
            margin: 0 auto;
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .header-title {
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif;
            font-size: 16px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
        }

        .status-badge {
            background: var(--gold);
            color: var(--dark-blue);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .main-content {
            background: #fffcf8;
            padding: 16px 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .mobile-dashboard {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        .dashboard-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        .dashboard-card:active {
            transform: scale(0.98);
            border-color: var(--bronze);
        }

        .card-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 4px;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .card-desc {
            color: #666;
            font-size: 12px;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .action-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .exit-btn-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #5a0000;
            color: white;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid var(--gold);
            width: 100%;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.15s;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .exit-btn-container:active {
            background: #7a1f1f;
            transform: scale(0.98);
        }

        .exit-btn-container.hardreset {
            background: #1e4b8b;
        }

        .exit-btn-container.hardreset:active {
            background: #2569b3;
        }

        .exit-btn-icon {
            font-size: 18px;
        }

        .exit-btn-subtext {
            font-size: 11px;
            opacity: 0.9;
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 10px;
            border-top: 2px solid var(--gold);
            line-height: 1.2;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        #fileInput {
            display: none;
        }

        /* === TREE OPTION MODAL === */
        .tree-option-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .tree-option-overlay.show {
            display: flex;
        }

        .tree-option-modal {
            background: white;
            border-radius: 20px;
            border: 3px solid var(--gold);
            max-width: 400px;
            width: 100%;
            padding: 28px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .tree-option-modal h2 {
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif;
            font-size: 22px;
            color: var(--maroon);
            text-align: center;
            margin-bottom: 6px;
        }

        .tree-option-modal .subtitle {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 20px;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .tree-option-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border: 2px solid var(--gold);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
            background: white;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .tree-option-btn:active {
            transform: scale(0.97);
        }

        .tree-option-btn .icon {
            font-size: 32px;
            flex-shrink: 0;
        }

        .tree-option-btn .info {
            flex: 1;
        }

        .tree-option-btn .info .title {
            font-weight: 700;
            color: var(--dark-blue);
            font-size: 15px;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .tree-option-btn .info .desc {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .tree-option-btn .arrow {
            color: var(--gold);
            font-size: 20px;
            flex-shrink: 0;
        }

        .tree-option-btn:hover {
            background: #faebcd;
        }

        .tree-option-close {
            display: block;
            width: 100%;
            padding: 12px;
            text-align: center;
            color: #999;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 14px;
            margin-top: 4px;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .tree-option-close:hover {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span id="headerTitle">خاندان رضوی (موبائل)</span>
            </div>
            <div class="header-actions">
                <span class="status-badge" id="headerStatus">📊 اراکین: 0</span>
            </div>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="main-content" id="mainContent"></div>

        <div class="app-footer">
            ڈویلپر: عمران حیدر ولد سید رسالت حسین رضوی | 6010-787-0332
        </div>
    </div>

    <!-- TREE OPTION MODAL -->
    <div class="tree-option-overlay" id="treeOptionOverlay">
        <div class="tree-option-modal">
            <h2>🌳 مکمل شجرہ</h2>
            <p class="subtitle">شجرہ دیکھنے کا طریقہ منتخب کریں</p>

            <div class="tree-option-btn" id="optionTextView">
                <span class="icon">📄</span>
                <div class="info">
                    <div class="title">متنی شجرہ</div>
                    <div class="desc">صاف اور منظم متن پر مبنی شجرہ</div>
                </div>
                <span class="arrow">←</span>
            </div>

            <div class="tree-option-btn" id="optionVisualTree">
                <span class="icon">🎨</span>
                <div class="info">
                    <div class="title">بصری شجرہ</div>
                    <div class="desc">انٹرایکٹو گرافیکل شجرہ جسے پھیلایا جا سکتا ہے</div>
                </div>
                <span class="arrow">←</span>
            </div>

            <button class="tree-option-close" id="treeOptionClose">منسوخ</button>
        </div>
    </div>

    <script>
        (function() {
            let db = [];

            function loadFromStorageOrFallback() {
                if (typeof FAMILY_DATA_URDU !== 'undefined' && FAMILY_DATA_URDU.length > 0) {
                    db = FAMILY_DATA_URDU;
                    localStorage.setItem('familyDB', JSON.stringify(db));
                    if (typeof FILE_INFO !== 'undefined') {
                        localStorage.setItem('fileInfo', JSON.stringify(FILE_INFO));
                    }
                    console.log(`✅ خودکار طور پر ${db.length} اراکین لوڈ ہوئے`);
                } else {
                    db = [];
                }
                updateHeaderCounter();
            }

            function updateHeaderCounter() {
                const count = db.length;
                const statusEl = document.getElementById('headerStatus');
                if (statusEl) {
                    statusEl.innerHTML = `📊 اراکین: ${count}`;
                }
            }

            function hardResetMobile() {
                const confirmation = confirm("🚨 انتباہ: تمام ڈیٹا مستقل طور پر حذف ہو جائے گا۔ کیا آپ کو یقین ہے؟");
                if (confirmation) {
                    localStorage.removeItem('familyDB');
                    localStorage.removeItem('fileInfo');
                    localStorage.removeItem('tableViewMember');
                    localStorage.removeItem('tableViewFilters');
                    db = [];
                    loadFromStorageOrFallback();
                    updateHeaderCounter();
                    alert("✅ تمام ڈیٹا صاف کر دیا گیا اور دوبارہ لوڈ ہو گیا");
                }
            }

            function logoutMobile() {
                if (confirm('کیا آپ باہر جانا چاہتے ہیں اور لاگ ان صفحہ پر واپس آنا چاہتے ہیں؟')) {
                    localStorage.removeItem('familyDB');
                    localStorage.removeItem('fileInfo');
                    localStorage.removeItem('tableViewMember');
                    localStorage.removeItem('tableViewFilters');
                    db = [];
                    window.location.href = '../index.html';
                }
            }

            function goToIndividualMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('کوئی ڈیٹا نہیں ملا۔ براہ کرم ڈیسک ٹاپ پر ایڈمن کے ذریعے ڈیٹا لوڈ کریں۔');
                        return;
                    }
                }
                window.location.href = '27-individual-tree-mobile.html';
            }

            function goToRootMobile() {
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('کوئی ڈیٹا نہیں ملا۔ براہ کرم ڈیسک ٹاپ پر ایڈمن کے ذریعے ڈیٹا لوڈ کریں۔');
                        return;
                    }
                }
                window.location.href = '29-root-tree-mobile.html';
            }

            // === FULL TREE OPTIONS ===
            function openTreeOptions() {
                document.getElementById('treeOptionOverlay').classList.add('show');
            }

            function closeTreeOptions() {
                document.getElementById('treeOptionOverlay').classList.remove('show');
            }

            function goToVisualTree() {
                closeTreeOptions();
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('کوئی ڈیٹا نہیں ملا۔ براہ کرم ڈیسک ٹاپ پر ایڈمن کے ذریعے ڈیٹا لوڈ کریں۔');
                        return;
                    }
                }
                window.location.href = 'FT-mobile-2U.html';
            }

            function goToTextView() {
                closeTreeOptions();
                if (db.length === 0) {
                    const saved = localStorage.getItem('familyDB');
                    if (saved) {
                        db = JSON.parse(saved);
                    } else {
                        alert('کوئی ڈیٹا نہیں ملا۔ براہ کرم ڈیسک ٹاپ پر ایڈمن کے ذریعے ڈیٹا لوڈ کریں۔');
                        return;
                    }
                }
                window.location.href = 'FT-mobile-1U.html';
            }

            function renderMobileDashboard() {
                const mainContent = document.getElementById('mainContent');
                if (!mainContent) return;

                document.getElementById('headerTitle').innerText = 'خاندان رضوی (موبائل)';

                mainContent.innerHTML = `
                <div class="mobile-dashboard">
                    <!-- 1️⃣ مکمل شجرہ - پہلا -->
                    <div class="dashboard-card" id="cardFullTree">
                        <div class="card-icon">🌳</div>
                        <div class="card-title">مکمل شجرہ</div>
                        <div class="card-desc">خاندان کا مکمل شجرہ</div>
                    </div>

                    <!-- 2️⃣ انفرادی - دوسرا -->
                    <div class="dashboard-card" id="cardIndividual">
                        <div class="card-icon">👤</div>
                        <div class="card-title">انفرادی</div>
                        <div class="card-desc">ایک فرد کی تلاش</div>
                    </div>

                    <!-- 3️⃣ جڑ رشتہ دار - تیسرا -->
                    <div class="dashboard-card" id="cardRoot">
                        <div class="card-icon">👥</div>
                        <div class="card-title">جڑ رشتہ دار</div>
                        <div class="card-desc">دو افراد کا تعلق</div>
                    </div>

                    <div class="action-row">
                        <div class="exit-btn-container" id="exitBtn">
                            <span class="exit-btn-icon">🚪</span>
                            <span class="exit-btn-text">لاگ آؤٹ</span>
                            <span class="exit-btn-subtext">(مرکزی صفحہ)</span>
                        </div>
                        <div class="exit-btn-container hardreset" id="resetBtn">
                            <span class="exit-btn-icon">⚠️</span>
                            <span class="exit-btn-text">مکمل ری سیٹ</span>
                            <span class="exit-btn-subtext">(تمام ڈیٹا حذف)</span>
                        </div>
                    </div>
                </div>
                `;

                document.getElementById('cardFullTree').addEventListener('click', openTreeOptions);
                document.getElementById('cardIndividual').addEventListener('click', goToIndividualMobile);
                document.getElementById('cardRoot').addEventListener('click', goToRootMobile);
                document.getElementById('exitBtn').addEventListener('click', logoutMobile);
                document.getElementById('resetBtn').addEventListener('click', hardResetMobile);
            }

            // === SETUP MODAL EVENTS ===
            function setupModalEvents() {
                const overlay = document.getElementById('treeOptionOverlay');
                const closeBtn = document.getElementById('treeOptionClose');
                const visualBtn = document.getElementById('optionVisualTree');
                const textBtn = document.getElementById('optionTextView');

                if (closeBtn) {
                    closeBtn.addEventListener('click', closeTreeOptions);
                }

                if (visualBtn) {
                    visualBtn.addEventListener('click', goToVisualTree);
                }

                if (textBtn) {
                    textBtn.addEventListener('click', goToTextView);
                }

                if (overlay) {
                    overlay.addEventListener('click', function(e) {
                        if (e.target === overlay) {
                            closeTreeOptions();
                        }
                    });
                }

                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        closeTreeOptions();
                    }
                });
            }

            // === INIT ===
            document.addEventListener('DOMContentLoaded', function() {
                const fileInput = document.getElementById('fileInput');
                if (fileInput) {
                    fileInput.onchange = function(e) {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            try {
                                const data = new Uint8Array(ev.target.result);
                                const wb = XLSX.read(data, { type: 'array' });
                                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                                db = rows.map(r => ({
                                    name: String(r.Name || r.name || '').trim(),
                                    father: String(r.Father || r.father || '').trim(),
                                    mother: String(r.Mother || r.mother || '').trim(),
                                    spouse: String(r.Spouse || r.spouse || '').trim(),
                                    gen: String(r.Gen || r.gen || '').trim(),
                                    gender: String(r.Gender || r.gender || 'Male').trim().toUpperCase(),
                                    maritalStatus: String(r.MaritalStatus || r.maritalStatus || r.Maritalstatus || r.maritalstatus || '').trim(),
                                    alive: String(r.Alive || r.alive || '').trim()
                                })).filter(p => p.name);
                                localStorage.setItem('familyDB', JSON.stringify(db));
                                updateHeaderCounter();
                            } catch (err) {
                                alert('❌ خرابی: ' + err.message);
                            }
                        };
                        reader.readAsArrayBuffer(file);
                    };
                }

                setupModalEvents();
            });

            loadFromStorageOrFallback();
            renderMobileDashboard();

            window.addEventListener('storage', function(e) {
                if (e.key === 'familyDB') {
                    if (e.newValue) {
                        try {
                            db = JSON.parse(e.newValue);
                        } catch (err) {
                            db = [];
                        }
                    } else {
                        db = [];
                    }
                    updateHeaderCounter();
                }
            });

            window.openTreeOptions = openTreeOptions;
            window.closeTreeOptions = closeTreeOptions;
            window.goToVisualTree = goToVisualTree;
            window.goToTextView = goToTextView;
        })();
    </script>
</body>
</html>
