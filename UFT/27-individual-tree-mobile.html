    <style>
        .reset-btn {
            padding: 10px 20px;

            color: var(--dark-blue);

        * {
            margin: 0;
            padding: 0;

        }
        
        :root {

            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;

        body {

        .zoom-controls {

<script src="33-family-data-urdu.js"></script>
<script>





    let db = [], fileInfo = null, currentIndividual = null;
    let showSiblings = true, showDescendants = true, showAncestors = true;
   let zoomLevel = 0.5, siblingsCollapsed = true, childrenCollapsed = true, ancestorsCollapsed = true;

    function displayName(str) { 
        if (!str) return '';
        let cleaned = str.replace(/[\s-۔]*\d+$/, '').trim();
        return cleaned;
    }

    function formatCurrentTime() {
        const d = new Date();
        return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} - ${d.getHours()%12||12}:${String(d.getMinutes()).padStart(2,'0')} ${d.getHours()>=12?'شام':'صبح'}`;
    }

    function loadData() {
        if (typeof FAMILY_DATA_URDU !== 'undefined') {
            db = FAMILY_DATA_URDU;
            fileInfo = FILE_INFO || null;
            const urlParams = new URLSearchParams(window.location.search);
            const memberName = urlParams.get('member');
            if (memberName) {
                setTimeout(() => {
                    const member = db.find(m => m.name === decodeURIComponent(memberName));
                    if (member) selectMember(member);
                }, 500);
            } else {
                resetIndividual();
            }
            setTimeout(() => applyZoom(), 100);
        }
    }

    document.addEventListener('DOMContentLoaded', loadData);

    window.toggleLeftMenu = () => document.getElementById('toggleMenuPanel').classList.toggle('show');

    window.handleToggleMenuClick = function(filter) {
        if (!currentIndividual) return;
        if (filter === 'siblings') { showSiblings = !showSiblings; document.getElementById('toggleSiblings').classList.toggle('active', showSiblings); }
        else if (filter === 'descendants') { showDescendants = !showDescendants; document.getElementById('toggleDescendants').classList.toggle('active', showDescendants); }
        else if (filter === 'ancestors') { showAncestors = !showAncestors; document.getElementById('toggleAncestors').classList.toggle('active', showAncestors); }
        renderTree();
        document.getElementById('toggleMenuPanel').classList.remove('show');
    };

    function resetIndividual() {
        document.getElementById('searchInput').value = '';
        currentIndividual = null;
        const url = new URL(window.location);
        url.searchParams.delete('member');
        window.history.pushState({}, '', url);
        document.getElementById('treeRoot').innerHTML = `
            <div class="welcome-container">
                <div class="welcome-box">
                    <div class="welcome-icon">🌿</div>
                    <div class="welcome-title">رضوی خاندان · شجرہ نسب</div>
                    <div class="welcome-text">
                        براہ کرم اوپر دیے گئے سرچ باکس میں کسی فرد کا نام تلاش کریں<br>
                        تاکہ ان کے خاندانی روابط شجرہ کی شکل میں دیکھ سکیں۔
                    </div>
                </div>
            </div>
        `;
        closeAllMenus();
    }

    document.getElementById('searchInput')?.addEventListener('keyup', function() {
        const query = this.value;
        const dropdown = document.getElementById('searchDropdown');
        if (query.length < 2) { dropdown.style.display = 'none'; return; }
        const results = db.filter(m => m.name.includes(query)).slice(0, 8);
        dropdown.innerHTML = '';
        results.forEach(member => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<div><span class="main-name">${displayName(member.name)}</span> <span class="gen">${member.gen || ''}</span>
                <div class="father-name">والد: ${displayName(member.father) || '—'}</div></div>`;
            div.onclick = () => { selectMember(member); dropdown.style.display = 'none'; this.value = displayName(member.name); };
            dropdown.appendChild(div);
        });
        dropdown.style.display = 'block';
    });

    function selectMember(member) {
        currentIndividual = member;
        document.getElementById('searchInput').value = displayName(member.name);
        const url = new URL(window.location);
        url.searchParams.set('member', encodeURIComponent(member.name));
        window.history.pushState({}, '', url);
        renderTree();
    }

    window.toggleSection = function(section) {
        if (section === 'siblings') siblingsCollapsed = !siblingsCollapsed;
        else if (section === 'children') childrenCollapsed = !childrenCollapsed;
        else if (section === 'ancestors') ancestorsCollapsed = !ancestorsCollapsed;
        renderTree();
    };

    function findParent(p) { 
        return p?.father && p.father !== '—' ? db.find(x => x.name === p.father) : null; 
    }
    
    function getAncestors(p) {
        let arr = [], cur = p;
        while (cur?.father && cur.father !== '—') {
            const father = db.find(x => x.name === cur.father);
            if (!father) break;
            arr.push(father);
            cur = father;
        }
        return arr;
    }

    function renderBox(person, label, isSiblingOrChild = false) {
        const isFemale = person.gender === 'FEMALE';
        const isSelected = currentIndividual?.name === person.name;
        const mother = person.mother || '—';
        const hasKids = db.some(c => c.father === person.name);

        let html = `<div class="box ${isFemale ? 'female-box' : ''} ${isSelected ? 'selected' : ''}" data-name="${person.name}" onclick="handleBoxClick(this)">`;
        html += `<div class="box-header"><span>${label}</span><span>${person.gen || '—'}</span></div>`;
        html += `<div class="box-body">`;
        html += `<div class="box-row"><span class="box-label">نام :</span><span class="box-value"><span class="member-name">${displayName(person.name)}</span></span></div>`;
        
        if (isSiblingOrChild) {
            html += `<div class="box-row"><span class="box-label">والدہ :</span><span class="box-value">${mother}</span></div>`;
            html += `<div class="box-row"><span class="box-label">شریک حیات :</span><span class="box-value">${person.spouse || '—'}</span></div>`;
        } else {
            html += `<div class="box-row"><span class="box-label">والد :</span><span class="box-value">${displayName(person.father) || '—'}</span></div>`;
            html += `<div class="box-row"><span class="box-label">والدہ :</span><span class="box-value">${mother}</span></div>`;
            html += `<div class="box-row"><span class="box-label">شریک حیات :</span><span class="box-value">${person.spouse || '—'}</span></div>`;
        }
        if (hasKids) html += `<div class="child-icon">👪</div>`;
        html += `</div></div>`;
        return html;
    }

    function renderGenderGroup(genderMembers, type) {
        const count = genderMembers.length;
        const getLabel = (m) => type === 'sibling' ? (m.gender === 'FEMALE' ? 'بہن' : 'بھائی') : (m.gender === 'FEMALE' ? 'بیٹی' : 'بیٹا');
        
        if (count === 1) return `<div class="children-row one-box">${genderMembers.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
        if (count === 2) return `<div class="children-row two-boxes">${genderMembers.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
        if (count === 3) return `<div class="children-row three-boxes">${genderMembers.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
        if (count === 4) return `<div class="children-row four-in-row">${genderMembers.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
        
        const firstFour = genderMembers.slice(0, 4);
        const remaining = genderMembers.slice(4);
        let remainingClass = remaining.length === 1 ? 'one-box' : remaining.length === 2 ? 'two-boxes' : remaining.length === 3 ? 'three-boxes' : 'remaining-center';
        return `<div class="children-row four-in-row">${firstFour.map(m => renderBox(m, getLabel(m), true)).join('')}</div>
                <div class="children-row ${remainingClass}">${remaining.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
    }

    function renderMembersWithLayout(members, type) {
        if (!members.length) return '';
        
        if (members.length > 5) {
            const males = members.filter(m => m.gender !== 'FEMALE');
            const females = members.filter(m => m.gender === 'FEMALE');
            return (males.length ? renderGenderGroup(males, type) : '') + (females.length ? renderGenderGroup(females, type) : '');
        }
        
        const getLabel = (m) => type === 'sibling' ? (m.gender === 'FEMALE' ? 'بہن' : 'بھائی') : (m.gender === 'FEMALE' ? 'بیٹی' : 'بیٹا');
        const count = members.length;
        if (count === 1) return `<div class="children-row one-box">${members.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
        if (count === 2) return `<div class="children-row two-boxes">${members.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
        if (count === 3) return `<div class="children-row three-boxes">${members.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
        if (count === 4) return `<div class="children-row four-in-row">${members.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
        
        const firstFour = members.slice(0, 4);
        const remaining = members.slice(4);
        let remainingClass = remaining.length === 1 ? 'one-box' : remaining.length === 2 ? 'two-boxes' : remaining.length === 3 ? 'three-boxes' : 'remaining-center';
        return `<div class="children-row four-in-row">${firstFour.map(m => renderBox(m, getLabel(m), true)).join('')}</div>
                <div class="children-row ${remainingClass}">${remaining.map(m => renderBox(m, getLabel(m), true)).join('')}</div>`;
    }

    function renderTree() {
        if (!currentIndividual) return;
        let html = '<div>';
        
        if (showAncestors) {
            let ancestors = getAncestors(currentIndividual);
            if (ancestors.length) {
                html += `<div class="section-heading" onclick="toggleSection('ancestors')"><span class="toggle-icon">${ancestorsCollapsed ? '+' : '-'}</span><span>🌳 آباؤ اجداد (${ancestors.length})</span></div>`;
                if (!ancestorsCollapsed) {
                    html += '<div class="family-group">';
                    [...ancestors].reverse().forEach((a, idx) => {
                        html += renderBox(a, idx === 0 ? 'قدیم ترین' : 'آبا', false);
                        if (idx < ancestors.length-1) html += '<div class="v-line"></div>';
                    });
                    if (ancestors.length) html += '<div class="v-line"></div></div>';
                }
            }
        }
        
        const father = findParent(currentIndividual);
        if (father) {
            html += `<div class="family-group">${renderBox(father, 'والد', false)}<div class="v-line"></div>${renderBox(currentIndividual, 'فرد', false)}</div>`;
        } else {
            html += `<div class="family-group">${renderBox(currentIndividual, 'فرد', false)}</div>`;
        }
        
        if (showSiblings && father) {
            const siblings = db.filter(s => s.father === father.name && s.name !== currentIndividual.name);
            if (siblings.length) {
                html += `<div class="section-heading" onclick="toggleSection('siblings')"><span class="toggle-icon">${siblingsCollapsed ? '+' : '-'}</span><span>👥 بہن بھائی (${siblings.length})</span></div>`;
                if (!siblingsCollapsed) html += renderMembersWithLayout(siblings, 'sibling');
            }
        }
        
        if (showDescendants) {
            const children = db.filter(c => c.father === currentIndividual.name);
            if (children.length) {
                html += `<div class="section-heading" onclick="toggleSection('children')"><span class="toggle-icon">${childrenCollapsed ? '+' : '-'}</span><span>👶 اولاد (${children.length})</span></div>`;
                if (!childrenCollapsed) html += renderMembersWithLayout(children, 'child');
            }
        }
        
        html += '</div>';
        document.getElementById('treeRoot').innerHTML = html;
    }

    window.handleBoxClick = function(el) {
        const member = db.find(m => m.name === el.dataset.name);
        if (member) selectMember(member);
    };

    function zoomIn() { zoomLevel = Math.min(zoomLevel + 0.1, 2); applyZoom(); }
    function zoomOut() { zoomLevel = Math.max(zoomLevel - 0.1, 0.5); applyZoom(); }
    function resetZoom() { zoomLevel = 1; applyZoom(); }
    
    function applyZoom() { 
        const c = document.getElementById('treeRoot'); 
        if (c) { 
            c.style.transform = `scale(${zoomLevel})`; 
            c.style.width = `${100/zoomLevel}%`; 
            document.getElementById('zoomLevel').textContent = Math.round(zoomLevel*100)+'%'; 
        } 
    }

    window.showSaveOptions = function() { 
        if (!currentIndividual) { alert('براہ کرم پہلے کسی فرد کو منتخب کریں'); return; } 
        document.getElementById('saveOptionsModal').style.display = 'block'; 
        document.getElementById('saveModalOverlay').style.display = 'block'; 
        document.getElementById('toggleMenuPanel').classList.remove('show'); 
    };
    
    window.closeSaveModal = function() { 
        document.getElementById('saveOptionsModal').style.display = 'none'; 
        document.getElementById('saveModalOverlay').style.display = 'none'; 
    };
    
    window.processSave = function() { 
        const s = document.querySelector('input[name="saveFormat"]:checked'); 
        if (!s) { alert('براہ کرم فارمیٹ منتخب کریں'); return; } 
        closeSaveModal(); 
        if (s.value === 'jpeg') exportAsJPEG(); 
        else exportIndividualPDF(s.value === 'pdf-high' ? 'high' : 'low'); 
    };

    async function exportIndividualPDF(quality) {
        const member = currentIndividual;
        if (!member) return alert('کوئی مواد نہیں');
        
        const originalZoom = zoomLevel;
        zoomLevel = 1;
        applyZoom();
        await new Promise(resolve => setTimeout(resolve, 200));
        
        const scale = quality === 'high' ? 2.0 : 1.5;
        const jpegQuality = quality === 'high' ? 0.95 : 0.7;
        const qualityText = quality === 'high' ? 'ہائی ریزولوشن' : 'لو ریزولوشن';
        
        const originalElement = document.querySelector('.tree-root-layout');
        if (!originalElement) return alert('کوئی مواد نہیں');
        
        const el = originalElement.cloneNode(true);
        el.style.transform = 'none';
        el.style.width = '100%';
        el.style.height = 'auto';
        el.style.overflow = 'visible';
        
        const wrapper = document.createElement('div');
        wrapper.style.position = 'absolute';
        wrapper.style.left = '-9999px';
        wrapper.style.top = '0';
        wrapper.style.backgroundColor = 'white';
        wrapper.style.padding = '15px';
        wrapper.style.width = 'fit-content';
        wrapper.style.minWidth = '100%';
        wrapper.style.fontFamily = "'Noto Nastaliq Urdu', 'Inter', sans-serif";
        document.body.appendChild(wrapper);
        
        const styleTag = document.createElement('style');
        styleTag.textContent = `
            * { font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif; }
            .member-name, .box-header, .box-label, .box-value { font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif; }
            h1, h2, .section-heading { font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif; }
            .box { direction: rtl; text-align: right; width: 260px; }
            .children-row { gap: 8px; }
            .section-heading { font-size: 16px; margin: 15px 0 10px; }
            .toggle-icon { width: 28px; height: 28px; font-size: 18px; }
        `;
        wrapper.appendChild(styleTag);
        
        const header = document.createElement('div');
        header.style.marginBottom = '20px';
        header.style.textAlign = 'center';
        header.innerHTML = `<h1 style="color:#d4af37;font-size:28px;margin:0;">رضوی خاندان کا شجرہ نسب</h1>
            <h2 style="color:#5a0000;font-size:20px;margin:8px 0 0 0;">${displayName(member.name)}</h2>`;
        wrapper.appendChild(header);
        wrapper.appendChild(el);
        
        const footer = document.createElement('div');
        footer.style.marginTop = '20px';
        footer.style.padding = '12px';
        footer.style.background = '#fcf9f4';
        footer.style.textAlign = 'center';
        footer.style.fontSize = '10px';
        const timeStr = formatCurrentTime();
        const excelSavedTime = fileInfo ? fileInfo.saved_time : '18/03/2026, 9:04:20 pm';
        footer.innerHTML = `<div>ڈویلپر: عمران حیدر ولد سید رسالت حسین رضوی | 6010-787-0332</div>
            <div>آخری ترمیم: ${excelSavedTime} | PDF جنریٹ: ${timeStr}</div>`;
        wrapper.appendChild(footer);
        
        const loadingMsg = document.createElement('div');
        loadingMsg.style.position = 'fixed';
        loadingMsg.style.top = '50%';
        loadingMsg.style.left = '50%';
        loadingMsg.style.transform = 'translate(-50%, -50%)';
        loadingMsg.style.background = '#5a0000';
        loadingMsg.style.color = 'white';
        loadingMsg.style.padding = '15px 30px';
        loadingMsg.style.borderRadius = '8px';
        loadingMsg.style.zIndex = '9999';
        loadingMsg.style.fontSize = '14px';
        loadingMsg.textContent = `📄 PDF بنا رہے ہیں... (${qualityText})`;
        document.body.appendChild(loadingMsg);
        
        await new Promise(resolve => setTimeout(resolve, 300));
        
        try {
            const canvas = await html2canvas(wrapper, {
                scale: scale,
                backgroundColor: '#ffffff',
                logging: false,
                windowWidth: wrapper.scrollWidth,
                windowHeight: wrapper.scrollHeight
            });
            
            const imgData = canvas.toDataURL('image/jpeg', jpegQuality);
            const { jsPDF } = window.jspdf;
            const isLandscape = canvas.width > canvas.height;
            const orientation = isLandscape ? 'l' : 'p';
            const mmWidth = canvas.width * 0.264583;
            const mmHeight = canvas.height * 0.264583;
            const margin = 10;
            const pdfWidth = mmWidth + (margin * 2);
            const pdfHeight = mmHeight + (margin * 2);
            
            const pdf = new jsPDF({
                orientation: orientation,
                unit: 'mm',
                format: [pdfWidth, pdfHeight]
            });
            
            pdf.addImage(imgData, 'JPEG', margin, margin, mmWidth, mmHeight);
            const safeName = member.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            pdf.save(`shajra_${safeName}_${quality}_${Date.now()}.pdf`);
            
            const fileSizeKB = Math.ceil((imgData.length - 'data:image/jpeg;base64,'.length) * 0.75 / 1024);
            setTimeout(() => alert(`✅ PDF محفوظ ہو گئی!\nفائل سائز: ~${fileSizeKB} KB`), 100);
            
        } catch (err) {
            console.error('PDF Error:', err);
            alert('❌ PDF نہیں بن سکی: ' + err.message);
        } finally {
            document.body.removeChild(wrapper);
            document.body.removeChild(loadingMsg);
            zoomLevel = originalZoom;
            applyZoom();
        }
    }

    function switchToTableView() {
        window.location.href = currentIndividual ? `28-individual-table-mobile.html?member=${encodeURIComponent(currentIndividual.name)}` : '28-individual-table-mobile.html';
    }

    function closeAllMenus() {
        document.getElementById('searchDropdown').style.display = 'none';
        document.getElementById('toggleMenuPanel')?.classList.remove('show');
        document.getElementById('saveOptionsModal').style.display = 'none';
        document.getElementById('saveModalOverlay').style.display = 'none';
    }
    
    function showDashboard() { window.location.href = '26-dashboard-mobile.html'; }
    
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-wrapper')) document.getElementById('searchDropdown').style.display = 'none';
        if (!e.target.closest('.toggle-menu-panel') && !e.target.closest('.left-toggle-btn')) document.getElementById('toggleMenuPanel')?.classList.remove('show');
        if (!e.target.closest('.save-options-modal') && !e.target.closest('[onclick="showSaveOptions()"]')) closeSaveModal();
    });

    window.zoomIn = zoomIn; window.zoomOut = zoomOut; window.resetZoom = resetZoom;
    window.showDashboard = showDashboard; window.resetIndividual = resetIndividual;
    window.switchToTableView = switchToTableView;
</script>



    <div class="modal-overlay" id="saveModalOverlay" onclick="closeSaveModal()"></div>
