<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        .reset-btn {
            padding: 10px 20px;
            background: var(--gold);
            color: var(--dark-blue);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background: var(--light-gold);
            transform: scale(1.02);
        }

        .left-toggle-btn {
            animation: gentle-blink 1.5s infinite;
        }

        @keyframes gentle-blink {
            0% { opacity: 1; background: var(--gold); }
            50% { opacity: 0.7; background: #90EE90; transform: scale(1.1); }

        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #d4edda;
            --pink-bg: #fff0f5;
            --light-pink: #ffe4e9;
            --light-sage: #f4f7f2;
            --border-sage: #c9d6c2;
            --sisters-border: #fb7185;
            --summary-border: #e6c87c;
            --table-header-bg: #fdf6e3;
            --bronze: #bc8c4f;
            --reset-red: #5a0000;
            --reset-red-dark: #7a1f1f;
            --pdf-grey: #6c757d;
            --pdf-grey-dark: #5a6268;

        }

        body {
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);

            align-items: center;

            position: relative;
            flex-shrink: 0;
        }

        .header-title {
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif;

            align-items: center;
            gap: 8px;

            left: 50%;
            transform: translateX(-50%);

        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .left-toggle-btn {
            background: var(--gold);
            color: var(--dark-blue);
            width: 40px;
            height: 40px;
            border-radius: 50%;

            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;

        }

        .left-toggle-btn:hover {
            background: var(--light-gold);
            transform: scale(1.1);
        }

        .toggle-menu-panel {
            position: absolute;

        }

        .toggle-menu-panel.show {
            display: flex;
        }

        .toggle-menu-item {
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid var(--gold);
            background: white;
            color: var(--dark-blue);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .toggle-menu-item:hover {
            background: #faebcd;
            transform: translateX(5px);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fffcf8;
            min-height: 0;
        }

            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            flex: 1;
            min-height: 0;
        }

        .fixed-header-section {
            padding: 15px 15px 0 15px;
            background: #fffcf8;
            flex-shrink: 0;
            width: 85%;

        }

        .border-line {

        }

    .scrollable-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    padding: 0 15px 30px 15px;  /* Change from 15px to 30px */
    -webkit-overflow-scrolling: touch;
    zoom: 0.5;
}

        .scrollable-content::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .scrollable-content::-webkit-scrollbar-track {
            background: #f1f1f1;

        }

            background: var(--gold);

        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px;
            background: var(--light-sage);
            border: 2px solid var(--border-sage);
            border-radius: 16px;
            margin: 20px auto;
            max-width: 500px;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-label {
            font-weight: 700;
            color: var(--maroon);
            font-size: 13px;
            white-space: nowrap;
            min-width: 80px;
        }

        .search-wrapper {
            position: relative;
            flex: 2;
            min-width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 8px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
            text-align: right;
            font-family: 'Noto Nastaliq Urdu', 'Inter', sans-serif;
        }

        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 0 0 4px 4px;

            z-index: 9999;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
            text-align: right;
        }

        .result-item:hover { background: #faebcd; }

        .result-item .main-name { font-weight: 700; color: var(--dark-blue); }
        .result-item .gen { color: var(--maroon); font-size: 11px; margin-right: 6px; }

        .root-announce {
            background: var(--light-sage);
            padding: 20px 30px;

            border: 2px solid var(--border-sage);

        .gap-row { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            flex-wrap: nowrap; 
            white-space: nowrap;

        .gap-item {
            display: flex;
            align-items: center;
            gap: 8px;

            border-radius: 40px;

        }

        .gap-value { 
            font-weight: 700; 
            background: white; 
            padding: 4px 12px; 
            border-radius: 30px;
        }
        .gap-value.highlight { background: var(--bronze); color: white; }

        .paths-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .path-column { 
            flex: 1; 
            min-width: 350px; 
            max-width: 450px; 
            text-align: center; 
        }
        
        .path-column h3 { 
            color: var(--maroon); 
            margin-bottom: 20px; 
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif; 
            font-size: 18px; 
        }

        .box {
            border: 2px solid var(--gold);
            border-radius: 12px;
            background: white;
            min-width: 280px;
            max-width: 350px;
            text-align: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            margin: 8px auto;
        }

        .box:hover { transform: translateY(-3px); }
        .box.blinking-box { 
            animation: blinkBoxLightGreen 1.5s infinite; 
            border-width: 4px; 
            z-index: 10; 
            transform: scale(1.02); 
        }

        @keyframes blinkBoxLightGreen {
            0%, 100% { border-color: #2e7d32; background: #e8f5e9; box-shadow: 0 0 15px rgba(46, 125, 50, 0.4); }
            50% { border-color: #4caf50; background: #c8e6c9; box-shadow: 0 0 30px rgba(76, 175, 80, 0.6); transform: scale(1.05); }
        }

        .box.root-box { border-color: var(--maroon); border-width: 4px; background: #fff0f0; }
        .box.female-box { background-color: var(--light-pink) !important; border-color: #fb7185 !important; }

        .box-header {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: #f8fafc;
            font-size: 11px;
            font-weight: 800;
            border-bottom: 1px solid #ddd;
            border-radius: 10px 10px 0 0;
        }

        .box-body { padding: 15px; }
        .member-name { 
            font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif; 
            font-weight: 700; 
            font-size: 18px; 
            display: block; 
        }
        .father-name { 
            font-size: 12px; 
            color: #64748b; 
            margin-top: 6px;
        }

        .path-connector { width: 3px; height: 25px; background: var(--gold); margin: 5px auto; }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 11px;
            border-top: 2px solid var(--gold);
            flex-shrink: 0;
        }

        .save-options-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 3px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            z-index: 4000;
            min-width: 300px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 3999;
            display: none;
        }
        
        @media screen and (max-width: 480px) {
            .app-header {
                padding: 8px 10px;
            }
            
            .header-title {
                font-size: 16px;
                position: static;
                transform: none;
                margin-right: 10px;
            }
            
            .left-toggle-btn {
                width: 34px;
                height: 34px;
                font-size: 18px;
            }
            
            .box {
                min-width: 240px;
            }
            
            .fixed-header-section {
                width: 95%;
            }
            
            .reset-btn {
                padding: 8px 12px;
                font-size: 12px;
            }
            
            .empty-state {
                padding: 30px 20px;
                margin: 20px 15px;
            }
        }
        
        @media screen and (max-width: 360px) {
            .header-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <div class="left-toggle-btn" onclick="toggleLeftMenu()">☰</div>
            <div class="header-title">
                <span class="header-icon">👥</span>
                <span>رضوی خاندان - اصل شجرہ ویو</span>
            </div>
        </div>

        <div class="toggle-menu-panel" id="toggleMenuPanel">
            <div style="border-top:1px solid var(--gold); margin:5px 0;"></div>
            <div class="toggle-menu-item" onclick="switchToTableView()">📋 جدول میں دیکھیں</div>
            <div class="toggle-menu-item" onclick="showSaveOptions()">💾 محفوظ کریں</div>
            <div class="toggle-menu-item" onclick="showDashboard()">🏠 ڈیش بورڈ</div>
        </div>

        <div class="main-content">
            <div id="rootSection">
                <div class="fixed-header-section">
                    <div class="search-row">
                        <span class="search-label">رکن 1</span>
                        <div class="search-wrapper">
                            <input type="text" id="search1" class="search-input" placeholder="نام درج کریں..." autocomplete="off">
                            <div id="dropdown1" class="dropdown"></div>
                        </div>
                        <div class="reset-btn" onclick="resetSearchRow(1)">🔄 دوبارہ ترتیب</div>
                    </div>
                    <div class="search-row">
                        <span class="search-label">رکن 2</span>
                        <div class="search-wrapper">
                            <input type="text" id="search2" class="search-input" placeholder="نام درج کریں..." autocomplete="off">
                            <div id="dropdown2" class="dropdown"></div>
                        </div>
                        <div class="reset-btn" onclick="resetSearchRow(2)">🔄 دوبارہ ترتیب</div>
                    </div>
                    <div class="border-line"></div>
                </div>
                <div class="scrollable-content" id="rootTree">
                    <div class="empty-state">
                        <div style="font-size:48px; margin-bottom:15px; opacity:0.5;">👥</div>
                        <div style="font-size:18px; font-weight:600; color:var(--maroon); margin-bottom:8px;">دو افراد منتخب کریں</div>
                        <div style="font-size:13px; color:#666;">ان کا مشترکہ اصل بزرگ دیکھنے کے لیے اوپر دو افراد تلاش کریں</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="app-footer" id="appFooter"></div>
    </div>

    <div class="save-options-modal" id="saveOptionsModal" style="display:none;">
        <h3 style="color:var(--maroon); margin-bottom:20px; text-align:center;">💾 شجرہ محفوظ کریں</h3>
        
        <div style="margin-bottom:20px;">
            <div style="font-weight:600; margin-bottom:10px; color:var(--dark-blue);">فارمیٹ منتخب کریں:</div>
            
            <label style="display:block; margin-bottom:15px; padding:10px; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer;">
                <input type="radio" name="saveFormat" value="pdf-high" checked style="margin-left:10px;"> 
                <span style="font-weight:600;">📑 PDF - ہائی ریزولوشن</span>
                <span style="display:block; font-size:12px; color:#666; margin-right:25px;">پرنٹ کے لیے بہترین (3-8 MB)</span>
            </label>
            
            <label style="display:block; margin-bottom:15px; padding:10px; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer;">
                <input type="radio" name="saveFormat" value="pdf-low" style="margin-left:10px;"> 
                <span style="font-weight:600;">📑 PDF - لو ریزولوشن</span>
                <span style="display:block; font-size:12px; color:#666; margin-right:25px;">شیئرنگ کے لیے بہترین (0.5-2 MB)</span>
            </label>
            
            <label style="display:block; margin-bottom:15px; padding:10px; border:2px solid #e0e0e0; border-radius:8px; cursor:pointer;">
                <input type="radio" name="saveFormat" value="jpeg" style="margin-left:10px;"> 
                <span style="font-weight:600;">📸 JPEG تصویر</span>
                <span style="display:block; font-size:12px; color:#666; margin-right:25px;">یونیورسل فارمیٹ (200-500 KB)</span>
            </label>
        </div>
        
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="processSave()" style="flex:2; padding:12px; background:var(--green); color:white; border:none; border-radius:6px; font-weight:600; cursor:pointer;">محفوظ کریں</button>
            <button onclick="closeSaveModal()" style="flex:1; padding:12px; background:#f0f0f0; border:1px solid #ccc; border-radius:6px; cursor:pointer;">منسوخ</button>
        </div>
    </div>

    <div class="modal-overlay" id="saveModalOverlay" onclick="closeSaveModal()"></div>

     
    <script>
        // --- GLOBAL DATA ---
        let db = [];
        let fileInfo = { saved_time: "کوئی ٹائم سٹیمپ نہیں" };
        let member1 = null, member2 = null;
        let zoomLevel = 1;

        function displayName(str) { 
            if (!str) return '';
            let cleaned = str.replace(/[\s-\.۔]*\d+$/, '').trim();
            return cleaned;
        }
        
        function getGenNum(gen) { 
            const m = String(gen).match(/\d+/); 
            return m ? parseInt(m[0]) : 0; 
        }

        function formatCurrentTime() {
            const d = new Date();
            return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} - ${d.getHours()%12||12}:${String(d.getMinutes()).padStart(2,'0')} ${d.getHours()>=12?'شام':'صبح'}`;
        }

        function initializeData() {
            try {
                const saved = localStorage.getItem('familyDB');
                if (saved) {
                    db = JSON.parse(saved);
                } else {
                    db = (typeof FAMILY_DATA_URDU !== 'undefined') ? FAMILY_DATA_URDU : [];
                    if (db.length > 0) {
                        localStorage.setItem('familyDB', JSON.stringify(db));
                    }
                }
                
                const savedInfo = localStorage.getItem('fileInfo');
                if (savedInfo) {
                    fileInfo = JSON.parse(savedInfo);
                } else {
                    fileInfo = (typeof FILE_INFO !== 'undefined') ? FILE_INFO : { saved_time: "کوئی ٹائم سٹیمپ نہیں" };
                }
                
                updateFooter();
                
            } catch (error) {
                console.error('Data initialization error:', error);
            }
        }

        function updateFooter() {
            const footer = document.getElementById('appFooter');
            if (!footer) return;
            let timeStr = fileInfo?.saved_time || 'کوئی ٹائم سٹیمپ نہیں';
            footer.innerHTML = `📅 آخری ترمیم: ${timeStr} | ڈویلپر: عمران حیدر ابن سید رسالت حسین رضوی | 6010-787-0332`;
        }

        window.toggleLeftMenu = function() {
            document.getElementById('toggleMenuPanel').classList.toggle('show');
        };

        function closeAllMenus() {
            document.getElementById('toggleMenuPanel')?.classList.remove('show');
            document.getElementById('saveOptionsModal').style.display = 'none';
            document.getElementById('saveModalOverlay').style.display = 'none';
            document.getElementById('dropdown1').style.display = 'none';
            document.getElementById('dropdown2').style.display = 'none';
        }

        function resetSearchRow(rowNum) {
            if (rowNum === 1) {
                member1 = null;
                document.getElementById('search1').value = '';
                const dropdown1 = document.getElementById('dropdown1');
                if (dropdown1) dropdown1.style.display = 'none';
            } else if (rowNum === 2) {
                member2 = null;
                document.getElementById('search2').value = '';
                const dropdown2 = document.getElementById('dropdown2');
                if (dropdown2) dropdown2.style.display = 'none';
            }
            
            if (!member1 && !member2) {
                resetSearch();
            } else if (member1 && member2) {
                renderTree();
            } else {
                document.getElementById('rootTree').innerHTML = `
                    <div class="empty-state">
                        <div style="font-size:48px; margin-bottom:15px; opacity:0.5;">👥</div>
                        <div style="font-size:18px; font-weight:600; color:var(--maroon); margin-bottom:8px;">دو افراد منتخب کریں</div>
                        <div style="font-size:13px; color:#666;">ان کا مشترکہ اصل بزرگ دیکھنے کے لیے اوپر دو افراد تلاش کریں</div>
                    </div>
                `;
            }
        }

        window.showSaveOptions = function() {
            if (!member1 || !member2) {
                alert('براہ کرم پہلے دونوں افراد کو منتخب کریں');
                return;
            }
            document.getElementById('saveOptionsModal').style.display = 'block';
            document.getElementById('saveModalOverlay').style.display = 'block';
            document.getElementById('toggleMenuPanel')?.classList.remove('show');
        };

        window.closeSaveModal = function() {
            document.getElementById('saveOptionsModal').style.display = 'none';
            document.getElementById('saveModalOverlay').style.display = 'none';
        };

        window.processSave = function() {
            const selected = document.querySelector('input[name="saveFormat"]:checked');
            if (!selected) {
                alert('براہ کرم فارمیٹ منتخب کریں');
                return;
            }
            closeSaveModal();
            switch(selected.value) {
                case 'pdf-high': exportPDF('high'); break;
                case 'pdf-low': exportPDF('low'); break;
                case 'jpeg': exportAsJPEG(); break;
            }
        };

        function switchToTableView() {
            if (member1 && member2) {
                localStorage.setItem('rootMember1', JSON.stringify(member1));
                localStorage.setItem('rootMember2', JSON.stringify(member2));
            }
            window.location.href = '30-root-table-mobile.html';
        }

        function showDashboard() { 
            window.location.href = '26-dashboard-mobile.html'; 
        }

        function findParent(m) { 
            if (!m || !m.father || m.father === '—' || m.father === '---') return null;
            return db.find(x => x.name === m.father);
        }

        function getAncestryChain(m) {
            if (!m) return [];
            let chain = [], cur = m, visited = new Set();
            while (cur && cur.name && !visited.has(cur.name)) {
                chain.push(cur); 
                visited.add(cur.name); 
                cur = findParent(cur);
            }
            return chain;
        }

        function findCommonRoot(m1, m2) {
            if (!m1 || !m2) return null;
            const c1 = getAncestryChain(m1);
            const c2 = getAncestryChain(m2);
            const c2Names = new Set(c2.map(x => x.name));
            for (let p of c1) {
                if (p && p.name && c2Names.has(p.name)) {
                    return p;
                }
            }
            return null;
        }

        window.searchMember = function(query, num) {
            if (!db || !db.length) return;
            const drop = document.getElementById(`dropdown${num}`);
            if (!drop) return;
            drop.innerHTML = '';
            if (!query || query.length < 2) {
                drop.style.display = 'none';
                return;
            }
            const found = db.filter(p => p && p.name && p.name.includes(query)).slice(0, 8);
            if (found.length === 0) {
                drop.style.display = 'none';
                return;
            }
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                const relation = p.gender && p.gender.includes('Female') ? 'دختر' : 'فرزند';
                div.innerHTML = `
                    <div><span class="main-name">${displayName(p.name)}</span> <span class="gen">(${p.gen || 'نامعلوم'})</span></div>
                    <div style="font-size:11px; color: #666;">${relation}: ${displayName(p.father)}</div>
                `;
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById(`search${num}`).value = displayName(p.name) + ' (' + (p.gen || '') + ')';
                    if (num === 1) member1 = p; 
                    else member2 = p;
                    if (member1 && member2) renderTree();
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            drop.style.display = 'block';
        };

        function renderBox(m, label, isRoot = false, isSelected = false) {
            if (!m) return '';
            const isF = m.gender && m.gender.includes('Female');
            const motherName = m.mother ? displayName(m.mother) : '—';
            return `<div class="box ${isF ? 'female-box' : ''} ${isSelected ? 'blinking-box' : ''} ${isRoot ? 'root-box' : ''}">
                <div class="box-header"><span>${label}</span><span>${m.gen || ''}</span></div>
                <div class="box-body">
                    <span class="member-name">${displayName(m.name)}</span>
                    <div class="father-name">${isF ? 'دختر' : 'فرزند'}: ${displayName(m.father)} | والدہ: ${motherName}</div>
                </div></div>`;
        }

        function renderTree() {
            if (!member1 || !member2) return;
            const root = findCommonRoot(member1, member2);
            if (!root) {  
                document.getElementById('rootTree').innerHTML = '<div class="root-announce">کوئی مشترکہ بزرگ نہیں ملا</div>'; 
                return; 
            }
            const c1 = getAncestryChain(member1);
            const c2 = getAncestryChain(member2);
            const p1 = c1.slice(0, c1.findIndex(x => x.name === root.name) + 1).reverse();
            const p2 = c2.slice(0, c2.findIndex(x => x.name === root.name) + 1).reverse();
            const gen1 = getGenNum(member1.gen);
            const gen2 = getGenNum(member2.gen);
            const genRoot = getGenNum(root.gen);
            const gap1 = Math.abs(gen1 - genRoot);
            const gap2 = Math.abs(gen2 - genRoot);
            const gap12 = Math.abs(gen1 - gen2);
            
            let html = `
                <div class="root-announce">
                    <h2 style="color: var(--maroon); margin-bottom: 15px;">مشترکہ اصل بزرگ</h2>
                    <h3 style="color: var(--dark-blue); font-size: 24px; margin: 10px 0;">${displayName(root.name)} - ${root.gen}</h3>
                    <div class="generation-info">
                        <div class="gap-row">
                            <div class="gap-item">${displayName(member1.name)} → اصل <span class="gap-value">${gap1} نسل</span></div>
                            <div class="gap-item">${displayName(member2.name)} → اصل <span class="gap-value">${gap2} نسل</span></div>
                            <div class="gap-item">ان کے درمیان <span class="gap-value highlight">${gap12} نسل</span></div>
                        </div>
                    </div>
                </div>
                <div class="paths-container">
                    <div class="path-column">
                        <h3>${displayName(member1.name)} کا اصل تک سفر</h3>`;
            p1.forEach((m, i) => { 
                html += renderBox(m, i === p1.length - 1 ? 'منتخب فرد' : (i === 0 ? 'اصل بزرگ' : 'نسل'), i === 0, i === p1.length - 1); 
                if (i < p1.length - 1) html += '<div class="path-connector"></div>'; 
            });
            html += `</div><div class="path-column">
                        <h3>${displayName(member2.name)} کا اصل تک سفر</h3>`;
            p2.forEach((m, i) => { 
                html += renderBox(m, i === p2.length - 1 ? 'منتخب فرد' : (i === 0 ? 'اصل بزرگ' : 'نسل'), i === 0, i === p2.length - 1); 
                if (i < p2.length - 1) html += '<div class="path-connector"></div>'; 
            });
            html += `</div></div>`;
            
            document.getElementById('rootTree').innerHTML = html;
        }

        function resetSearch() {
            member1 = null; member2 = null;
            document.getElementById('search1').value = '';
            document.getElementById('search2').value = '';
            document.getElementById('rootTree').innerHTML = `
                <div class="empty-state">
                    <div style="font-size:48px; margin-bottom:15px; opacity:0.5;">👥</div>
                    <div style="font-size:18px; font-weight:600; color:var(--maroon); margin-bottom:8px;">دو افراد منتخب کریں</div>
                    <div style="font-size:13px; color:#666;">ان کا مشترکہ اصل بزرگ دیکھنے کے لیے اوپر دو افراد تلاش کریں</div>
                </div>
            `;
            document.getElementById('dropdown1').style.display = 'none';
            document.getElementById('dropdown2').style.display = 'none';
        }

        async function exportPDF(quality = 'high') {
            if (!member1 || !member2) {
                alert('براہ کرم پہلے دونوں افراد کو منتخب کریں');
                return;
            }
            const scale = quality === 'high' ? 2.0 : 1.0;
            const jpegQuality = quality === 'high' ? 0.95 : 0.6;
            const qualityText = quality === 'high' ? 'ہائی ریزولوشن' : 'لو ریزولوشن';
            const treeElement = document.querySelector('.scrollable-content');
            if (!treeElement) return alert('کوئی مواد نہیں');
            try {
                const originalZoom = treeElement.style.zoom;
                treeElement.style.zoom = '1';
                const clone = treeElement.cloneNode(true);
                treeElement.style.zoom = originalZoom;
                const wrapper = document.createElement('div');
                wrapper.style.background = 'white';
                wrapper.style.padding = '20px';
                wrapper.style.width = 'fit-content';
                wrapper.style.margin = '0 auto';
                const header = document.createElement('div');
                header.style.marginBottom = '30px'; 
                header.style.textAlign = 'center';
                header.style.width = '100%';
                header.innerHTML = `
                    <h1 style="color: #d4af37; font-size: 36px; font-family: 'Playfair Display', 'Noto Nastaliq Urdu', serif; margin:0;">رضوی خاندان کا شجرہ</h1>
                    <h2 style="color:#5a0000; font-size:24px; font-family:'Playfair Display', 'Noto Nastaliq Urdu', serif; margin:10px 0 0 0;">اصل بزرگ کا رشتہ</h2>
                    <h3 style="color:#0f172a; font-size:18px; margin:5px 0;">${displayName(member1.name)} ↔ ${displayName(member2.name)}</h3>
                `;
                const footer = document.createElement('div');
                footer.style.marginTop = '30px';
                footer.style.padding = '15px 20px';
                footer.style.background = '#fcf9f4';
                footer.style.width = '100%';
                footer.style.boxSizing = 'border-box';
                footer.style.fontFamily = "'Noto Nastaliq Urdu', 'Inter', sans-serif";
                footer.style.fontSize = '12px';
                footer.style.textAlign = 'center';
                const timeStr = formatCurrentTime();
                const excelSavedTime = fileInfo ? fileInfo.saved_time : 'کوئی ٹائم سٹیمپ نہیں';
                footer.innerHTML = `
                    <div style="padding:2px 0; font-weight:bold; color:#0f172a;">ڈویلپر : عمران حیدر ابن سید رسالت حسین رضوی | 6010-787-0332</div>
                    <div style="padding:2px 0; font-weight:bold; color:#5a0000;">آخری ترمیم : ${excelSavedTime} | PDF جنریٹ : ${timeStr}</div>
                `;
                wrapper.appendChild(header);
                wrapper.appendChild(clone);
                wrapper.appendChild(footer);
                wrapper.style.position = 'absolute';
                wrapper.style.left = '-9999px';
                wrapper.style.top = '0';
                document.body.appendChild(wrapper);
                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed';
                loadingMsg.style.top = '50%'; 
                loadingMsg.style.left = '50%'; 
                loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000'; 
                loadingMsg.style.color = 'white'; 
                loadingMsg.style.padding = '20px 40px'; 
                loadingMsg.style.borderRadius = '8px'; 
                loadingMsg.style.zIndex = '9999'; 
                loadingMsg.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
                loadingMsg.textContent = `📄 PDF بنا رہے ہیں... (${qualityText})`;
                document.body.appendChild(loadingMsg);
                await new Promise(resolve => setTimeout(resolve, 500));
                const canvas = await html2canvas(wrapper, { 
                    scale: scale, 
                    backgroundColor: '#ffffff', 
                    logging: false, 
                    allowTaint: true, 
                    useCORS: true 
                });
                document.body.removeChild(wrapper);
                document.body.removeChild(loadingMsg);
                const imgData = canvas.toDataURL('image/jpeg', jpegQuality);
                const { jsPDF } = window.jspdf;
                const w = canvas.width / 2 * 0.264583;
                const h = canvas.height / 2 * 0.264583;
                const pdf = new jsPDF({ 
                    orientation: w > h ? 'l' : 'p', 
                    unit: 'mm', 
                    format: [w + 40, h + 40] 
                });
                pdf.addImage(imgData, 'JPEG', 20, 20, w, h, undefined, 'FAST');
                const safeName1 = member1.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const safeName2 = member2.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                pdf.save(`shajra_root_${safeName1}_${safeName2}_${quality}_${Date.now()}.pdf`);
                const base64Length = imgData.length - 'data:image/jpeg;base64,'.length;
                const fileSizeKB = Math.ceil((base64Length * 0.75) / 1024);
                alert(`✅ ${qualityText} PDF محفوظ ہو گئی!\nفائل سائز: ~${fileSizeKB} KB`);
            } catch (err) {
                console.error('PDF Error:', err);
                alert('❌ PDF نہیں بن سکی: ' + err.message);
            }
        }

                    <h2 style="color:#5a0000; font-size:24px; font-family:'Playfair Display', 'Noto Nastaliq Urdu', serif; margin:10px 0 0 0;">اصل بزرگ کا رشتہ</h2>
                    <h3 style="color:#0f172a; font-size:18px; margin:5px 0;">${displayName(member1.name)} ↔ ${displayName(member2.name)}</h3>
                `;
                wrapper.appendChild(header);
                wrapper.appendChild(clone);
                const footer = document.createElement('div');
                footer.style.marginTop = '30px';
                footer.style.padding = '15px 20px';
                footer.style.background = '#fcf9f4';
                footer.style.width = '100%';
                footer.style.boxSizing = 'border-box';
                footer.style.fontFamily = "'Noto Nastaliq Urdu', 'Inter', sans-serif";
                footer.style.fontSize = '12px';
                footer.style.textAlign = 'center';
                const timeStr = formatCurrentTime();
                const excelSavedTime = fileInfo ? fileInfo.saved_time : 'کوئی ٹائم سٹیمپ نہیں';
                footer.innerHTML = `
                    <div style="padding:2px 0; font-weight:bold; color:#0f172a;">ڈویلپر : عمران حیدر ابن سید رسالت حسین رضوی | 6010-787-0332</div>
                    <div style="padding:2px 0; font-weight:bold; color:#5a0000;">آخری ترمیم : ${excelSavedTime} | JPEG جنریٹ : ${timeStr}</div>
                `;
                wrapper.appendChild(footer);
                wrapper.style.position = 'absolute';
                wrapper.style.left = '-9999px';
                wrapper.style.top = '0';
                document.body.appendChild(wrapper);
                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed';
                loadingMsg.style.top = '50%'; 
                loadingMsg.style.left = '50%'; 
                loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000'; 
                loadingMsg.style.color = 'white'; 
                loadingMsg.style.padding = '20px 40px'; 
                loadingMsg.style.borderRadius = '8px'; 
                loadingMsg.style.zIndex = '9999'; 
                loadingMsg.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
                loadingMsg.textContent = '📸 JPEG بنا رہے ہیں...';
                document.body.appendChild(loadingMsg);
                await new Promise(resolve => setTimeout(resolve, 500));
                const canvas = await html2canvas(wrapper, { 
                    scale: 1.2,
                    backgroundColor: '#ffffff', 
                    logging: false
                });
                document.body.removeChild(wrapper);
                document.body.removeChild(loadingMsg);
                const imgData = canvas.toDataURL('image/jpeg', 0.85);
                const link = document.createElement('a');
                const safeName1 = member1.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const safeName2 = member2.name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                link.download = `shajra_root_${safeName1}_${safeName2}_${Date.now()}.jpg`;
                link.href = imgData;
                link.click();
                const base64Length = imgData.length - 'data:image/jpeg;base64,'.length;
                const fileSizeKB = Math.ceil((base64Length * 0.75) / 1024);
                setTimeout(() => alert(`✅ JPEG محفوظ ہو گئی!\nفائل سائز: ~${fileSizeKB} KB`), 100);
            } catch (err) {
                console.error('Export Error:', err);
                alert('❌ نہیں ہو سکا: ' + err.message);
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            initializeData();
            const search1 = document.getElementById('search1');
            const search2 = document.getElementById('search2');
            if (search1) {
                search1.addEventListener('keyup', function(e) {
                    window.searchMember(this.value, 1);
                });
            }
            if (search2) {
                search2.addEventListener('keyup', function(e) {
                    window.searchMember(this.value, 2);
                });
            }
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-wrapper')) {
                    document.getElementById('dropdown1').style.display = 'none';
                    document.getElementById('dropdown2').style.display = 'none';
                }
                if (!e.target.closest('.toggle-menu-panel') && !e.target.closest('.left-toggle-btn')) {
                    document.getElementById('toggleMenuPanel')?.classList.remove('show');
                }
                if (!e.target.closest('.save-options-modal') && !e.target.closest('[onclick="showSaveOptions()"]')) {
                    document.getElementById('saveOptionsModal').style.display = 'none';
                    document.getElementById('saveModalOverlay').style.display = 'none';
                }
            });
            try {
                const m1 = localStorage.getItem('rootMember1');
                const m2 = localStorage.getItem('rootMember2');
                if (m1 && m2) {
                    member1 = JSON.parse(m1); 
                    member2 = JSON.parse(m2);
                    document.getElementById('search1').value = displayName(member1.name) + ' (' + (member1.gen || '') + ')';
                    document.getElementById('search2').value = displayName(member2.name) + ' (' + (member2.gen || '') + ')';
                    localStorage.removeItem('rootMember1');
                    localStorage.removeItem('rootMember2');
                    renderTree();
                }
            } catch(e) { 
                console.error("Stored member parse error", e); 
            }
        });

        window.switchToTableView = switchToTableView;
        window.resetSearch = resetSearch;
        window.resetSearchRow = resetSearchRow;
        window.exportPDF = exportPDF;
        window.showDashboard = showDashboard;
        window.toggleLeftMenu = toggleLeftMenu;
    </script>
