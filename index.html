<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Rizvi Family Tree · Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .password-container {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            border: 3px solid var(--gold);
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--dark-blue);
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--maroon);
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .language-selector, .device-selector {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .lang-btn, .device-btn {
            padding: 12px 10px;
            border: 2px solid var(--gold);
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 50px;
            -webkit-appearance: none;
            appearance: none;
        }

        .lang-btn.active, .device-btn.active {
            background: var(--gold);
            color: var(--dark-blue);
            border-color: var(--dark-blue);
        }

        .lang-btn:active, .device-btn:active {
            transform: scale(0.98);
            background: #faebcd;
        }

        .password-wrapper {
            position: relative;
            margin: 20px 0;
        }

        .password-wrapper input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            -webkit-appearance: none;
            appearance: none;
        }

        .password-wrapper input:focus {
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px rgba(90, 0, 0, 0.1);
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--maroon);
            font-weight: bold;
            font-size: 15px;
            background: white;
            padding: 5px 10px;
            border-radius: 4px;
            user-select: none;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-btn:active {
            background: #f0f0f0;
        }

        .unlock-btn, .dashboard-btn {
            background: var(--maroon);
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 17px;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            -webkit-appearance: none;
            appearance: none;
            min-height: 55px;
        }

        .unlock-btn:active, .dashboard-btn:active {
            background: #7a1f1f;
            transform: scale(0.98);
        }

        .back-btn {
            background: transparent;
            color: var(--dark-blue);
            border: 2px solid var(--gold);
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            -webkit-appearance: none;
            appearance: none;
            min-height: 50px;
        }

        .back-btn:active {
            background: #f5f5f5;
            transform: scale(0.98);
        }

        .error-msg {
            color: var(--maroon);
            margin-top: 15px;
            display: none;
            font-size: 15px;
            font-weight: 600;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 4px;
        }

        .footer-note {
            margin-top: 25px;
            font-size: 13px;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .footer-note p {
            margin: 5px 0;
        }

        .footer-note strong {
            color: var(--dark-blue);
        }

        .blinking-text {
            color: var(--maroon);
            animation: blink 1.5s infinite;
            font-weight: 600;
            margin-top: 10px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .family-seal {
            font-size: 48px;
            margin-bottom: 10px;
            color: var(--gold);
        }

        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 5px;
        }

        .hidden {
            display: none !important;
        }

        .welcome-message {
            color: var(--dark-blue);
            font-size: 16px;
            margin: 15px 0;
            padding: 10px;
            background: #f9f3e0;
            border-radius: 8px;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="password-container" id="loginContainer">
        <div class="family-seal">🌿</div>
        <h1>Rizvi Family Tree</h1>
        <div class="subtitle">Honoring our past, preserving our future</div>
        
        <!-- Language Selection + Password Section (Initially Visible) -->
        <div id="loginSection">
            <div class="section-label">SELECT LANGUAGE</div>
            <div class="language-selector">
                <button class="lang-btn" id="englishBtn">
                    <span>🇬🇧</span> English
                </button>
                <button class="lang-btn active" id="urduBtn">
                    <span>🇵🇰</span> Urdu
                </button>
            </div>

            <div class="password-wrapper">
                <input type="password" id="passwordField" placeholder="Enter Secure Password" autofocus>
                <span class="toggle-btn" id="toggleBtn">Show</span>
            </div>

            <button class="unlock-btn" id="unlockBtn">
                <span>🔓</span> Unlock
            </button>
            <div id="passwordError" class="error-msg">
                ❌ Access Denied. Please verify the password.
            </div>
        </div>

        <!-- Device Selection Section (Initially Hidden) -->
        <div id="deviceSection" class="hidden">
            <div class="welcome-message">
                ✓ Password Verified
            </div>
            
            <div class="section-label">CHOOSE DEVICE</div>
            <div class="device-selector">
                <button class="device-btn" id="pcBtn">
                    <span>💻</span> Desktop
                </button>
                <button class="device-btn active" id="mobileBtn">
                    <span>📱</span> Mobile
                </button>
            </div>

            <div class="button-group">
                <button class="dashboard-btn" id="enterDashboardBtn">
                    <span>🚪</span> Enter Dashboard
                </button>
                <button class="back-btn" id="backToLoginBtn">
                    <span>↩️</span> Back to Login
                </button>
            </div>
        </div>

        <div class="footer-note">
            <p>Designed & Developed by:</p>
            <p><strong>Imran Haider</strong></p>
            <p>S/o Syed Risalat Hussain Rizvi</p>
            <p><span style="color: var(--gold);">📞</span> 0332-787-6010</p>
            <p class="blinking-text">⚠️ Private family access only ⚠️</p>
        </div>
    </div>

    <script>
        const CONFIG = { password: 'sihr110' };
        let deviceType = 'mobile'; // Default to Mobile
        let language = 'urdu'; // Default to Urdu

        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, setting up event listeners...');
            
            // Get elements
            const loginSection = document.getElementById('loginSection');
            const deviceSection = document.getElementById('deviceSection');
            const englishBtn = document.getElementById('englishBtn');
            const urduBtn = document.getElementById('urduBtn');
            const pcBtn = document.getElementById('pcBtn');
            const mobileBtn = document.getElementById('mobileBtn');
            const toggleBtn = document.getElementById('toggleBtn');
            const unlockBtn = document.getElementById('unlockBtn');
            const enterDashboardBtn = document.getElementById('enterDashboardBtn');
            const backToLoginBtn = document.getElementById('backToLoginBtn');
            const passwordField = document.getElementById('passwordField');
            const errorMsg = document.getElementById('passwordError');

            // Language selection - English
            if (englishBtn) {
                englishBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('English button clicked');
                    language = 'english';
                    englishBtn.classList.add('active');
                    urduBtn.classList.remove('active');
                });
            }

            // Language selection - Urdu
            if (urduBtn) {
                urduBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Urdu button clicked');
                    language = 'urdu';
                    urduBtn.classList.add('active');
                    englishBtn.classList.remove('active');
                });
            }

            // Device selection - PC
            if (pcBtn) {
                pcBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('PC button clicked');
                    deviceType = 'pc';
                    pcBtn.classList.add('active');
                    mobileBtn.classList.remove('active');
                });
            }

            // Device selection - Mobile
            if (mobileBtn) {
                mobileBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Mobile button clicked');
                    deviceType = 'mobile';
                    mobileBtn.classList.add('active');
                    pcBtn.classList.remove('active');
                });
            }

            // Toggle password visibility
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Toggle button clicked');
                    const type = passwordField.type === 'password' ? 'text' : 'password';
                    passwordField.type = type;
                    toggleBtn.textContent = type === 'password' ? 'Show' : 'Hide';
                });
            }

            // Unlock button - First step
            if (unlockBtn) {
                unlockBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Unlock button clicked');
                    checkPassword();
                });
            }

            // Back to Login button
            if (backToLoginBtn) {
                backToLoginBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Back to Login button clicked');
                    
                    // Hide device section, show login section
                    deviceSection.classList.add('hidden');
                    loginSection.classList.remove('hidden');
                    
                    // Clear password field and focus
                    passwordField.value = '';
                    passwordField.focus();
                    
                    // Hide any error messages
                    errorMsg.style.display = 'none';
                    
                    // Reset to default selections (Urdu)
                    language = 'urdu';
                    urduBtn.classList.add('active');
                    englishBtn.classList.remove('active');
                    
                    // Reset device selection (Mobile)
                    deviceType = 'mobile';
                    mobileBtn.classList.add('active');
                    pcBtn.classList.remove('active');
                });
            }

            // Enter key in password field
            if (passwordField) {
                passwordField.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        console.log('Enter key pressed');
                        checkPassword();
                    }
                });

                // Clear error when typing
                passwordField.addEventListener('input', function() {
                    errorMsg.style.display = 'none';
                });
            }

            // Enter Dashboard button - Second step
            if (enterDashboardBtn) {
                enterDashboardBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Enter Dashboard button clicked');
                    navigateToDashboard();
                });
            }

            // Focus on password field
            passwordField.focus();
        });

        function checkPassword() {
            const passwordField = document.getElementById('passwordField');
            const errorMsg = document.getElementById('passwordError');
            const loginSection = document.getElementById('loginSection');
            const deviceSection = document.getElementById('deviceSection');
            const enteredPwd = passwordField.value;
            
            console.log('Checking password...');
            console.log('Language selected:', language);
            
            if (enteredPwd === CONFIG.password) {
                console.log('Password correct, showing device selection');
                
                // Hide login section, show device selection section
                loginSection.classList.add('hidden');
                deviceSection.classList.remove('hidden');
                
                // Clear password field
                passwordField.value = '';
                
            } else {
                console.log('Password incorrect');
                // Show error message
                errorMsg.style.display = 'block';
                passwordField.value = '';
                passwordField.focus();
                
                // Hide error after 3 seconds
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }

        function navigateToDashboard() {
            console.log('Navigating to dashboard...');
            console.log('Language selected:', language);
            console.log('Device selected:', deviceType);
            
            // Navigate based on language and device
            let dashboard;
            if (language === 'english') {
                // English language - redirect to EFT folder
                dashboard = deviceType === 'pc' ? 'EFT/1-dashboard-pc.html' : 'EFT/6-dashboard-mobile.html';
            } else {
                // Urdu language - redirect to UFT folder
                dashboard = deviceType === 'pc' ? 'UFT/21-dashboard-pc.html' : 'UFT/26-dashboard-mobile.html';
            }
            
            console.log('Redirecting to:', dashboard);
            window.location.href = dashboard;
        }
    </script>
</body>
</html>
