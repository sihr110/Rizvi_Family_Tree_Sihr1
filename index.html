<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Rizvi Family · Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --maroon: #5a0000;
      --dark-blue: #0f172a;
      --gold: #d4af37;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .login-card {
      background: white;
      max-width: 420px;
      width: 100%;
      border-radius: 20px;
      border: 3px solid var(--gold);
      padding: 24px 24px 20px;
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.25);
      text-align: center;
    }

    .family-seal {
      font-size: 40px;
      margin-bottom: 2px;
    }

    .login-card h1 {
      font-family: 'Playfair Display', serif;
      color: var(--dark-blue);
      font-size: 24px;
    }

    .subtitle {
      color: var(--maroon);
      font-size: 12px;
      font-style: italic;
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin: 10px 0 5px 0;
      text-align: left;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .btn-group .btn {
      flex: 1;
      padding: 10px 10px;
      border: 2px solid var(--gold);
      background: white;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-group .btn.active {
      background: var(--gold);
      color: var(--dark-blue);
      border-color: var(--dark-blue);
    }

    .btn-group .btn:active {
      transform: scale(0.97);
    }

    .password-wrapper {
      position: relative;
      margin: 6px 0;
    }

    .password-wrapper input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    .password-wrapper input:focus {
      border-color: var(--maroon);
      box-shadow: 0 0 0 3px rgba(90, 0, 0, 0.1);
    }

    .toggle-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      color: var(--maroon);
      background: white;
      padding: 3px 10px;
      border-radius: 4px;
      user-select: none;
    }

    .toggle-btn:active {
      background: #f0f0f0;
    }

    .unlock-btn {
      background: var(--maroon);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .unlock-btn:active {
      background: #7a1f1f;
      transform: scale(0.98);
    }

    .error-msg {
      color: var(--maroon);
      font-weight: 600;
      font-size: 13px;
      padding: 8px;
      background: #ffe6e6;
      border-radius: 6px;
      margin-top: 8px;
      display: none;
    }

    .exit-btn {
      background: transparent;
      color: var(--dark-blue);
      border: 2px solid #ddd;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .exit-btn:active {
      background: #f5f5f5;
      transform: scale(0.98);
    }

    .footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #666;
    }

    .footer strong {
      color: var(--dark-blue);
    }

    .footer .phone {
      color: var(--gold);
      font-weight: 600;
    }

    .blink {
      color: var(--maroon);
      animation: blink 1.5s infinite;
      font-weight: 600;
      margin-top: 4px;
      font-size: 11px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .access-granted {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      margin: 6px 0;
      display: none;
    }

    .access-granted.show {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    /* ===== MOBILE FIX - Slightly reduce height ===== */
    @media (max-height: 750px) {
      .login-card {
        padding: 16px 20px 14px;
      }
      .family-seal { font-size: 32px; }
      .login-card h1 { font-size: 20px; }
      .subtitle { font-size: 11px; margin-bottom: 10px; }
      .section-label { font-size: 9px; margin: 6px 0 3px 0; }
      .btn-group .btn { padding: 8px 8px; font-size: 12px; }
      .password-wrapper input { padding: 10px 12px; font-size: 14px; }
      .unlock-btn { padding: 11px; font-size: 14px; }
      .exit-btn { padding: 10px; font-size: 13px; }
      .footer { font-size: 10px; margin-top: 10px; padding-top: 8px; }
      .blink { font-size: 10px; }
      .toggle-btn { font-size: 12px; padding: 2px 8px; }
      .error-msg { font-size: 12px; padding: 6px; }
      .access-granted { font-size: 12px; padding: 6px; }
    }

    @media (max-height: 650px) {
      .login-card {
        padding: 12px 16px 10px;
      }
      .family-seal { font-size: 28px; }
      .login-card h1 { font-size: 18px; }
      .subtitle { font-size: 10px; margin-bottom: 6px; }
      .section-label { font-size: 8px; margin: 4px 0 2px 0; }
      .btn-group .btn { padding: 6px 6px; font-size: 11px; }
      .password-wrapper input { padding: 8px 10px; font-size: 13px; }
      .unlock-btn { padding: 9px; font-size: 13px; }
      .exit-btn { padding: 8px; font-size: 12px; }
      .footer { font-size: 9px; margin-top: 6px; padding-top: 6px; }
      .blink { font-size: 9px; }
      .toggle-btn { font-size: 11px; padding: 2px 6px; }
      .error-msg { font-size: 11px; padding: 4px; }
      .access-granted { font-size: 11px; padding: 4px; }
    }
  </style>
</head>
<body>

<div class="login-card">

  <!-- ===== HEADER ===== -->
  <div class="family-seal">🌿</div>
  <h1>Rizvi Family</h1>
  <div class="subtitle">Honoring our past, preserving our future</div>

  <!-- ===== LANGUAGE ===== -->
  <div class="section-label">🌐 Language</div>
  <div class="btn-group">
    <button class="btn active" id="englishBtn">🇬🇧 English</button>
    <button class="btn" id="urduBtn">🇵🇰 Urdu</button>
  </div>

  <!-- ===== DEVICE ===== -->
  <div class="section-label">📱 Device</div>
  <div class="btn-group">
    <button class="btn active" id="mobileBtn">📱 Mobile</button>
    <button class="btn" id="pcBtn">💻 Desktop</button>
  </div>

  <!-- ===== PASSWORD ===== -->
  <div class="section-label">🔒 Secure Access</div>
  <div class="password-wrapper">
    <input type="password" id="passwordField" placeholder="Enter password" autofocus>
    <span class="toggle-btn" id="toggleBtn">Show</span>
  </div>

  <!-- ===== ACCESS GRANTED MESSAGE ===== -->
  <div class="access-granted" id="accessGranted">✅ Access Granted</div>

  <!-- ===== UNLOCK BUTTON ===== -->
  <button class="unlock-btn" id="unlockBtn">🔓 Unlock &amp; Enter Dashboard</button>

  <!-- ===== ERROR ===== -->
  <div class="error-msg" id="passwordError">❌ Access Denied. Please verify the password.</div>

  <!-- ===== EXIT BUTTON ===== -->
  <button class="exit-btn" id="exitBtn">🚪 Exit</button>

  <!-- ===== FOOTER ===== -->
  <div class="footer">
    <strong>Developer:</strong> Imran Haider S/o Syed Risalat Hussain Rizvi<br>
    <span class="phone">📞 0332-787-6010</span>
    <div class="blink">⚠️ Private family access only ⚠️</div>
  </div>

</div>

<script>
  // ===== CONFIG =====
  const CONFIG = { password: 'sihr110' };

  let selectedLanguage = 'english';
  let selectedDevice = 'mobile';
  let isUnlocked = false;

  // ===== DOM ELEMENTS =====
  const englishBtn = document.getElementById('englishBtn');
  const urduBtn = document.getElementById('urduBtn');
  const pcBtn = document.getElementById('pcBtn');
  const mobileBtn = document.getElementById('mobileBtn');
  const passwordField = document.getElementById('passwordField');
  const toggleBtn = document.getElementById('toggleBtn');
  const unlockBtn = document.getElementById('unlockBtn');
  const exitBtn = document.getElementById('exitBtn');
  const errorMsg = document.getElementById('passwordError');
  const accessGranted = document.getElementById('accessGranted');

  // ===== LANGUAGE SELECTION =====
  englishBtn.addEventListener('click', function() {
    selectedLanguage = 'english';
    englishBtn.classList.add('active');
    urduBtn.classList.remove('active');
  });

  urduBtn.addEventListener('click', function() {
    selectedLanguage = 'urdu';
    urduBtn.classList.add('active');
    englishBtn.classList.remove('active');
  });

  // ===== DEVICE SELECTION =====
  mobileBtn.addEventListener('click', function() {
    selectedDevice = 'mobile';
    mobileBtn.classList.add('active');
    pcBtn.classList.remove('active');
  });

  pcBtn.addEventListener('click', function() {
    selectedDevice = 'pc';
    pcBtn.classList.add('active');
    mobileBtn.classList.remove('active');
  });

  // ===== TOGGLE PASSWORD VISIBILITY =====
  toggleBtn.addEventListener('click', function() {
    const type = passwordField.type === 'password' ? 'text' : 'password';
    passwordField.type = type;
    toggleBtn.textContent = type === 'password' ? 'Show' : 'Hide';
  });

  // ===== UNLOCK BUTTON =====
  unlockBtn.addEventListener('click', function() {
    const entered = passwordField.value;

    if (entered === CONFIG.password) {
      isUnlocked = true;
      errorMsg.style.display = 'none';
      accessGranted.classList.add('show');
      passwordField.value = '';
      passwordField.type = 'password';
      toggleBtn.textContent = 'Show';

      setTimeout(function() {
        navigateToDashboard();
      }, 500);

    } else {
      isUnlocked = false;
      errorMsg.style.display = 'block';
      accessGranted.classList.remove('show');
      passwordField.value = '';
      passwordField.focus();

      setTimeout(function() {
        errorMsg.style.display = 'none';
      }, 3000);
    }
  });

  // ===== ENTER KEY ON PASSWORD FIELD =====
  passwordField.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      unlockBtn.click();
    }
  });

  // ===== CLEAR ERROR WHEN TYPING =====
  passwordField.addEventListener('input', function() {
    errorMsg.style.display = 'none';
  });

  // ===== EXIT BUTTON =====
  exitBtn.addEventListener('click', function() {
    if (confirm('Are you sure you want to exit?')) {
      window.close();
    }
  });

  // ===== NAVIGATE TO DASHBOARD =====
  function navigateToDashboard() {
    let dashboard;

    if (selectedLanguage === 'english') {
      dashboard = selectedDevice === 'pc' ? 'EFT/1-dashboard-pc.html' : 'EFT/6-dashboard-mobile.html';
    } else {
      dashboard = selectedDevice === 'pc' ? 'UFT/21-dashboard-pc.html' : 'UFT/26-dashboard-mobile.html';
    }

    console.log('Navigating to:', dashboard);
    console.log('Language:', selectedLanguage, 'Device:', selectedDevice);

    window.location.href = dashboard;
  }

  // ===== FOCUS ON PASSWORD FIELD =====
  passwordField.focus();
</script>

</body>
</html>
